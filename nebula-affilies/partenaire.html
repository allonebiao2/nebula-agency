<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="robots" content="noindex,nofollow">
<title>Mon QG — NEBULA Affiliés</title>
<link rel="icon" type="image/png" href="/static/favicon.png">
<link rel="apple-touch-icon" href="/static/favicon.png">
<link rel="stylesheet" href="/static/app.css?v=20260621c">
</head>
<body>
<div class="bg-orbs"></div>
<div class="bg-grain"></div>

<div class="app">
  <aside class="dock">
    <div class="logo"><img class="brandmark" src="/static/nebula-mark.png" alt="NEBULA"></div>
    <nav id="nav" class="flex" style="flex-direction:column;gap:8px"></nav>
    <div class="nav-sp"></div>
    <button class="nav-i" id="logout" title="Quitter"></button>
  </aside>

  <main class="work">
    <header class="topbar">
      <div class="who">
        <div class="rank" style="gap:12px">
          <div class="emblem" id="top-emblem" style="width:52px;height:52px;font-size:1.5rem;border-radius:16px"></div>
          <div><div style="font-weight:700;font-family:'Space Grotesk'" id="p-name">…</div><div class="r-sub" id="p-rank">…</div></div>
        </div>
      </div>
      <div class="flex gap8">
        <button class="icon-btn" id="help" title="Guide d'utilisation"></button>
        <button class="icon-btn" id="snd" title="Son des notifications (activer / couper)"></button>
        <button class="icon-btn" id="amb" title="Musique d'ambiance"></button>
        <button class="icon-btn" id="bell" title="Notifications"></button>
      </div>
    </header>

    <!-- MON QG -->
    <section class="view" id="v-home"></section>
    <!-- MES GAINS -->
    <section class="view" id="v-gains"></section>
    <!-- MES CLIENTS -->
    <section class="view" id="v-clients"></section>
    <!-- MON RÉSEAU -->
    <section class="view" id="v-reseau"></section>
    <!-- MON LIEN -->
    <section class="view" id="v-link"></section>
    <!-- CLASSEMENT -->
    <section class="view" id="v-classement"></section>
    <!-- MESSAGES -->
    <section class="view" id="v-messages"></section>
    <!-- DOCUMENTATION -->
    <section class="view" id="v-docs"></section>
    <!-- PUBLICATION -->
    <section class="view" id="v-publi"></section>
    <!-- PERSONNALISER -->
    <section class="view" id="v-perso"></section>
  </main>
</div>

<!-- Lecteur de document -->
<div class="scrim" id="doc-scrim"><div class="card modal glow"><div class="in" id="doc-in"></div></div></div>

<!-- Notifications -->
<div class="scrim" id="notif-scrim"><div class="card modal"><div class="in">
  <div class="flex between mb16"><h3>Notifications</h3><button class="icon-btn" id="notif-close" style="width:34px;height:34px"></button></div>
  <div id="notif-list"></div>
</div></div></div>

<script src="/static/app.js?v=20260621c"></script>
<script>
const { icon, api, toast, sound, countUp, reveal, qr, celebrate, nova, esc, fmt, ago, el } = NA;
const ROOT = document.documentElement;
let ME = null, LEADS = [], CFG = null;

const NAV = [
  { id: 'home', icon: 'chart', label: 'Mon QG' },
  { id: 'gains', icon: 'coins', label: 'Mes gains' },
  { id: 'clients', icon: 'folder', label: 'Mes clients' },
  { id: 'reseau', icon: 'users', label: 'Mon réseau' },
  { id: 'classement', icon: 'trophy', label: 'Classement' },
  { id: 'messages', icon: 'chat', label: 'Messages' },
  { id: 'link', icon: 'link', label: 'Mon lien' },
  { id: 'docs', icon: 'doc', label: 'Documentation' },
  { id: 'publi', icon: 'megaphone', label: 'Publication' },
  { id: 'perso', icon: 'palette', label: 'Personnaliser' },
];
const SWATCHES = ['#7b5cff','#22d3ee','#36f5a0','#e6c34c','#ff5c7a','#4c8cff','#ff8a3c','#d957ff'];

function statusPill(st) { const s = CFG.statuses[st] || { label: st, color: '#888' }; return `<span class="pill" style="--c:${s.color}"><span class="d"></span>${esc(s.label)}</span>`; }
function payDot(p) { return `<span class="pay ${p ? 'ok' : ''}"><span class="dot"></span>${p ? 'Payé' : 'En attente'}</span>`; }
function initials(n) { return (n || '?').split(' ').filter(Boolean).slice(0, 2).map(x => x[0]).join('').toUpperCase(); }

const RANK_ICON = { 'Recrue': 'spark', 'Météore': 'meteor', 'Comète': 'comet', 'Planète': 'planet', 'Étoile': 'star', 'Supernova': 'supernova', 'Nébuleuse': 'nebula', 'Galaxie': 'crown' };
const PALIER_COLOR = { 'STARTER': '#9aa0c0', 'SILVER': '#cdd6ef', 'GOLD': '#e7c987', 'SPÉCIAL': '#e6c34c' };
function rankSvg(label) { return icon(RANK_ICON[label] || 'spark'); }

const TOUR = [
  { icon: 'spark', title: 'Bienvenue dans ton bureau NEBULA', text: 'En quelques écrans : tu amènes des clients, tu recrutes des partenaires, et tu encaisses tes commissions. Suivons le guide ensemble.' },
  { icon: 'chart', title: 'Mon QG', text: 'Ta vue d\'ensemble : ton <b>rang</b> (prestige, selon tes ventes cumulées), ton <b>palier du mois</b> (ta commission directe, de 25% à 35%), et ton <b>RCM</b> (total généré à vie).' },
  { icon: 'coins', title: 'Mes gains', text: 'Toutes tes commissions, tracées. Quand un montant est « à réclamer », clique <b>Réclamer</b> : NEBULA est prévenue et te paie en Mobile Money.' },
  { icon: 'folder', title: 'Mes clients', text: 'Les commerçants que tu as amenés. NEBULA met à jour les statuts (en cours, terminé) et le paiement — tu suis tout en direct.' },
  { icon: 'users', title: 'Mon réseau', text: 'Recrute des partenaires avec ton <b>lien de recrutement</b>. Tu gagnes <b>10%</b> sur leurs ventes (N1) et <b>5%</b> sur celles de leurs recrues (N2). Ton arbre est ici.' },
  { icon: 'trophy', title: 'Classement', text: 'Vois le niveau de <b>toute l\'équipe</b> : rang, ventes, RCM, performance. Les clients de chacun restent privés — ici, on compare les scores. Grimpe !' },
  { icon: 'chat', title: 'Messages', text: 'Ton bureau est vivant : écris à un partenaire en privé, ou à toute l\'équipe dans le <b>salon NEBULA</b>. Une tonalité sonne dès que ça bouge sur la plateforme.' },
  { icon: 'link', title: 'Mon lien', text: 'Ton <b>lien unique</b> à partager partout : celui qui l\'ouvre choisit de <b>demander une vitrine</b> (il devient ton client) ou de <b>devenir partenaire</b> (il rejoint ton réseau). Un seul lien, un seul QR — tout t\'est attribué.' },
  { icon: 'doc', title: 'Documentation', text: 'Tes <b>munitions de vente</b> : guides, fiches produits, argumentaires, réponses aux objections. NEBULA les met à jour — tu as toujours la dernière version. Lis-les pour exceller.' },
  { icon: 'megaphone', title: 'Publication', text: 'Des <b>contenus prêts à poster</b> (textes, visuels, vidéos, scripts) sur WhatsApp, Facebook, Instagram… Copie, télécharge, partage — et fais venir les clients.' },
  { icon: 'palette', title: 'Personnaliser', text: 'Choisis la couleur de ton espace et ton pseudo de joueur (visible au classement).' },
  { icon: 'check', title: 'À toi de jouer', text: 'Va dans <b>Mon lien</b> et partage-le maintenant — ta première commission t\'attend ! Tu peux rouvrir ce guide via le « ? » en haut.' },
];

function buildDock() {
  const nav = document.getElementById('nav');
  NAV.forEach(n => {
    const b = el(`<button class="nav-i" id="navi-${n.id}" data-v="${n.id}" title="${n.label}">${icon(n.icon)}</button>`);
    b.onclick = () => switchView(n.id);
    nav.appendChild(b);
  });
  document.getElementById('logout').innerHTML = icon('logout');
  document.getElementById('logout').onclick = async () => { await api('/api/logout', { body: {} }); location.href = '/'; };
}
function switchView(id) {
  sound.sfx.tab();
  document.querySelectorAll('.view').forEach(v => v.classList.remove('on'));
  document.getElementById('v-' + id).classList.add('on');
  document.querySelectorAll('.nav-i[data-v]').forEach(b => b.classList.toggle('on', b.dataset.v === id));
  ({ home: renderHome, gains: renderGains, clients: renderClients, reseau: renderReseau, classement: renderClassement, messages: renderMessages, link: renderLink, docs: renderDocs, publi: renderPubli, perso: renderPerso }[id])();
  reveal();
}

function renderHome() {
  const s = ME.stats, r = s.rank, p = s.palier;
  const sup = s.is_supervisor;
  const palBase = sup ? (s.team_mois || 0) : s.ventes_mois;        // ce qui fait monter le palier
  const palUnit = sup ? 'client' : 'vente';                         // superviseur : clients d'équipe
  const nextRank = r.next_label ? `Encore <b style="color:var(--ink)">${r.to_next}</b> vente${r.to_next > 1 ? 's' : ''} (toi + équipe) pour le rang ${r.next_label}` : 'Galaxie — rang suprême atteint';
  const nextPal = p.next_label ? `Encore <b style="color:var(--ink)">${p.to_next}</b> ${palUnit}${p.to_next > 1 ? 's' : ''}${sup ? " d'équipe" : ''} ce mois → ${p.next_label} ${p.next_pct}%` : (p.label === 'SPÉCIAL' ? 'Taux spécial — partenaire privilégié' : (sup ? 'SILVER — palier max ce mois' : 'GOLD — palier max ce mois'));
  const palPct = p.next_min ? Math.min(100, Math.round(palBase * 100 / p.next_min)) : 100;
  const perVitrine = fmt(Math.round(150000 * p.rate));
  document.getElementById('v-home').innerHTML = `
    <div class="bento">
      <div class="col-7 rv"><div class="card glow clickable" id="home-rank-card"><div class="in">
        <span class="eyebrow"><span class="dot"></span>Ton rang · prestige (toi + équipe) <span class="tap-hint">voir l'échelle</span></span>
        <div class="rank mt16">
          <div class="emblem${r.label === 'Galaxie' ? ' king' : ''}">${rankSvg(r.label)}</div>
          <div><div class="r-name" style="display:flex;align-items:center;gap:8px;flex-wrap:wrap">${esc(r.label)}${sup ? NA.roleBadge(s.role_label, { size: 'sm' }) : ''}</div><div class="r-sub">Niveau ${r.level} / ${r.max_level} · ${s.ventes_rank} vente${s.ventes_rank > 1 ? 's' : ''} (toi + équipe)</div></div>
        </div>
        <div class="xp"><div class="track"><div class="fill" id="xpfill"></div></div>
          <div class="meta"><span>${nextRank}</span><span class="mono">${r.xp_pct}%</span></div></div>
      </div></div></div>
      <div class="col-5 rv"><div class="card clickable" id="home-pal-card"><div class="in">
        <span class="eyebrow"><span class="dot"></span>Ton palier du mois · commission directe</span>
        <div class="mt16" style="display:flex;align-items:center;gap:14px;flex-wrap:wrap">
          <div style="font-family:'Space Grotesk';font-weight:700;font-size:1.5rem;color:${PALIER_COLOR[p.label] || 'var(--ink)'}">${esc(p.label)}</div>
          <div class="r-sub">Commission directe <b style="color:var(--accent)">${p.pct}%</b> — <span class="mono">${perVitrine}</span> F / vitrine</div>
        </div>
        <div class="xp"><div class="track"><div class="fill" id="palfill" style="background:linear-gradient(90deg,var(--accent),var(--ok))"></div></div>
          <div class="meta"><span>${nextPal}</span><span class="mono">${palBase}${sup ? " d'équipe" : ''} ce mois</span></div></div>
      </div></div></div>

      <div class="col-3 rv"><div class="card clickable" data-go="gains"><div class="in stat"><div class="lbl">RCM · total généré (à vie)</div><div class="num accent mono" id="n-rcm">0</div><div class="sub" id="n-rcm-sub">tracé</div></div></div></div>
      <div class="col-3 rv"><div class="card clickable" data-ladder="1"><div class="in stat"><div class="lbl">Mes ventes (perso)</div><div class="num mono" style="color:var(--ok)" id="n-ven">0</div><div class="sub">ce que TU as vendu</div></div></div></div>
      <div class="col-3 rv"><div class="card clickable" data-go="reseau"><div class="in stat"><div class="lbl">Ventes de mon équipe</div><div class="num mono" style="color:var(--info)" id="n-team">0</div><div class="sub">${s.team_ventes ? 'tes branches → ' + s.ventes_rank + ' au total (rang)' : 'recrute pour démarrer'}</div></div></div></div>
      <div class="col-3 rv"><div class="card clickable" data-go="clients"><div class="in stat"><div class="lbl">Clients actifs</div><div class="num mono" style="color:var(--info)" id="n-cli">0</div><div class="sub">attente + en cours</div></div></div></div>

      <div class="col-12 rv"><button class="card pg-cta clickable" id="home-pay" style="width:100%;text-align:left;cursor:pointer;color:var(--ink)"><div class="in" style="display:flex;align-items:center;gap:14px;justify-content:space-between;flex-wrap:wrap">
        <div style="display:flex;align-items:center;gap:13px"><span class="pg-ico">${icon('coins')}</span><div><div style="font-weight:700">Ma rémunération — tout est clair</div><div class="meta">Mes paliers, mes 3 sources de gains (vente directe + réseau N1/N2), et comment je suis payé.</div></div></div>
        <span class="btn sm primary">Voir<span class="ico">${icon('arrow')}</span></span>
      </div></button></div>

      <div class="col-12 rv"><div class="card"><div class="in">
        <div class="flex between mb16"><h3>Coup d'œil</h3><button class="btn sm ghost" onclick="switchView('clients')">Voir mes clients<span class="ico">${icon('arrow')}</span></button></div>
        <div id="recent"></div>
      </div></div></div>
    </div>`;
  requestAnimationFrame(() => { document.getElementById('xpfill').style.width = r.xp_pct + '%'; document.getElementById('palfill').style.width = palPct + '%'; });
  const _e = ME.earnings || { generated: 0, paid: 0, due: 0 };
  countUp(document.getElementById('n-rcm'), _e.generated, { money: true });
  document.getElementById('n-rcm-sub').textContent = 'payé ' + fmt(_e.paid) + ' F · à réclamer ' + fmt(_e.due) + ' F';
  countUp(document.getElementById('n-ven'), s.ventes);
  countUp(document.getElementById('n-team'), s.team_ventes || 0);
  countUp(document.getElementById('n-cli'), (s.by_status.attente || 0) + (s.by_status.en_cours || 0));
  const rec = document.getElementById('recent');
  if (!LEADS.length) rec.innerHTML = `<p class="muted center" style="padding:20px">Aucun client encore. Partage ton lien pour démarrer.</p>`;
  else rec.innerHTML = LEADS.slice(0, 4).map(l => clientRow(l, true)).join('');
  const openLadder = () => NA.rankLadder({ label: r.label, ventes: s.ventes_rank, paliers: s.paliers, palScope: sup ? 'team' : '' });
  document.getElementById('home-rank-card').onclick = openLadder;
  document.getElementById('home-pal-card').onclick = openLadder;
  document.querySelectorAll('#v-home [data-ladder]').forEach(el => el.onclick = openLadder);
  const payBtn = document.getElementById('home-pay');
  if (payBtn) payBtn.onclick = () => NA.payGuide({
    mode: 'partner', stats: ME.stats, earnings: ME.earnings,
    onGoto: () => switchView('gains'),
    onClaim: async () => { try { const r2 = await api('/api/partenaire/commissions/claim', { body: {} }); sound.sfx.cash(); toast(fmt(r2.total) + ' F réclamés — NEBULA est prévenue', 'ok'); ME = await api('/api/partenaire/me'); switchView('gains'); } catch (e) { toast('Erreur', 'bad'); } }
  });
  document.querySelectorAll('#v-home [data-go]').forEach(el => el.onclick = () => switchView(el.dataset.go));
}

function clientRow(l, compact) {
  const name = `${l.prenom || ''} ${l.nom || ''}`.trim();
  return `<div class="row" style="grid-template-columns:42px 1fr auto">
    <div class="avatar">${initials(name)}</div>
    <div><div class="ttl">${esc(name)}</div><div class="meta">${esc(l.service_label)} · ${ago(l.created)}</div>
      <div class="flex gap8 mt8 wrap">${statusPill(l.status)} ${payDot(l.paye)}</div></div>
    <div class="center"><div class="mono" style="color:var(--accent);font-weight:700">${fmt(l.commission)} F</div><div class="meta">commission</div></div>
  </div>`;
}

function renderClients() {
  const html = !LEADS.length
    ? `<div class="card"><div class="in center" style="padding:40px"><p class="muted">Aucun client pour l'instant.<br>Va dans <b style="color:var(--ink)">Mon lien</b> et partage-le sur WhatsApp.</p></div></div>`
    : LEADS.map(l => `<div class="rv">${clientRow(l)}</div>`).join('');
  document.getElementById('v-clients').innerHTML = `
    <div class="rv mb16"><span class="eyebrow"><span class="dot"></span>Mes clients</span><h2 class="mt8" style="font-size:1.8rem">Tes clients, en direct</h2>
    <p class="muted mt8">NEBULA met à jour les statuts — tu suis l'évolution ici.</p></div>${html}`;
}

async function renderGains() {
  let d; try { d = await api('/api/partenaire/commissions'); } catch (e) { return; }
  const e = d.summary;
  const ST = { due: ['À réclamer', 'var(--warn)'], claimed: ['Réclamé', 'var(--info)'], paid: ['Payé', 'var(--ok)'] };
  const rows = d.commissions.length ? d.commissions.map(c => {
    const [lab, col] = ST[c.status] || ['—', 'var(--muted)'];
    return `<div class="row" style="grid-template-columns:1fr auto auto;gap:14px;align-items:center">
      <div><div class="ttl">${esc(c.client)} <span class="chip" style="margin-left:6px">${esc(c.level_label)}</span></div><div class="meta">${esc(c.service)} · ${ago(c.created)}</div></div>
      <div class="pill" style="--c:${col}"><span class="d"></span>${lab}</div>
      <div class="center"><div class="mono" style="color:var(--accent);font-weight:700">${fmt(c.amount)} F</div></div>
    </div>`;
  }).join('') : `<p class="muted center" style="padding:18px">Aucune commission encore. Elles apparaissent dès qu'une de tes ventes (ou de ton réseau) est payée.</p>`;
  document.getElementById('v-gains').innerHTML = `
    <div class="bento">
      <div class="col-12 rv"><div class="card glow"><div class="in">
        <div class="flex between wrap" style="gap:20px;align-items:flex-end">
          <div><span class="eyebrow"><span class="dot"></span>RCM · ton bilan complet à vie</span>
            <div class="num accent mono" id="g-gen" style="font-size:2.9rem;margin-top:10px">0</div>
            <div class="muted" style="font-size:.82rem">total généré depuis le début</div></div>
          ${e.due > 0 ? `<button class="btn primary" id="g-claim">Réclamer ${fmt(e.due)} F<span class="ico">${icon('coins')}</span></button>` : ''}
        </div>
        <div class="divider"></div>
        <div class="bento" style="gap:14px">
          <div class="col-4"><div class="card"><div class="in stat"><div class="lbl">Déjà payé</div><div class="num mono" style="color:var(--ok)" id="g-paid">0</div></div></div></div>
          <div class="col-4"><div class="card"><div class="in stat"><div class="lbl">À réclamer</div><div class="num mono" style="color:var(--warn)" id="g-due">0</div></div></div></div>
          <div class="col-4"><div class="card"><div class="in stat"><div class="lbl">Réclamé · en attente</div><div class="num mono" style="color:var(--info)" id="g-claimed">0</div></div></div></div>
        </div>
        <div class="flex gap8 mt16 wrap">
          <span class="chip">Direct : <b style="color:var(--ink)">${fmt(e.direct)}</b> F</span>
          <span class="chip">Réseau N1 (10%) : <b style="color:var(--ink)">${fmt(e.n1)}</b> F</span>
          <span class="chip">Réseau N2 (5%) : <b style="color:var(--ink)">${fmt(e.n2)}</b> F</span>
        </div>
      </div></div></div>
      <div class="col-12 rv"><div class="card"><div class="in">
        <h3 class="mb16">Historique tracé de tes commissions</h3>${rows}
      </div></div></div>
    </div>`;
  countUp(document.getElementById('g-gen'), e.generated, { money: true });
  countUp(document.getElementById('g-paid'), e.paid, { money: true });
  countUp(document.getElementById('g-due'), e.due, { money: true });
  countUp(document.getElementById('g-claimed'), e.claimed, { money: true });
  const cb = document.getElementById('g-claim');
  if (cb) cb.onclick = async () => {
    try { const r = await api('/api/partenaire/commissions/claim', { body: {} }); sound.sfx.cash(); toast(`${fmt(r.total)} F réclamés — NEBULA est prévenue`, 'ok'); ME = await api('/api/partenaire/me'); renderGains(); refreshNotifs(); }
    catch (e) { toast('Erreur', 'bad'); }
  };
}

function renderReseau() {
  const net = ME.network || { n1: [], n2: [], n1_commission: 0, n2_commission: 0, network_total: 0, n1_count: 0, n2_count: 0 };
  const link = location.origin + '/p/' + ME.code + '?go=partenaire';
  MYNET = {};
  const MY_APEX = { name: ME.name, code: ME.code, ventes: ME.stats.ventes, rank: ME.stats.rank.label, children: net.n1 || [] };
  computeMyTeam(MY_APEX);
  const row = (x, lvl, rate) => `<div class="row" style="grid-template-columns:42px 1fr auto"><div class="avatar">${initials(x.name)}</div><div><div class="ttl">${esc(x.name)} <span class="chip" style="margin-left:6px">${lvl}</span></div><div class="meta">${x.ventes} vente${x.ventes > 1 ? 's' : ''} · ${rate}</div></div><div class="center"><div class="mono" style="color:var(--accent);font-weight:700">${fmt(x.commission)} F</div><div class="meta">pour toi</div></div></div>`;
  document.getElementById('v-reseau').innerHTML = `
    <div class="bento">
      <div class="col-7 rv"><div class="card glow"><div class="in">
        <span class="eyebrow"><span class="dot"></span>Ton lien de recrutement</span>
        <h2 class="mt8" style="font-size:1.5rem">Recrute, et touche sur leurs ventes.</h2>
        <p class="muted mt8 mb16">Partage ce lien : qui le remplit devient ta recrue (après validation NEBULA). Tu gagnes <b style="color:var(--ink)">10%</b> sur tes recrues (N1) et <b style="color:var(--ink)">5%</b> sur leurs recrues (N2).</p>
        <div class="field"><div class="wrap"><input id="rlk" readonly value="${esc(link)}" style="font-family:JetBrains Mono;font-size:.85rem"></div></div>
        <div class="flex gap8 wrap">
          <button class="btn primary" id="rcopy">Copier le lien<span class="ico">${icon('copy')}</span></button>
          <a class="btn ghost" id="rwa" target="_blank" rel="noopener">Partager sur WhatsApp<span class="ico">${icon('phone')}</span></a>
        </div>
      </div></div></div>
      <div class="col-5 rv"><div class="card"><div class="in">
        <span class="eyebrow"><span class="dot"></span>Tes gains réseau</span>
        <div class="stat mt16"><div class="lbl">Commissions de profondeur</div><div class="num accent mono" id="n-net">0</div>

function wireMyOrg() {
  const stage = document.getElementById('myorg-stage'), pan = document.getElementById('myorg-pan');
  if (!stage || !pan) return;
  let scale = 1, tx = 0, ty = 0, drag = false, moved = false, sx = 0, sy = 0, dx0 = 0, dy0 = 0;
  const apply = () => { pan.style.transform = `translate(${tx}px,${ty}px) scale(${scale})`; };
  const clampS = s => Math.max(0.2, Math.min(2.6, s));
  const setTog = (t, sign) => { t.textContent = sign + ' ' + t.textContent.replace(/^[+\-]\s*/, ''); };
  function fit() { const cw = pan.scrollWidth, ch = pan.scrollHeight, sw = stage.clientWidth, sh = stage.clientHeight; if (!cw || !ch) return; scale = clampS(Math.min(sw / cw, sh / ch, 1)); tx = Math.max(10, (sw - cw * scale) / 2); ty = 16; apply(); }
  function focusNode(node) { pan.querySelectorAll('.onode.hit').forEach(n => n.classList.remove('hit')); let p = node.closest('li'); while (p) { p.classList.remove('collapsed'); const t = p.querySelector(':scope > .onode .otoggle'); if (t) setTog(t, '−'); p = p.parentElement ? p.parentElement.closest('li') : null; } node.classList.add('hit'); const sr = stage.getBoundingClientRect(), nr = node.getBoundingClientRect(); tx += (sr.width / 2 - (nr.left - sr.left + nr.width / 2)); ty += (sr.height / 2 - (nr.top - sr.top + nr.height / 2)); apply(); }
  pan.addEventListener('click', e => { if (moved) return; const tog = e.target.closest('.otoggle'); if (tog) { const li = tog.closest('li'); if (li) { setTog(tog, li.classList.toggle('collapsed') ? '+' : '−'); sound.sfx.tab(); } return; } const node = e.target.closest('.onode'); if (node && node.dataset.code) openFilleul(node.dataset.code); });
  stage.addEventListener('pointerdown', e => { drag = true; moved = false; dx0 = e.clientX; dy0 = e.clientY; sx = e.clientX - tx; sy = e.clientY - ty; stage.classList.add('grabbing'); try { stage.setPointerCapture(e.pointerId); } catch (x) {} });
  stage.addEventListener('pointermove', e => { if (!drag) return; if (Math.abs(e.clientX - dx0) + Math.abs(e.clientY - dy0) > 6) moved = true; tx = e.clientX - sx; ty = e.clientY - sy; apply(); });
  const end = () => { drag = false; stage.classList.remove('grabbing'); setTimeout(() => { moved = false; }, 40); };
  stage.addEventListener('pointerup', end); stage.addEventListener('pointercancel', end);
  stage.addEventListener('wheel', e => { e.preventDefault(); const r = stage.getBoundingClientRect(), cx = e.clientX - r.left, cy = e.clientY - r.top; const ns = clampS(scale * (e.deltaY < 0 ? 1.12 : 0.89)); tx = cx - (cx - tx) * (ns / scale); ty = cy - (cy - ty) * (ns / scale); scale = ns; apply(); }, { passive: false });
  document.getElementById('myorg-fit').onclick = fit;
  document.getElementById('myorg-zin').onclick = () => { scale = clampS(scale * 1.18); apply(); };
  document.getElementById('myorg-zout').onclick = () => { scale = clampS(scale * 0.85); apply(); };
  document.getElementById('myorg-expand').onclick = () => { pan.querySelectorAll('li.collapsed').forEach(li => li.classList.remove('collapsed')); pan.querySelectorAll('.otoggle').forEach(t => setTog(t, '−')); fit(); };
  document.getElementById('myorg-collapse').onclick = () => { pan.querySelectorAll('.org > li > ul > li').forEach(li => { const t = li.querySelector(':scope > .onode .otoggle'); if (t) { li.classList.add('collapsed'); setTog(t, '+'); } }); fit(); };
  const q = document.getElementById('myorg-q');
  if (q) q.addEventListener('keydown', e => { if (e.key !== 'Enter') return; const qq = q.value.trim().toLowerCase(); pan.querySelectorAll('.onode.hit').forEach(n => n.classList.remove('hit')); if (!qq) return; const node = [...pan.querySelectorAll('.onode')].find(n => (n.dataset.name || '').includes(qq) || (n.dataset.code || '').includes(qq)); if (!node) { toast('Aucun filleul trouvé', 'bad'); return; } focusNode(node); sound.sfx.ok(); });
  setTimeout(fit, 80);
}

async function makeCard() {
  toast('Génération de ta carte…');
  const link = location.origin + '/p/' + ME.code;
  const acc = ME.accent || '#7b5cff';
  // Carte de visite PAYSAGE prête à imprimer : 8,9 × 5,1 cm @ ~600 DPI (2100×1200).
  const W = 2100, H = 1200, M = 150;
  const cv = document.createElement('canvas'); cv.width = W; cv.height = H;
  const x = cv.getContext('2d');

    await document.fonts.ready;

  } catch (e) {}
  const SG = '"Space Grotesk",sans-serif', PJ = '"Plus Jakarta Sans",sans-serif', JM = '"JetBrains Mono",monospace';
  const rr = (X, Y, w, h, r) => { x.beginPath(); x.moveTo(X + r, Y); x.arcTo(X + w, Y, X + w, Y + h, r); x.arcTo(X + w, Y + h, X, Y + h, r); x.arcTo(X, Y + h, X, Y, r); x.arcTo(X, Y, X + w, Y, r); x.closePath(); };

  const load = src => new Promise(res => { const im = new Image(); im.crossOrigin = 'anonymous'; im.onload = () => res(im); im.onerror = () => res(null); im.src = src; });

  // fond sombre premium + halos de marque
  const bg = x.createLinearGradient(0, 0, W, H); bg.addColorStop(0, '#0c0c1c'); bg.addColorStop(1, '#070710'); x.fillStyle = bg; x.fillRect(0, 0, W, H);
  let g = x.createRadialGradient(380, 320, 40, 380, 320, 950); g.addColorStop(0, acc + '40'); g.addColorStop(1, 'rgba(0,0,0,0)'); x.fillStyle = g; x.fillRect(0, 0, W, H);
  g = x.createRadialGradient(W - 280, H - 160, 40, W - 280, H - 160, 760); g.addColorStop(0, 'rgba(34,211,238,.14)'); g.addColorStop(1, 'rgba(0,0,0,0)'); x.fillStyle = g; x.fillRect(0, 0, W, H);
  x.fillStyle = acc; x.fillRect(0, 0, 16, H);                                    // liseré de marque

  // panneau QR blanc (droite)
  const P = 720, PX = W - M - P, PY = (H - P) / 2;
  x.save(); x.shadowColor = 'rgba(0,0,0,.5)'; x.shadowBlur = 46; x.shadowOffsetY = 14; x.fillStyle = '#fff'; rr(PX, PY, P, P, 44); x.fill(); x.restore();
  const q = 540, qx = PX + (P - q) / 2, qy = PY + 50;
  if (qr) x.drawImage(qr, qx, qy, q, q);
  x.fillStyle = '#0b0b14'; x.textAlign = 'center'; x.textBaseline = 'middle'; x.font = '600 42px ' + SG; x.fillText('Scanne-moi', PX + P / 2, PY + P - 56);

  const LX = M, contentRight = PX - 80;
  // logo
  if (logo) { const lh = 152, lw = lh * logo.width / logo.height; x.drawImage(logo, LX, M - 12, lw, lh); }
  // photo ronde + nom

let DOCS = [], DOC_CAT = 'Tous';
function isNew(ts) { return (Date.now() / 1000 - ts) < 7 * 86400; }
const DOC_ICON = { note: 'doc', pdf: 'download', link: 'link' };
async function renderDocs() {
  let d; try { d = await api('/api/partenaire/documents'); } catch (e) { return; }
  DOCS = d.documents;
  const counts = {}; DOCS.forEach(x => counts[x.category] = (counts[x.category] || 0) + 1);
  const cats = ['Tous', ...d.categories];
  const tabs = cats.map(c => `<div class="cat-tab${c === DOC_CAT ? ' on' : ''}" data-cat="${esc(c)}">${esc(c)}${c !== 'Tous' && counts[c] ? ` · ${counts[c]}` : ''}</div>`).join('');
  const items = DOCS.filter(x => DOC_CAT === 'Tous' || x.category === DOC_CAT);
  const list = items.length ? items.map(docCard).join('') : `<div class="card"><div class="in center" style="padding:36px"><p class="muted">Rien dans cette catégorie pour l'instant.</p></div></div>`;
  document.getElementById('v-docs').innerHTML = `
    <div class="rv mb16"><span class="eyebrow"><span class="dot"></span>Documentation</span><h2 class="mt8" style="font-size:1.8rem">Pour mieux vendre & exceller</h2>
    <p class="muted mt8">Guides, fiches produits, argumentaires. NEBULA les met à jour — tu as toujours la dernière version.</p></div>
    <div class="cat-tabs">${tabs}</div>
    <div id="doc-list">${list}</div>`;
  document.querySelectorAll('.cat-tab').forEach(t => t.onclick = () => { DOC_CAT = t.dataset.cat; sound.sfx.tab(); renderDocs(); });
  items.forEach(x => { const b = document.getElementById('doc-open-' + x.id); if (b) b.onclick = () => openDoc(x.id); });
}
function docCard(x) {
  const act = x.kind === 'note'
    ? `<button class="btn sm primary" id="doc-open-${x.id}">Lire<span class="ico">${icon('arrow')}</span></button>`
    : (x.kind === 'pdf' && x.has_file)
      ? `<a class="btn sm primary" href="/api/doc/${x.id}" target="_blank" rel="noopener">Télécharger<span class="ico">${icon('download')}</span></a>`
      : (x.url ? `<a class="btn sm primary" href="${esc(x.url)}" target="_blank" rel="noopener">Ouvrir<span class="ico">${icon('arrow')}</span></a>` : '');

function openDoc(id) {

let CHAT = { channel: null, convName: '', convTimer: null };
async function renderMessages() {
  document.getElementById('v-messages').innerHTML = `
    <div class="rv mb16"><span class="eyebrow"><span class="dot"></span>Messages</span><h2 class="mt8" style="font-size:1.8rem">Le bureau, ensemble</h2>

let CHAT_DATA = { general: null, contacts: [] };
let CHAT_FILTER = { q: '', f: 'all', sort: 'rank' };
async function loadContacts() {
  let d; try { d = await api('/api/chat/contacts'); } catch (e) { return; }
  CHAT_DATA = { general: d.general, contacts: d.contacts };
  const side = document.getElementById('chatSide'); if (!side) return;

  renderChatFilters(); renderChatList();

}
function buildChatShell(side) {
  side.innerHTML = `<div class="chat-search">
      <div class="cs-box">${icon('search')}<input id="chatSearch" placeholder="Rechercher (nom, rang, palier, code)…" autocomplete="off"></div>
      <div class="chat-filters" id="chatFilters"></div>
      <div class="chat-sortrow"><label>Trier</label><select class="chat-sort" id="chatSort">
        <option value="rank">Par rang</option><option value="ventes">Par ventes</option><option value="az">A → Z</option><option value="recent">Activité récente</option>
      </select></div>
    </div><div id="chatList"></div>`;
  const inp = document.getElementById('chatSearch');
  inp.value = CHAT_FILTER.q;
  inp.oninput = () => { CHAT_FILTER.q = inp.value; renderChatList(); };
  const sel = document.getElementById('chatSort');
  sel.value = CHAT_FILTER.sort;
  sel.onchange = () => { CHAT_FILTER.sort = sel.value; renderChatList(); };
}
function contactCard(c) {
  const ava = c.photo ? `<div class="chat-ava"><img class="av-img" src="${esc(c.photo)}" alt=""></div>`
    : `<div class="chat-ava" style="color:${c.accent || 'var(--accent)'}">${initials(c.name)}</div>`;
  const meta = c.rank
    ? `${NA.rankBadge(c.rank, { size: 'xs', glow: false })}<span>${NA.rankName(c.rank)}${c.palier ? ` · ${esc(c.palier)}` : ''}${typeof c.ventes === 'number' ? ` · ${c.ventes}v` : ''}</span>`
    : `<span>${esc(c.sub || '')}</span>`;
  return `<div class="chat-contact${CHAT.channel === c.uid ? ' on' : ''}" data-uid="${c.uid}" data-name="${esc(c.name)}">
    ${ava}<div style="min-width:0"><div class="ttl" style="font-size:.92rem">${esc(c.name)}</div>
      <div class="meta chat-rankmeta">${meta}</div></div>
    ${c.unread ? `<div class="chat-cdot">${c.unread}</div>` : '<span></span>'}</div>`;
}
function renderChatFilters() {
  const wrap = document.getElementById('chatFilters'); if (!wrap) return;
  const palOrder = ['STARTER', 'SILVER', 'GOLD'];
  const pals = palOrder.filter(p => CHAT_DATA.contacts.some(c => c.palier === p));
  const ranks = [...new Set(CHAT_DATA.contacts.map(c => c.rank).filter(Boolean))].sort((a, b) => NA.RANK_ORDER.indexOf(a) - NA.RANK_ORDER.indexOf(b));
  const chip = (v, lbl) => `<span class="chat-chip${CHAT_FILTER.f === v ? ' on' : ''}" data-chip="${v}">${esc(lbl)}</span>`;
  let h = chip('all', 'Tous');
  h += pals.map(p => chip('p:' + p, p[0] + p.slice(1).toLowerCase())).join('');
  h += ranks.map(r => chip('r:' + r, r)).join('');
  wrap.innerHTML = h;
  wrap.querySelectorAll('[data-chip]').forEach(x => x.onclick = () => { CHAT_FILTER.f = x.dataset.chip; renderChatFilters(); renderChatList(); });
}
function renderChatList() {
  const box = document.getElementById('chatList'); if (!box) return;
  const q = CHAT_FILTER.q.trim().toLowerCase(), f = CHAT_FILTER.f;
  let list = CHAT_DATA.contacts.filter(c =>
    (!q || [c.name, c.rank, c.palier, c.code].some(v => (v || '').toLowerCase().includes(q))) &&
    (f === 'all' || (f.startsWith('p:') ? c.palier === f.slice(2) : c.rank === f.slice(2))));
  const ro = (NA.RANK_ORDER || []);
  const cmp = { rank: (a, b) => (ro.indexOf(b.rank) - ro.indexOf(a.rank)) || ((b.ventes || 0) - (a.ventes || 0)),
    ventes: (a, b) => (b.ventes || 0) - (a.ventes || 0), az: (a, b) => (a.name || '').localeCompare(b.name || ''),
    recent: (a, b) => (b.last_at || 0) - (a.last_at || 0) };
  list = [...list].sort(cmp[CHAT_FILTER.sort] || cmp.rank);
  let html = '';
  if (f === 'all' && !q) html += `<div class="chat-sechead">Salon d'équipe</div>` + contactRow('general', 'Salon NEBULA', '', 'grp', CHAT_DATA.general.unread, CHAT_DATA.general.last, true);
  html += `<div class="chat-sechead">Partenaires & NEBULA · ${list.length}</div>`;
  html += list.length ? list.map(contactCard).join('') : `<div class="chat-empty-filter">Personne ne correspond à ta recherche.</div>`;
  box.innerHTML = html;
  box.querySelectorAll('[data-uid]').forEach(x => x.onclick = () => { sound.sfx.tab(); openConv(x.dataset.uid, x.dataset.name); });
}
function contactRow(uid, name, photo, grp, unread, last, isGen, accent, sub) {
  const ava = grp === 'grp' ? `<div class="chat-ava"><img class="av-img" src="/static/nebula-mark.png" alt=""></div>`
    : (photo ? `<div class="chat-ava"><img class="av-img" src="${esc(photo)}" alt=""></div>` : `<div class="chat-ava" style="color:${accent || 'var(--accent)'}">${initials(name)}</div>`);
  const subtxt = last || sub || (isGen ? "Toute l'équipe" : '');
  return `<div class="chat-contact${CHAT.channel === uid ? ' on' : ''}" data-uid="${uid}" data-name="${esc(name)}">
    ${ava}<div style="min-width:0"><div class="ttl" style="font-size:.92rem">${esc(name)}</div><div class="meta" style="white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${esc(subtxt)}</div></div>
    ${unread ? `<div class="chat-cdot">${unread}</div>` : '<span></span>'}</div>`;
}
async function openConv(channel, name) {
  CHAT.channel = channel; CHAT.convName = name;
  document.getElementById('chatWrap') && document.getElementById('chatWrap').classList.add('conv-open');
  document.querySelectorAll('.chat-contact').forEach(x => x.classList.toggle('on', x.dataset.uid === channel));
  const conv = document.getElementById('chatConv');
  const headAva = channel === 'general' ? `<div class="chat-ava" style="width:38px;height:38px"><img class="av-img" src="/static/nebula-mark.png" alt=""></div>` : `<div class="chat-ava" style="width:38px;height:38px">${initials(name)}</div>`;
  conv.innerHTML = `
    <div class="chat-head"><div class="chat-back" id="chatBack">${icon('arrow')}</div>${headAva}
      <div><div class="ttl" style="font-size:.98rem">${esc(name)}</div><div class="meta">${channel === 'general' ? "Salon d'équipe" : 'Conversation privée'}</div></div></div>
    <div class="chat-msgs" id="chatMsgs"><p class="muted center" style="padding:20px">Chargement…</p></div>
    <div class="chat-foot"><input id="chatInput" placeholder="Écris ton message…" maxlength="800"><button class="chat-sendbtn" id="chatSendBtn">${icon('send')}</button></div>`;
  document.getElementById('chatBack').onclick = () => { const w = document.getElementById('chatWrap'); w && w.classList.remove('conv-open'); CHAT.channel = null; stopConvPoll(); document.querySelectorAll('.chat-contact').forEach(x => x.classList.remove('on')); };
  const input = document.getElementById('chatInput');
  const send = async () => { const text = input.value.trim(); if (!text) return; input.value = ''; try { await api('/api/chat/send', { body: { to: channel, text } }); sound.sfx.msg(); await loadConv(); loadContacts(); } catch (e) { toast('Échec', 'bad'); } };
  document.getElementById('chatSendBtn').onclick = send;
  input.addEventListener('keydown', e => { if (e.key === 'Enter') send(); });
  await loadConv(); startConvPoll(); loadContacts();
}
async function loadConv() {
  if (!CHAT.channel) return;
  let d; try { d = await api('/api/chat/history?channel=' + encodeURIComponent(CHAT.channel)); } catch (e) { return; }
  const box = document.getElementById('chatMsgs'); if (!box) return;
  box.innerHTML = d.messages.length ? d.messages.map(msgRow).join('') : `<p class="muted center" style="padding:20px">Aucun message. Lance la conversation !</p>`;
  box.scrollTop = box.scrollHeight;
}
function msgRow(m) {
  const ava = m.photo ? `<div class="msg-ava"><img class="av-img" src="${esc(m.photo)}" alt=""></div>` : `<div class="msg-ava" style="color:${m.accent || 'var(--accent)'}">${initials(m.name)}</div>`;
  return `<div class="msg${m.mine ? ' me' : ''}">${ava}<div class="msg-col">${m.mine ? '' : `<div class="msg-name">${esc(m.name)}</div>`}<div class="msg-bub">${esc(m.text)}</div><div class="msg-time">${ago(m.created)}</div></div></div>`;
}
function startConvPoll() { stopConvPoll(); CHAT.convTimer = setInterval(() => { if (document.getElementById('v-messages').classList.contains('on') && CHAT.channel) loadConv(); }, 5000); }
function stopConvPoll() { if (CHAT.convTimer) { clearInterval(CHAT.convTimer); CHAT.convTimer = null; } }
function setMsgBadge(n) { const b = document.getElementById('navi-messages'); if (!b) return; const old = b.querySelector('.badge'); if (old) old.remove(); if (n > 0) b.appendChild(el(`<span class="badge">${n}</span>`)); }

/* ---- TEMPS RÉEL : signaux + sons quand ça bouge ---- */
let SIG = { notif: 0, chat: 0 };
async function startSignals() { await pollSignals(true); setInterval(() => pollSignals(false), 12000); }
async function pollSignals(first) {
  let d; try { d = await api('/api/signals'); } catch (e) { return; }
  setMsgBadge(d.chat_unread);
  const bell = document.getElementById('bell'); const ob = bell.querySelector('.badge'); if (ob) ob.remove();
  if (d.notif_unread) bell.appendChild(el(`<span class="badge">${d.notif_unread}</span>`));
  const active = document.querySelector('.view.on');
  if (!first) {
    if (d.notif_unread > SIG.notif) {
      sound.notif(d.notif_top && d.notif_top.kind); ringBell(); refreshNotifs();
      try { ME = await api('/api/partenaire/me'); LEADS = (await api('/api/partenaire/leads')).leads; } catch (e) {}
      if (active && active.id === 'v-home') renderHome();
      else if (active && active.id === 'v-clients') renderClients();
      else if (active && active.id === 'v-gains') renderGains();
    }
    if (d.chat_unread > SIG.chat) { sound.notif('message'); if (active && active.id === 'v-messages') { loadContacts(); if (CHAT.channel) loadConv(); } }
  }
  if (active && active.id === 'v-classement') renderClassement();
  SIG.notif = d.notif_unread; SIG.chat = d.chat_unread;
}

/* ---- notifications ---- */
const NKIND = {
  client: { c: 'var(--ok)', t: 'Nouveau client' }, vente: { c: '#36f5a0', t: 'Vente' },
  recrue: { c: 'var(--accent)', t: 'Recrue' }, commission: { c: '#e6c34c', t: 'Commission' },
  paiement: { c: '#e6c34c', t: 'Paiement' }, statut: { c: '#22d3ee', t: 'Statut' },
  publication: { c: '#a06bff', t: 'Publication' }, info: { c: 'var(--muted)', t: 'Info' },
};
function ringBell() { const b = document.getElementById('bell'); b.classList.remove('bell-ring'); void b.offsetWidth; b.classList.add('bell-ring'); }
async function refreshNotifs() {
  try {
    const d = await api('/api/partenaire/notifs');
    const bell = document.getElementById('bell');
    bell.querySelector('.badge')?.remove();
    if (d.unread) bell.appendChild(el(`<span class="badge">${d.unread}</span>`));
    const head = `<div class="nhead">${d.unread ? `<span class="pill">${d.unread}</span> non lue${d.unread > 1 ? 's' : ''} · ${d.notifs.length} au total` : `Tout est lu · ${d.notifs.length} notification${d.notifs.length > 1 ? 's' : ''}`}</div>`;
    document.getElementById('notif-list').innerHTML = d.notifs.length
      ? head + d.notifs.map(n => { const k = NKIND[n.kind] || NKIND.info; const go = NOTIF_NAV[n.kind]; return `<div class="row${go ? ' clickable' : ''}" ${go ? `data-go="${go}"` : ''} style="grid-template-columns:auto 1fr auto;${n.lu ? 'opacity:.6' : 'border-color:var(--hair-2)'}"><span class="ndot" style="color:${k.c};background:${k.c}"></span><div>${esc(n.text)}${go ? ` <span class="meta">— ouvrir</span>` : ''}</div><div class="meta">${ago(n.created)}</div></div>`; }).join('')
      : `<p class="muted center" style="padding:20px">Aucune notification.</p>`;
    document.querySelectorAll('#notif-list [data-go]').forEach(r => r.onclick = () => { sound.sfx.tab(); document.getElementById('notif-scrim').classList.remove('on'); switchView(r.dataset.go); });
  } catch (e) {}
}
const NOTIF_NAV = { client: 'clients', statut: 'clients', commission: 'gains', paiement: 'gains', recrue: 'reseau', publication: 'publi' };
document.getElementById('bell').onclick = async () => { sound.sfx.click(); document.getElementById('notif-scrim').classList.add('on'); await api('/api/partenaire/notifs/read', { body: {} }); setTimeout(refreshNotifs, 400); };
document.getElementById('notif-close').onclick = () => document.getElementById('notif-scrim').classList.remove('on');
document.getElementById('notif-scrim').onclick = e => { if (e.target.id === 'notif-scrim') e.target.classList.remove('on'); };
document.getElementById('notif-close').innerHTML = icon('close');

/* ---- son ---- */
function syncSnd() { document.getElementById('snd').innerHTML = icon(sound.enabled ? 'sound' : 'mute'); document.getElementById('amb').innerHTML = icon('music'); document.getElementById('amb').style.color = sound.ambient ? 'var(--accent)' : ''; }
document.getElementById('snd').onclick = () => { sound.toggle(); syncSnd(); };
document.getElementById('amb').onclick = () => { sound.toggleAmbient(); syncSnd(); };

/* ---- boot ---- */
(async function boot() {
  try { CFG = await api('/api/config'); } catch (e) {}
  try { ME = await api('/api/partenaire/me'); } catch (e) { location.href = '/'; return; }
  if (ME.accent) ROOT.style.setProperty('--accent', ME.accent);
  document.getElementById('p-name').textContent = ME.name;
  document.getElementById('p-rank').innerHTML = `<span style="display:inline-flex;align-items:center;gap:7px">${NA.rankBadge(ME.stats.rank.label, { size: 'sm', glow: false })}${NA.rankName(ME.stats.rank.label)}${ME.stats.is_supervisor ? NA.roleBadge(ME.stats.role_label, { size: 'sm' }) : ''}<span class="meta">· palier ${esc(ME.stats.palier.label)} ${ME.stats.palier.pct}%</span></span>`;
  document.getElementById('top-emblem').innerHTML = ME.photo ? `<img class="av-img" src="${ME.photo}" alt="">` : NA.rankBadge(ME.stats.rank.label, { size: 'md' });
  const rankBlock = document.querySelector('.topbar .rank');
  if (rankBlock) { rankBlock.classList.add('rank-click'); rankBlock.title = 'Voir l\'échelle des rangs'; rankBlock.onclick = () => NA.rankLadder({ label: ME.stats.rank.label, ventes: ME.stats.ventes }); }
  try { LEADS = (await api('/api/partenaire/leads')).leads; } catch (e) {}
  buildDock(); syncSnd(); document.getElementById('bell').innerHTML = icon('bell'); nova('ton coach perso'); switchView('home'); refreshNotifs(); startSignals();
  document.getElementById('help').innerHTML = icon('help');
  document.getElementById('help').onclick = () => NA.tour(TOUR);
  if (!localStorage.getItem('na_tour_p')) setTimeout(() => NA.tour(TOUR, 'na_tour_p'), 900);
  const lvl = ME.stats.rank.level, prev = +(localStorage.getItem('na_rank_' + ME.code) || lvl);
  if (lvl > prev) setTimeout(celebrate, 700);
  localStorage.setItem('na_rank_' + ME.code, lvl);
})();
</script>
