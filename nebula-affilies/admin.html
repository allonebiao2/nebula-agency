<script src="/static/app.js?v=20260620d"></script>
<script>
const { icon, api, toast, sound, countUp, reveal, esc, fmt, ago, el } = NA;
let CFG = null, OVER = null, AFFS = [], LEADS = [];

const NAV = [
  { id: 'dash', icon: 'chart', label: 'Tableau de bord' },
  { id: 'aff', icon: 'users', label: 'Affiliés' },
  { id: 'reseau', icon: 'spark', label: 'Réseau' },
  { id: 'leads', icon: 'folder', label: 'Clients' },
  { id: 'paiements', icon: 'coins', label: 'Paiements' },
  { id: 'recrues', icon: 'plus', label: 'Recrues' },
  { id: 'classement', icon: 'trophy', label: 'Classement' },
  { id: 'messages', icon: 'chat', label: 'Messages' },
  { id: 'docs', icon: 'doc', label: 'Documentation' },
  { id: 'publi', icon: 'megaphone', label: 'Publication' },
  { id: 'questions', icon: 'help', label: 'Questions prospects' },
];
const TITLES = { dash: 'Tableau de bord', aff: 'Réseau d\'affiliés', reseau: 'Arborescence du réseau', leads: 'Clients du réseau', paiements: 'Commissions à verser', recrues: 'Candidatures & recrues', classement: 'Classement du réseau', messages: 'Messagerie', docs: 'Documentation partenaires', publi: 'Contenus à publier', questions: 'Questions des prospects' };

const TOUR = [
  { icon: 'spark', title: 'Bienvenue dans ta console NEBULA', text: 'Le poste de pilotage de ton réseau d\'affiliés : tu suis les clients, tu valides les recrues, et tu paies les commissions. Voici chaque zone.' },
  { icon: 'chart', title: 'Tableau de bord', text: 'Vue d\'ensemble : affiliés actifs, clients reçus, payés, commissions dues, et le classement de tes meilleurs partenaires.' },
  { icon: 'users', title: 'Affiliés', text: 'Tes partenaires : rang, palier, ventes, RCM. Crée un nouveau partenaire (code + PIN générés), suspends/réactive si besoin.' },
  { icon: 'spark', title: 'Réseau', text: 'L\'arborescence complète : qui a recruté qui, sur toutes les branches (N1, N2…).' },
  { icon: 'folder', title: 'Clients', text: 'Tous les clients du réseau. Change le statut (attente → en cours → terminé) et marque le <b>paiement</b> : ça génère <b>automatiquement</b> les commissions (vendeur + N1 + N2) et alerte chacun.' },
  { icon: 'coins', title: 'Paiements', text: 'Les commissions à verser, groupées par affilié avec leur <b>numéro MoMo</b>. Les réclamations passent en tête. Après ton virement, clique <b>Marquer payé</b>.' },
  { icon: 'plus', title: 'Recrues', text: 'Les candidatures de nouveaux affiliés : les <b>candidatures publiques</b> (via « Devenir partenaire » sur le site, avec CGU acceptées) et les <b>recrues parrainées</b>. Valide → le partenaire est créé et rattaché à son parrain.' },
  { icon: 'trophy', title: 'Classement', text: 'Le niveau de tout ton réseau (rang, ventes, RCM, performance), en temps réel — pratique pour repérer qui pousser.' },
  { icon: 'chat', title: 'Messages', text: 'Communique avec tes partenaires : en privé ou dans le <b>salon NEBULA</b>. Tu peux mettre ta photo. Une tonalité sonne dès qu\'il y a du mouvement.' },
  { icon: 'doc', title: 'Documentation', text: 'La bibliothèque que voient tes partenaires (guides, fiches produits, argumentaires). Ajoute une note, un PDF ou un lien — la mise à jour est instantanée pour tout le monde.' },
  { icon: 'megaphone', title: 'Publication', text: 'Les contenus prêts à poster que tu donnes à tes partenaires (textes, visuels, vidéos, scripts) pour qu\'ils alimentent leurs réseaux et fassent venir des clients.' },
  { icon: 'help', title: 'Questions prospects', text: 'Tout ce que les visiteurs demandent à l\'assistant « Discuter avec NEBULA Agency » (site, hub, back-offices). Une mine d\'or : tu vois les <b>vraies questions</b> et objections de tes futurs clients.' },
  { icon: 'spark', title: 'NOVA — ton cerveau IA', text: 'Le bouton en bas à droite : pose-lui des questions sur ton réseau (qui pousser, qui relancer), il connaît tes vraies données en temps réel.' },
];
function statusPill(st) { const s = CFG.statuses[st] || { label: st, color: '#888' }; return `<span class="pill" style="--c:${s.color}"><span class="d"></span>${esc(s.label)}</span>`; }
function payDot(p) { return `<span class="pay ${p ? 'ok' : ''}"><span class="dot"></span>${p ? 'Payé' : 'Non payé'}</span>`; }
function initials(n) { return (n || '?').split(' ').filter(Boolean).slice(0, 2).map(x => x[0]).join('').toUpperCase(); }

function buildDock() {
  const nav = document.getElementById('nav');
  NAV.forEach(n => { const b = el(`<button class="nav-i" id="navi-${n.id}" data-v="${n.id}" title="${n.label}">${icon(n.icon)}</button>`); b.onclick = () => switchView(n.id); nav.appendChild(b); });
  document.getElementById('logout').innerHTML = icon('logout');
  document.getElementById('logout').onclick = async () => { await api('/api/logout', { body: {} }); location.href = '{{ADMIN_PATH}}'; };
}
function switchView(id) {
  sound.sfx.tab();
  document.querySelectorAll('.view').forEach(v => v.classList.remove('on'));
  document.getElementById('v-' + id).classList.add('on');
  document.querySelectorAll('.nav-i[data-v]').forEach(b => b.classList.toggle('on', b.dataset.v === id));
  document.getElementById('title').textContent = TITLES[id];
  ({ dash: renderDash, aff: renderAff, reseau: renderReseauAdmin, leads: renderLeads, paiements: renderPaiements, recrues: renderRecrues, classement: renderClassement, messages: renderMessages, docs: renderDocsAdmin, publi: renderPubliAdmin, questions: renderQuestions }[id])();
  reveal();
}

async function refresh() {
  [OVER, AFFS, LEADS] = await Promise.all([
    api('/api/admin/overview'),
    api('/api/admin/affiliates').then(d => d.affiliates),
    api('/api/admin/leads').then(d => d.leads),
  ]);
}

/* ---------- DASHBOARD ---------- */
function renderDash() {
  const board = AFFS.slice(0, 5);
  document.getElementById('v-dash').innerHTML = `
    <div class="bento">
      <div class="col-3 rv"><div class="card glow clickable" data-go="aff"><div class="in stat"><div class="lbl">Affiliés actifs</div><div class="num accent mono" id="k-aff">0</div></div></div></div>
      <div class="col-3 rv"><div class="card clickable" data-go="leads"><div class="in stat"><div class="lbl">Clients reçus</div><div class="num mono" id="k-leads">0</div></div></div></div>
      <div class="col-3 rv"><div class="card clickable" data-go="leads"><div class="in stat"><div class="lbl">Payés</div><div class="num mono" style="color:var(--ok)" id="k-paid">0</div></div></div></div>
      <div class="col-3 rv"><div class="card clickable" data-go="paiements"><div class="in stat"><div class="lbl">Commissions dues</div><div class="num mono" style="color:var(--gold)" id="k-com">0</div><div class="sub">F CFA</div></div></div></div>

      <div class="col-5 rv"><div class="card clickable" data-go="leads"><div class="in">
        <h3 class="mb16">Pipeline</h3>
        ${['attente', 'en_cours', 'termine', 'annule'].map(k => `
          <div class="flex between" style="padding:11px 0;border-bottom:1px solid var(--hair)">
            ${statusPill(k)}<b class="mono">${OVER.by_status[k] || 0}</b></div>`).join('')}
        <div class="flex between mt16"><span class="muted">CA encaissé</span><b class="mono" style="color:var(--ok)">${fmt(OVER.ca_paye)} F</b></div>
      </div></div></div>

      <div class="col-7 rv"><div class="card"><div class="in">
        <div class="flex between mb16"><h3>Classement</h3><button class="btn sm ghost" onclick="switchView('classement')">Tout voir<span class="ico">${icon('arrow')}</span></button></div>
        ${board.length ? board.map((a, i) => `
          <div class="row clickable" data-go="classement" style="grid-template-columns:auto 42px 1fr auto;margin-bottom:9px">
            <div class="mono faint" style="width:22px;font-weight:700">${i + 1}</div>
            <div class="emblem" style="width:42px;height:42px;border-radius:13px">${rankSvg(a.rank.label)}</div>
            <div><div class="ttl">${esc((a.prenom || '') + ' ' + (a.nom || '')) || a.code}</div><div class="meta">${a.rank.label} · ${a.nb_real} clients</div></div>
            <div class="center"><div class="mono" style="font-weight:700">${a.score}</div><div class="meta">pts</div></div>
          </div>`).join('') : `<p class="muted center" style="padding:20px">Aucun affilié. Crée ton premier partenaire dans l'onglet Affiliés.</p>`}
      </div></div></div>
    </div>`;
  countUp(document.getElementById('k-aff'), OVER.affiliates);
  countUp(document.getElementById('k-leads'), OVER.leads);
  countUp(document.getElementById('k-paid'), OVER.paid);
  countUp(document.getElementById('k-com'), OVER.commissions_dues, { money: true });
  document.querySelectorAll('#v-dash [data-go]').forEach(el => el.onclick = () => switchView(el.dataset.go));
}

/* ---------- AFFILIÉS ---------- */
function renderAff() {
  document.getElementById('v-aff').innerHTML = `
    <div class="flex between wrap mb24 rv"><div><span class="eyebrow"><span class="dot"></span>Réseau</span><h2 class="mt8" style="font-size:1.8rem">Tes partenaires</h2></div>
      <button class="btn primary" id="new-aff">Nouveau partenaire<span class="ico">${icon('plus')}</span></button></div>
    <div id="aff-list">${AFFS.length ? AFFS.map(affRow).join('') : `<div class="card"><div class="in center" style="padding:40px"><p class="muted">Aucun partenaire. Clique « Nouveau partenaire » pour générer un code + PIN.</p></div></div>`}</div>`;
  document.getElementById('new-aff').onclick = openNewAff;
  AFFS.forEach(a => {
    const t = document.getElementById('tog-' + a.id); if (t) t.onclick = () => toggleAff(a.id);
    const p = document.getElementById('pin-' + a.id); if (p) p.onclick = () => resetPin(a.id, ((a.prenom || '') + ' ' + (a.nom || '')).trim() || a.code);
  });
}
const RANK_ICON = { 'Recrue': 'spark', 'Météore': 'meteor', 'Comète': 'comet', 'Planète': 'planet', 'Étoile': 'star', 'Supernova': 'supernova', 'Nébuleuse': 'nebula', 'Galaxie': 'crown' };
const PALIER_COLOR = { 'STARTER': '#9aa0c0', 'SILVER': '#cdd6ef', 'GOLD': '#e7c987', 'SPÉCIAL': '#e6c34c' };
function rankSvg(label) { return icon(RANK_ICON[label] || 'spark'); }
function palBadge(p) { return `<span class="pal-badge" style="--c:${PALIER_COLOR[p.label] || '#9aa0c0'}">${esc(p.label)}</span>`; }

function affRow(a) {
  const name = ((a.prenom || '') + ' ' + (a.nom || '')).trim() || a.code;
  return `<div class="rv"><div class="card"><div class="in">
    <div class="flex between wrap" style="gap:14px">
      <div class="flex" style="gap:13px">
        <div class="emblem${a.rank.label === 'Galaxie' ? ' king' : ''}" style="width:52px;height:52px;border-radius:15px;--c:${a.accent}">${rankSvg(a.rank.label)}</div>
        <div><div class="ttl" style="font-size:1.05rem">${esc(name)} <span class="chip" style="margin-left:6px">${a.code}</span></div>
          <div class="meta" style="display:flex;align-items:center;gap:8px;flex-wrap:wrap">${a.rank.label} · ${a.ventes} vente${a.ventes > 1 ? 's' : ''} · ${palBadge(a.palier)} ${a.palier.pct}%${a.actif ? '' : ' · <span style="color:var(--bad)">suspendu</span>'}</div>
          <div class="meta mt8">${esc(a.momo_reseau || '—')} · ${esc(a.momo_number || '—')}</div></div>
      </div>
      <div class="flex gap8 wrap" style="justify-content:flex-end">
        <div class="center"><div class="mono" style="font-weight:700">${a.score}</div><div class="meta">score</div></div>
        <div class="center"><div class="mono" style="color:var(--accent);font-weight:700">${fmt(a.rcm)}</div><div class="meta">RCM (F)</div></div>
        <button class="btn sm ghost" id="pin-${a.id}" title="Régénérer et renvoyer le PIN">Renvoyer accès<span class="ico">${icon('copy')}</span></button>
        <button class="btn sm ghost" id="tog-${a.id}">${a.actif ? 'Suspendre' : 'Réactiver'}</button>
      </div>
    </div>
    <div class="xp"><div class="track"><div class="fill" style="width:${a.rank.xp_pct}%;--accent:${a.accent}"></div></div>
      <div class="meta">${a.rank.next_label ? `Encore ${a.rank.to_next} pour ${a.rank.next_emoji} ${a.rank.next_label}` : 'Rang max'}</div></div>
  </div></div></div>`;
}
async function toggleAff(id) { try { await api('/api/admin/affiliates/' + id + '/toggle', { body: {} }); sound.sfx.click(); await refresh(); renderAff(); reveal(); } catch (e) { toast('Erreur', 'bad'); } }

function openNewAff() {
  sound.sfx.open();
  document.getElementById('modal-in').innerHTML = `
    <div class="flex between mb16"><h3>Nouveau partenaire</h3><button class="icon-btn" id="m-close" style="width:34px;height:34px">${icon('close')}</button></div>
    <div class="bento" style="gap:0 14px">
      <div class="col-6 field"><label>Prénom</label><div class="wrap"><input id="na-prenom" placeholder="Prénom du partenaire"></div></div>
      <div class="col-6 field"><label>Nom</label><div class="wrap"><input id="na-nom" placeholder="Nom du partenaire"></div></div>
    </div>
    <div class="field"><label>Numéro Mobile Money</label><div class="wrap"><input id="na-momo" inputmode="tel" placeholder="01 90 00 00 00"></div></div>
    <div class="field"><label>Réseau</label><div class="wrap"><select id="na-res">${CFG.reseaux.map(r => `<option>${r}</option>`).join('')}</select></div></div>
    <button class="btn primary block mt8" id="na-go">Générer le code partenaire<span class="ico">${icon('bolt')}</span></button>`;
  document.getElementById('modal').classList.add('on');
  document.getElementById('m-close').onclick = closeModal;
  document.getElementById('na-go').onclick = createAff;
}
function closeModal() { document.getElementById('modal').classList.remove('on'); }
document.getElementById('modal').onclick = e => { if (e.target.id === 'modal') closeModal(); };

async function createAff() {
  const body = { prenom: document.getElementById('na-prenom').value.trim(), nom: document.getElementById('na-nom').value.trim(), momo_number: document.getElementById('na-momo').value.trim(), momo_reseau: document.getElementById('na-res').value };
  if (!(body.prenom || body.nom)) return toast('Nom requis', 'bad');
  try {
    const d = await api('/api/admin/affiliates', { body });
    sound.sfx.cash();
    renderAccessKit({ title: 'Partenaire créé', code: d.code, pin: d.pin, name: (body.prenom + ' ' + body.nom).trim(), onDone: renderAff });
  } catch (e) { toast(e.data?.error || 'Erreur', 'bad'); }
}
async function resetPin(id, name) {
  if (!confirm(`Générer un NOUVEAU PIN pour ${name} ? L'ancien ne fonctionnera plus.`)) return;
  try { const d = await api(`/api/admin/affiliates/${id}/reset-pin`, { body: {} }); sound.sfx.cash(); renderAccessKit({ title: 'Accès réinitialisés', code: d.code, pin: d.pin, name, onDone: renderAff }); }
  catch (e) { toast('Erreur', 'bad'); }
}

/* ---------- CLIENTS (le cœur : Mongazi pilote les statuts) ---------- */
/* ===== Arborescence NEBULA — org-chart pyramide (apex = NEBULA Agency) ===== */
const ORG_COLORS = ['#7b5cff', '#22d3ee', '#36f5a0', '#e6c34c', '#ff5c7a', '#4cc6ff', '#c79bff', '#ff9a5a'];
let ORG = null;

function orgComputeTeam(n) {
  let size = 0, ventes = 0;
  (n.children || []).forEach(ch => {
    const t = orgComputeTeam(ch);
    size += 1 + t.size; ventes += (ch.ventes || 0) + t.ventes;
  });
  n._team = size; n._teamVentes = ventes;
  return { size, ventes };
}

function orgCard(n, tc, apex) {
  const teamCount = n._team || 0;
  const head = apex
    ? `<img src="/static/nebula-logo.png?v=20260620d" alt="NEBULA Agency"><div class="oname">NEBULA Agency</div>`
    : `<div class="ohead">${NA.rankBadge(n.rank, { size: 'sm', glow: false })}
        <div style="min-width:0"><div class="oname">${esc(n.name)}</div><div class="ocode">${esc(n.code)}</div></div></div>`;
  const owedChip = (!apex && n.owed > 0)
    ? `<span class="ochip owed" title="Commissions à verser">${fmt(n.owed)} F ${n.claimed > 0 ? 'à payer' : 'dû'}</span>` : '';
  const stats = apex
    ? `<div class="ostats"><span class="ochip"><b>${ORG.total}</b> affiliés</span><span class="ochip"><b>${fmt(ORG.totalVentes)}</b> ventes réseau</span></div>`
    : `<div class="orank">${NA.rankName(n.rank)} · palier ${esc(n.palier)}</div>
       <div class="ostats"><span class="ochip"><b>${n.ventes}</b> vente${n.ventes > 1 ? 's' : ''}</span>
       ${n.clients ? `<span class="ochip"><b>${n.clients}</b> client${n.clients > 1 ? 's' : ''}</span>` : ''}
       ${owedChip}
       ${teamCount ? `<span class="ochip team" title="Toute la branche sous ${esc(n.name)}"><b>${teamCount}</b> équipe</span>` : ''}</div>`;
  const toggle = (teamCount && !apex) ? `<button class="otoggle" title="Replier / déplier la branche">− ${teamCount}</button>` : '';
  const cls = `onode ${apex ? 'apex' : ''} ${(!apex && n.owed > 0) ? 'owed' : ''} ${(!apex && n.claimed > 0) ? 'urgent' : ''}`;
  return `<div class="${cls}" style="--tc:${tc}" data-id="${apex ? '' : (n.id || '')}" data-name="${esc((n.name || '').toLowerCase())}" data-code="${esc((n.code || '').toLowerCase())}">${head}${stats}${toggle}</div>`;
}

function orgLi(n, tc, apex) {
  const kids = n.children || [];
  let html = orgCard(n, tc, apex);
  if (kids.length) html += `<ul>${kids.map((ch, i) => orgLi(ch, apex ? ORG_COLORS[i % ORG_COLORS.length] : tc, false)).join('')}</ul>`;
  return `<li>${html}</li>`;
}

async function renderReseauAdmin() {
  let d; try { d = await api('/api/admin/network'); } catch (e) { return; }
  const accent = getComputedStyle(document.documentElement).getPropertyValue('--accent').trim() || '#7b5cff';
  const apex = { name: 'NEBULA Agency', code: '', rank: 'Galaxie', palier: '', ventes: 0, children: d.roots || [] };
  orgComputeTeam(apex); d.totalVentes = apex._teamVentes; ORG = d;
  const body = (d.roots && d.roots.length)
    ? `<ul class="org">${orgLi(apex, accent, true)}</ul>`
    : `<div class="org-empty">Aucun affilié pour l'instant.</div>`;
  document.getElementById('v-reseau').innerHTML = `
    <div class="rv mb16"><span class="eyebrow"><span class="dot"></span>Réseau</span>
      <h2 class="mt8" style="font-size:1.8rem">L'arborescence NEBULA Agency</h2>
      <p class="muted mt8">${d.total} affilié(s) · toute la pyramide : équipes, branches, ventes. Glisse pour déplacer · molette / pince pour zoomer.</p></div>
    <div class="org-toolbar rv">
      <div class="org-search">${icon('search')}<input id="org-q" placeholder="Chercher un partenaire (nom ou code)…"></div>
      <button class="org-btn" id="org-fit">${icon('grid')}Ajuster</button>
      <button class="org-btn" id="org-zin">${icon('plus')}</button>
      <button class="org-btn" id="org-zout">−</button>
      <button class="org-btn" id="org-expand">Tout déplier</button>
      <button class="org-btn" id="org-collapse">Vue d'ensemble</button>
    </div>
    <div class="org-stage rv" id="org-stage"><div class="org-pan" id="org-pan">${body}</div></div>`;
  wireOrg();
}

let ORG_CTRL = null;
function wireOrg() {
  const stage = document.getElementById('org-stage'), pan = document.getElementById('org-pan');
  if (!stage || !pan) { ORG_CTRL = null; return; }
  let scale = 1, tx = 0, ty = 0, drag = false, moved = false, sx = 0, sy = 0, dx0 = 0, dy0 = 0;
  const apply = () => { pan.style.transform = `translate(${tx}px,${ty}px) scale(${scale})`; };
  const clampS = (s) => Math.max(0.2, Math.min(2.6, s));
  const setTog = (t, sign) => { t.textContent = sign + ' ' + t.textContent.replace(/^[+\-]\s*/, ''); };
  function fit() {
    const cw = pan.scrollWidth, ch = pan.scrollHeight, sw = stage.clientWidth, sh = stage.clientHeight;
    if (!cw || !ch) return;
    scale = clampS(Math.min(sw / cw, sh / ch, 1));
    tx = Math.max(10, (sw - cw * scale) / 2); ty = 16; apply();
  }
  function expandAncestors(node) {
    let p = node.closest('li');
    while (p) { p.classList.remove('collapsed'); const t = p.querySelector(':scope > .onode .otoggle'); if (t) setTog(t, '−'); p = p.parentElement ? p.parentElement.closest('li') : null; }
  }
  function centerOn(node) {
    const sr = stage.getBoundingClientRect(), nr = node.getBoundingClientRect();
    tx += (sr.width / 2 - (nr.left - sr.left + nr.width / 2));
    ty += (sr.height / 2 - (nr.top - sr.top + nr.height / 2)); apply();
  }
  function focusNode(node) {
    pan.querySelectorAll('.onode.hit').forEach(n => n.classList.remove('hit'));
    expandAncestors(node); node.classList.add('hit'); requestAnimationFrame(() => centerOn(node));
  }
  function focusById(id) { const n = pan.querySelector('.onode[data-id="' + String(id) + '"]'); if (!n) return false; focusNode(n); return true; }
  ORG_CTRL = { fit, focusById };

  pan.addEventListener('click', e => {
    if (moved) return;                                   // glissement, pas un clic
    const tog = e.target.closest('.otoggle');
    if (tog) { const li = tog.closest('li'); if (li) { setTog(tog, li.classList.toggle('collapsed') ? '+' : '−'); sound.sfx.tab(); } return; }
    const node = e.target.closest('.onode');
    if (node && node.dataset.id) { pan.querySelectorAll('.onode.hit').forEach(n => n.classList.remove('hit')); node.classList.add('hit'); openAffiliate(node.dataset.id); }
  });
  stage.addEventListener('pointerdown', e => { drag = true; moved = false; dx0 = e.clientX; dy0 = e.clientY; sx = e.clientX - tx; sy = e.clientY - ty; stage.classList.add('grabbing'); try { stage.setPointerCapture(e.pointerId); } catch (x) {} });
  stage.addEventListener('pointermove', e => { if (!drag) return; if (Math.abs(e.clientX - dx0) + Math.abs(e.clientY - dy0) > 6) moved = true; tx = e.clientX - sx; ty = e.clientY - sy; apply(); });
  const end = () => { drag = false; stage.classList.remove('grabbing'); setTimeout(() => { moved = false; }, 40); };
  stage.addEventListener('pointerup', end); stage.addEventListener('pointercancel', end);
  stage.addEventListener('wheel', e => {
    e.preventDefault();
    const r = stage.getBoundingClientRect(), cx = e.clientX - r.left, cy = e.clientY - r.top;
    const ns = clampS(scale * (e.deltaY < 0 ? 1.12 : 0.89));
    tx = cx - (cx - tx) * (ns / scale); ty = cy - (cy - ty) * (ns / scale); scale = ns; apply();
  }, { passive: false });
  document.getElementById('org-fit').onclick = fit;
  document.getElementById('org-zin').onclick = () => { scale = clampS(scale * 1.18); apply(); };
  document.getElementById('org-zout').onclick = () => { scale = clampS(scale * 0.85); apply(); };
  document.getElementById('org-expand').onclick = () => {
    pan.querySelectorAll('li.collapsed').forEach(li => li.classList.remove('collapsed'));
    pan.querySelectorAll('.otoggle').forEach(t => setTog(t, '−')); fit();
  };
  document.getElementById('org-collapse').onclick = () => {
    pan.querySelectorAll('.org > li > ul > li').forEach(li => {
      const t = li.querySelector(':scope > .onode .otoggle');
      if (t) { li.classList.add('collapsed'); setTog(t, '+'); }
    }); fit();
  };
  const q = document.getElementById('org-q');
  if (q) q.addEventListener('keydown', e => {
    if (e.key !== 'Enter') return;
    const qq = q.value.trim().toLowerCase();
    pan.querySelectorAll('.onode.hit').forEach(n => n.classList.remove('hit'));
    if (!qq) return;
    const node = [...pan.querySelectorAll('.onode')].find(n => (n.dataset.name || '').includes(qq) || (n.dataset.code || '').includes(qq));
    if (!node) { toast('Aucun partenaire trouvé', 'bad'); return; }
    focusNode(node); sound.sfx.ok();
  });
  setTimeout(fit, 80);
}

function gotoAffiliate(aid, openDrawer = true) {
  aid = String(aid);
  const active = document.querySelector('.view.on');
  const tryFocus = tries => {
    if (ORG_CTRL && ORG_CTRL.focusById(aid)) { if (openDrawer) openAffiliate(aid); return; }
    if (tries > 0) setTimeout(() => tryFocus(tries - 1), 220);

  };
  if (active && active.id === 'v-reseau') tryFocus(8);
  else { switchView('reseau'); setTimeout(() => tryFocus(16), 350); }
}

async function setStatus(id, st) {
  try { await api(`/api/admin/leads/${id}/status`, { body: { status: st } }); sound.sfx.ok(); toast('Statut mis à jour · affilié notifié', 'ok'); await refresh(); renderLeads(); reveal(); }
  catch (e) { toast('Erreur', 'bad'); }
}
async function setPay(id, paye) {
  try { await api(`/api/admin/leads/${id}/payment`, { body: { paye } }); if (paye) { sound.sfx.cash(); toast('Paiement enregistré', 'ok'); } else sound.sfx.click(); await refresh(); renderLeads(); reveal(); }
  catch (e) { toast('Erreur', 'bad'); }
}

/* ---------- DOCUMENTATION (admin gère) ---------- */
function isNew(ts) { return (Date.now() / 1000 - ts) < 7 * 86400; }
async function postForm(path, fields, fileInput) {
  const fd = new FormData();
  Object.entries(fields).forEach(([k, v]) => fd.append(k, v == null ? '' : v));
  if (fileInput && fileInput.files && fileInput.files[0]) fd.append('file', fileInput.files[0]);
  const r = await fetch(path, { method: 'POST', credentials: 'same-origin', body: fd });
  let data = {}; try { data = await r.json(); } catch (e) {}
  if (!r.ok || data.ok === false) throw Object.assign(new Error(data.error || 'Erreur'), { data });
  return data;
}

const KIND_LABEL = { note: 'Note', pdf: 'PDF', link: 'Lien' };

    <div id="d-link-wrap" class="field hide"><label>Lien (URL)</label><div class="wrap"><input id="d-url" value="${x ? esc(x.url || '') : ''}" placeholder="https://…"></div></div>

    const k = kindSel.value;
    document.getElementById('d-note-wrap').classList.toggle('hide', k !== 'note');
    document.getElementById('d-pdf-wrap').classList.toggle('hide', k !== 'pdf');
    document.getElementById('d-link-wrap').classList.toggle('hide', k !== 'link');
  };
  kindSel.onchange = syncKind; syncKind();

  document.getElementById('d-up').onclick = () => fileInput.click();
  fileInput.onchange = () => { document.getElementById('d-fname').textContent = fileInput.files[0]?.name || 'Choisir un fichier PDF…'; };

async function saveDoc(id) {
  const kind = document.getElementById('d-kind').value;
  const title = document.getElementById('d-title').value.trim();
  if (!title) return toast('Titre requis', 'bad');
  let body = '';
  if (kind === 'note') {
    const raw = document.getElementById('d-body').value.trim();
    body = /<[a-z][\s\S]*>/i.test(raw) ? raw : raw.split(/\n{2,}/).map(p => `<p>${esc(p).replace(/\n/g, '<br>')}</p>`).join('');
  }
  const fields = { doc_id: id, title, category: document.getElementById('d-cat').value, description: document.getElementById('d-desc').value.trim(), kind, body, url: kind === 'link' ? document.getElementById('d-url').value.trim() : '' };
  try { await postForm('/api/admin/documents', fields, kind === 'pdf' ? document.getElementById('d-file') : null); sound.sfx.cash(); toast('Document enregistré ✓', 'ok'); closeModal(); renderDocsAdmin(); }
  catch (e) { toast(e.data?.error || 'Erreur', 'bad'); }
}
async function deleteDoc(id) {
  if (!confirm('Supprimer ce document définitivement ?')) return;
  try { await api(`/api/admin/documents/${id}/delete`, { body: {} }); sound.sfx.click(); toast('Document supprimé'); renderDocsAdmin(); }
  catch (e) { toast('Erreur', 'bad'); }
}

      </select></div>
    </div><div id="chatList"></div>`;
  const inp = document.getElementById('chatSearch');
  inp.value = CHAT_FILTER.q;
  inp.oninput = () => { CHAT_FILTER.q = inp.value; renderChatList(); };
  const sel = document.getElementById('chatSort');
  sel.value = CHAT_FILTER.sort;
  sel.onchange = () => { CHAT_FILTER.sort = sel.value; renderChatList(); };
}
function contactCard(c) {
  const ava = c.photo ? `<div class="chat-ava"><img class="av-img" src="${esc(c.photo)}" alt=""></div>`
    : `<div class="chat-ava" style="color:${c.accent || 'var(--accent)'}">${initials(c.name)}</div>`;
  const meta = c.rank
    ? `${NA.rankBadge(c.rank, { size: 'xs', glow: false })}<span>${NA.rankName(c.rank)}${c.palier ? ` · ${esc(c.palier)}` : ''}${typeof c.ventes === 'number' ? ` · ${c.ventes}v` : ''}${c.code ? ` · ${esc(c.code)}` : ''}</span>`
    : `<span>${esc(c.sub || '')}</span>`;
  return `<div class="chat-contact${CHAT.channel === c.uid ? ' on' : ''}" data-uid="${c.uid}" data-name="${esc(c.name)}">
    ${ava}<div style="min-width:0"><div class="ttl" style="font-size:.92rem">${esc(c.name)}</div>
      <div class="meta chat-rankmeta">${meta}</div></div>
    ${c.unread ? `<div class="chat-cdot">${c.unread}</div>` : '<span></span>'}</div>`;
}
function renderChatFilters() {
  const wrap = document.getElementById('chatFilters'); if (!wrap) return;
  const palOrder = ['STARTER', 'SILVER', 'GOLD'];
  const pals = palOrder.filter(p => CHAT_DATA.contacts.some(c => c.palier === p));
  const ranks = [...new Set(CHAT_DATA.contacts.map(c => c.rank).filter(Boolean))].sort((a, b) => NA.RANK_ORDER.indexOf(a) - NA.RANK_ORDER.indexOf(b));
  const chip = (v, lbl) => `<span class="chat-chip${CHAT_FILTER.f === v ? ' on' : ''}" data-chip="${v}">${esc(lbl)}</span>`;
  let h = chip('all', 'Tous');
  h += pals.map(p => chip('p:' + p, p[0] + p.slice(1).toLowerCase())).join('');
  h += ranks.map(r => chip('r:' + r, r)).join('');
  wrap.innerHTML = h;
  wrap.querySelectorAll('[data-chip]').forEach(x => x.onclick = () => { CHAT_FILTER.f = x.dataset.chip; renderChatFilters(); renderChatList(); });
}
function renderChatList() {
  const box = document.getElementById('chatList'); if (!box) return;
  const q = CHAT_FILTER.q.trim().toLowerCase(), f = CHAT_FILTER.f;
  let list = CHAT_DATA.contacts.filter(c =>
    (!q || [c.name, c.rank, c.palier, c.code].some(v => (v || '').toLowerCase().includes(q))) &&
    (f === 'all' || (f.startsWith('p:') ? c.palier === f.slice(2) : c.rank === f.slice(2))));
  const ro = (NA.RANK_ORDER || []);
  const cmp = { rank: (a, b) => (ro.indexOf(b.rank) - ro.indexOf(a.rank)) || ((b.ventes || 0) - (a.ventes || 0)),
    ventes: (a, b) => (b.ventes || 0) - (a.ventes || 0), az: (a, b) => (a.name || '').localeCompare(b.name || ''),
    recent: (a, b) => (b.last_at || 0) - (a.last_at || 0) };
  list = [...list].sort(cmp[CHAT_FILTER.sort] || cmp.rank);
  let html = '';
  if (f === 'all' && !q) html += `<div class="chat-sechead">Salon d'équipe</div>` + contactRow('general', 'Salon NEBULA', '', 'grp', CHAT_DATA.general.unread, CHAT_DATA.general.last, true);
  html += `<div class="chat-sechead">Partenaires · ${list.length}</div>`;
  html += list.length ? list.map(contactCard).join('') : `<div class="chat-empty-filter">Aucun partenaire ne correspond.</div>`;
  box.innerHTML = html;
  box.querySelectorAll('[data-uid]').forEach(x => x.onclick = () => { sound.sfx.tab(); openConv(x.dataset.uid, x.dataset.name); });
}
function contactRow(uid, name, photo, grp, unread, last, isGen, accent, sub) {
  const ava = grp === 'grp' ? `<div class="chat-ava"><img class="av-img" src="/static/nebula-mark.png" alt=""></div>`
    : (photo ? `<div class="chat-ava"><img class="av-img" src="${esc(photo)}" alt=""></div>` : `<div class="chat-ava" style="color:${accent || 'var(--accent)'}">${initials(name)}</div>`);
  const subtxt = last || sub || (isGen ? "Toute l'équipe" : '');
  return `<div class="chat-contact${CHAT.channel === uid ? ' on' : ''}" data-uid="${uid}" data-name="${esc(name)}">
    ${ava}<div style="min-width:0"><div class="ttl" style="font-size:.92rem">${esc(name)}</div><div class="meta" style="white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${esc(subtxt)}</div></div>
    ${unread ? `<div class="chat-cdot">${unread}</div>` : '<span></span>'}</div>`;
}
async function openConv(channel, name) {
  CHAT.channel = channel; CHAT.convName = name;
  const w = document.getElementById('chatWrap'); if (w) w.classList.add('conv-open');
  document.querySelectorAll('.chat-contact').forEach(x => x.classList.toggle('on', x.dataset.uid === channel));
  const headAva = channel === 'general' ? `<div class="chat-ava" style="width:38px;height:38px"><img class="av-img" src="/static/nebula-mark.png" alt=""></div>` : `<div class="chat-ava" style="width:38px;height:38px">${initials(name)}</div>`;
  document.getElementById('chatConv').innerHTML = `
    <div class="chat-head"><div class="chat-back" id="chatBack">${icon('arrow')}</div>${headAva}
      <div><div class="ttl" style="font-size:.98rem">${esc(name)}</div><div class="meta">${channel === 'general' ? "Salon d'équipe" : 'Conversation privée'}</div></div></div>
    <div class="chat-msgs" id="chatMsgs"><p class="muted center" style="padding:20px">Chargement…</p></div>
    <div class="chat-foot"><input id="chatInput" placeholder="Écris ton message…" maxlength="800"><button class="chat-sendbtn" id="chatSendBtn">${icon('send')}</button></div>`;
  document.getElementById('chatBack').onclick = () => { const w2 = document.getElementById('chatWrap'); if (w2) w2.classList.remove('conv-open'); CHAT.channel = null; stopConvPoll(); document.querySelectorAll('.chat-contact').forEach(x => x.classList.remove('on')); };
  const input = document.getElementById('chatInput');
  const send = async () => { const text = input.value.trim(); if (!text) return; input.value = ''; try { await api('/api/chat/send', { body: { to: channel, text } }); sound.sfx.msg(); await loadConv(); loadContacts(); } catch (e) { toast('Échec', 'bad'); } };
  document.getElementById('chatSendBtn').onclick = send;
  input.addEventListener('keydown', e => { if (e.key === 'Enter') send(); });
  await loadConv(); startConvPoll(); loadContacts();
}
async function loadConv() {
  if (!CHAT.channel) return;
  let d; try { d = await api('/api/chat/history?channel=' + encodeURIComponent(CHAT.channel)); } catch (e) { return; }
  const box = document.getElementById('chatMsgs'); if (!box) return;
  box.innerHTML = d.messages.length ? d.messages.map(msgRow).join('') : `<p class="muted center" style="padding:20px">Aucun message. Lance la conversation !</p>`;
  box.scrollTop = box.scrollHeight;
}
function msgRow(m) {
  const ava = m.photo ? `<div class="msg-ava"><img class="av-img" src="${esc(m.photo)}" alt=""></div>` : `<div class="msg-ava" style="color:${m.accent || 'var(--accent)'}">${initials(m.name)}</div>`;
  return `<div class="msg${m.mine ? ' me' : ''}">${ava}<div class="msg-col">${m.mine ? '' : `<div class="msg-name">${esc(m.name)}</div>`}<div class="msg-bub">${esc(m.text)}</div><div class="msg-time">${ago(m.created)}</div></div></div>`;
}
function startConvPoll() { stopConvPoll(); CHAT.convTimer = setInterval(() => { if (document.getElementById('v-messages').classList.contains('on') && CHAT.channel) loadConv(); }, 5000); }
function stopConvPoll() { if (CHAT.convTimer) { clearInterval(CHAT.convTimer); CHAT.convTimer = null; } }
function setMsgBadge(n) { const b = document.getElementById('navi-messages'); if (!b) return; const old = b.querySelector('.badge'); if (old) old.remove(); if (n > 0) b.appendChild(el(`<span class="badge">${n}</span>`)); }

/* ---------- QUESTIONS DES PROSPECTS (assistant « Discuter avec NEBULA Agency ») ---------- */
function qaCard(x) {
  return `<div class="rv"><div class="card"><div class="in">
    <div class="flex between" style="gap:12px;align-items:flex-start">
      <div class="ttl" style="font-size:1.04rem;line-height:1.45">${esc(x.question)}</div>
      <div class="meta" style="white-space:nowrap;flex:0 0 auto">${ago(x.created)}</div>
    </div>
    <div class="divider"></div>
    <div class="meta" style="line-height:1.6;color:var(--muted);white-space:pre-wrap">${esc(x.answer)}</div>
  </div></div></div>`;
}
async function renderQuestions() {
  let d; try { d = await api('/api/admin/agency-chats'); } catch (e) { d = { total: 0, chats: [] }; }
  document.getElementById('v-questions').innerHTML = `
    <div class="flex between wrap mb24 rv"><div>
      <span class="eyebrow"><span class="dot"></span>Assistant « Discuter avec NEBULA Agency »</span>
      <h2 class="mt8" style="font-size:1.8rem">Questions des prospects</h2>
      <p class="muted mt8" style="max-width:560px">Tout ce que les visiteurs demandent à NEBULA Agency (site, lien hub, back-offices). Repère les <b>objections</b> et les <b>besoins récurrents</b> pour affûter ton discours.</p>
    </div>
      <div class="flex gap8" style="align-items:center"><span class="chip" style="color:var(--accent)">${d.total} question${d.total > 1 ? 's' : ''}</span>
      <button class="btn sm ghost" id="q-refresh">Actualiser<span class="ico">${icon('arrow')}</span></button></div></div>
    <div id="q-list">${d.chats.length
      ? d.chats.map(qaCard).join('')
      : `<div class="card"><div class="in center" style="padding:44px"><p class="muted">Aucune question pour l'instant. Dès qu'un visiteur discute avec NEBULA Agency, sa question et la réponse apparaissent ici.</p></div></div>`}</div>`;
  const r = document.getElementById('q-refresh'); if (r) r.onclick = () => { sound.sfx.click(); renderQuestions(); };
  reveal();
}

/* ---------- TEMPS RÉEL : signaux + sons ---------- */
let SIG = { notif: 0, chat: 0 };
async function startSignals() { await pollSignals(true); setInterval(() => pollSignals(false), 12000); }
async function pollSignals(first) {
  let d; try { d = await api('/api/signals'); } catch (e) { return; }
  setMsgBadge(d.chat_unread);
  const bell = document.getElementById('bell'); const ob = bell.querySelector('.badge'); if (ob) ob.remove();
  if (d.notif_unread) bell.appendChild(el(`<span class="badge">${d.notif_unread}</span>`));
  const active = document.querySelector('.view.on');
  if (!first) {
    if (d.notif_unread > SIG.notif) {
      sound.notif(d.notif_top && d.notif_top.kind); ringBell();
      refreshNotifs(); try { await refresh(); } catch (e) {}
      if (active) { if (active.id === 'v-dash') renderDash(); else if (active.id === 'v-leads') renderLeads(); else if (active.id === 'v-paiements') renderPaiements(); else if (active.id === 'v-recrues') renderRecrues(); else if (active.id === 'v-aff') renderAff(); }
    }
    if (d.chat_unread > SIG.chat) { sound.notif('message'); if (active && active.id === 'v-messages') { loadContacts(); if (CHAT.channel) loadConv(); } }
  }
  if (active && active.id === 'v-classement') renderClassement();
  SIG.notif = d.notif_unread; SIG.chat = d.chat_unread;
}

/* ---------- notifications ---------- */
const NKIND = {
  client: { c: 'var(--ok)', t: 'Nouveau client' }, vente: { c: '#36f5a0', t: 'Vente' },
  recrue: { c: 'var(--accent)', t: 'Recrue' }, commission: { c: '#e6c34c', t: 'Commission' },
  paiement: { c: '#e6c34c', t: 'Paiement' }, statut: { c: '#22d3ee', t: 'Statut' },
  publication: { c: '#a06bff', t: 'Publication' }, info: { c: 'var(--muted)', t: 'Info' },
};
function ringBell() { const b = document.getElementById('bell'); b.classList.remove('bell-ring'); void b.offsetWidth; b.classList.add('bell-ring'); }
async function refreshNotifs() {
  try {
    const d = await api('/api/admin/notifs');
    const bell = document.getElementById('bell'); bell.querySelector('.badge')?.remove();
    if (d.unread) bell.appendChild(el(`<span class="badge">${d.unread}</span>`));
    const head = `<div class="nhead">${d.unread ? `<span class="pill">${d.unread}</span> non lue${d.unread > 1 ? 's' : ''} · ${d.notifs.length} au total` : `Tout est lu · ${d.notifs.length} notification${d.notifs.length > 1 ? 's' : ''}`}</div>`;
    document.getElementById('notif-list').innerHTML = d.notifs.length
      ? head + d.notifs.map(n => {
          const k = NKIND[n.kind] || NKIND.info;
          const aff = (n.ref_aff && n.ref_aff > 0) ? n.ref_aff : 0;
          const go = aff ? '' : (NOTIF_NAV[n.kind] || '');
          const clickable = aff || go;
          const label = aff ? '— voir dans la pyramide' : (go ? '— ouvrir' : '');
          return `<div class="row${clickable ? ' clickable' : ''}" ${aff ? `data-aff="${aff}"` : (go ? `data-go="${go}"` : '')} style="grid-template-columns:auto 1fr auto;${n.lu ? 'opacity:.6' : 'border-color:var(--hair-2)'}"><span class="ndot" style="color:${k.c};background:${k.c}"></span><div>${esc(n.text)}${clickable ? ` <span class="meta">${label}</span>` : ''}</div><div class="meta">${ago(n.created)}</div></div>`;
        }).join('')
      : `<p class="muted center" style="padding:20px">Aucune notification.</p>`;
    const closeNotif = () => document.getElementById('notif-scrim').classList.remove('on');
    document.querySelectorAll('#notif-list [data-aff]').forEach(r => r.onclick = () => { sound.sfx.tab(); closeNotif(); gotoAffiliate(r.dataset.aff); });
    document.querySelectorAll('#notif-list [data-go]').forEach(r => r.onclick = () => { sound.sfx.tab(); closeNotif(); switchView(r.dataset.go); });
  } catch (e) {}
}
const NOTIF_NAV = { client: 'leads', vente: 'leads', statut: 'leads', commission: 'paiements', paiement: 'paiements', recrue: 'recrues', publication: 'publi' };
document.getElementById('bell').onclick = async () => { sound.sfx.click(); document.getElementById('notif-scrim').classList.add('on'); await api('/api/admin/notifs/read', { body: {} }); setTimeout(refreshNotifs, 400); };
document.getElementById('notif-close').onclick = () => document.getElementById('notif-scrim').classList.remove('on');
document.getElementById('notif-scrim').onclick = e => { if (e.target.id === 'notif-scrim') e.target.classList.remove('on'); };
document.getElementById('notif-close').innerHTML = icon('close');

/* ---------- son ---------- */
function syncSnd() { document.getElementById('snd').innerHTML = icon(sound.enabled ? 'sound' : 'mute'); document.getElementById('amb').innerHTML = icon('music'); document.getElementById('amb').style.color = sound.ambient ? 'var(--accent)' : ''; }
document.getElementById('snd').onclick = () => { sound.toggle(); syncSnd(); };
document.getElementById('amb').onclick = () => { sound.toggleAmbient(); syncSnd(); };

/* ---------- boot ---------- */
(async function boot() {
  try { CFG = await api('/api/config'); } catch (e) {}
  try { await refresh(); } catch (e) { location.href = '{{ADMIN_PATH}}'; return; }
  buildDock(); syncSnd(); document.getElementById('bell').innerHTML = icon('bell'); NA.nova('le stratège de Mongazi'); switchView('dash'); refreshNotifs(); startSignals();
  document.getElementById('help').innerHTML = icon('help');
  document.getElementById('help').onclick = () => NA.tour(TOUR);
  if (!localStorage.getItem('na_tour_a')) setTimeout(() => NA.tour(TOUR, 'na_tour_a'), 900);
})();
</script>
