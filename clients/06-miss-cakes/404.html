<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Page introuvable — Miss cakes</title>
<meta name="robots" content="noindex">
<link rel="icon" href="/assets/images/favicon/favicon.ico" sizes="any">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Cormorant:wght@600;700&family=Bricolage+Grotesque:opsz,wght@12..96,400..700&display=swap">
<style>
  *{box-sizing:border-box;margin:0}
  body{min-height:100vh;display:grid;place-items:center;padding:24px;text-align:center;
    font-family:"Bricolage Grotesque",system-ui,sans-serif;color:#4A332E;
    background:radial-gradient(60% 40% at 80% 0%,rgba(229,156,169,.18),transparent 60%),linear-gradient(168deg,#fff,#FBEEE9)}
  .badge{width:88px;height:88px;border-radius:24px;margin:0 auto 22px;box-shadow:0 18px 40px -18px rgba(199,107,124,.6)}
  h1{font-family:"Cormorant",serif;font-weight:700;font-size:clamp(2.4rem,8vw,4rem);color:#3E2723;line-height:1}
  p{color:#79564E;margin:14px auto 26px;max-width:42ch}
  .btn{display:inline-flex;align-items:center;gap:.5rem;padding:14px 28px;border-radius:999px;font-weight:600;
    background:linear-gradient(135deg,#E59CA9,#C76B7C);color:#fff;box-shadow:0 16px 40px -16px rgba(199,107,124,.55)}
</style>
</head>
<body>
  <main>
    <img class="badge" src="/assets/images/logos/mark.png" alt="Miss cakes">
    <h1>Oups, page introuvable</h1>
    <p>La gourmandise que vous cherchez n'est pas ici. Revenons à l'essentiel.</p>
    <a class="btn" href="/">Retour à l'accueil</a>
  </main>
</body>
</html>
