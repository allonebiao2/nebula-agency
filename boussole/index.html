<!doctype html>

<head>
  <meta charset="utf-8">

  <title>Boussole — gestion financière du commerçant</title>
  <meta name="description" content="Compare ce que tu dépenses à ce que tu gagnes. Vois ta rentabilité clairement, gère tes recettes en 3 enveloppes.">
  <meta name="theme-color" content="#0c0e13">
  <meta name="color-scheme" content="dark light">
  <script>
    /* applique thème + personnalisation avant le 1er rendu (anti-flash) — défaut sombre */
    try {
      var d = document.documentElement, t = localStorage.getItem('boussole:theme');
      d.dataset.theme = (t === 'light' || t === 'dark') ? t : 'dark';
      var defs = { accent: 'ambre', textsize: 'normal', density: 'confort', corners: 'doux' };
      Object.keys(defs).forEach(function (k) { var v = localStorage.getItem('boussole:' + k); if (v && v !== defs[k]) d.dataset[k] = v; });
      var lg = localStorage.getItem('boussole:lang'); if (lg) d.lang = lg.split('-')[0];
    } catch (e) { document.documentElement.dataset.theme = 'dark'; }
  </script>
