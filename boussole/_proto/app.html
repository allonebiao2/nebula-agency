<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="color-scheme" content="dark">
  <title>Boussole · App (aperçu Étape 2)</title>
  <link rel="icon" href="../assets/icons/favicon-48.png" type="image/png">
  <style>
    @font-face {
      font-family: 'Bricolage Grotesque';
      src: url('../assets/fonts/BricolageGrotesque.woff2') format('woff2');
      font-weight: 200 800; font-display: swap;
    }
    :root {
      --ease: cubic-bezier(.16, 1, .3, 1);
      --ease-back: cubic-bezier(.2, 1.28, .32, 1);   /* ease-out-back : rebond « comics » */
      --hdr-h: 58px;
      --cyan: #38f0ff;
    }
    * { box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      margin: 0;
      font-family: 'Bricolage Grotesque', system-ui, sans-serif;
      color: #fff;
      background: #0B0F19;                 /* noir de jais profond et mat (Cyber-Noir) — plus aucun dégradé bleu */
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
    }

    /* ===== PROFONDEUR DU FOND : grille géométrique en fuite + poussières flottantes (débris Spider-Verse) ===== */
    .depth { position: fixed; inset: 0; z-index: -1; pointer-events: none; overflow: hidden; }
    .depth__grid {
      position: absolute; left: -50%; right: -50%; bottom: -8%; height: 115%;
      background-image:
        linear-gradient(rgba(56, 240, 255, .10) 1px, transparent 1px),
        linear-gradient(90deg, rgba(56, 240, 255, .10) 1px, transparent 1px);
      background-size: 46px 46px;
      transform: perspective(520px) rotateX(62deg);   /* sol qui fuit vers l'horizon */
      transform-origin: bottom center;
      -webkit-mask-image: linear-gradient(to top, #000 4%, transparent 72%);
              mask-image: linear-gradient(to top, #000 4%, transparent 72%);
    }
    .depth__dust span {
      position: absolute; border-radius: 50%;
      background: rgba(230, 250, 255, .6); box-shadow: 0 0 6px rgba(56, 240, 255, .6);
      opacity: 0; animation: dustFloat linear infinite;   /* position/taille/vitesse injectées en JS -> 2 couches = parallaxe */
    }
    @keyframes dustFloat {
      0%   { transform: translateY(26px) translateX(0);    opacity: 0; }
      15%  { opacity: var(--op, .5); }
      82%  { opacity: var(--op, .5); }
      100% { transform: translateY(-72px) translateX(14px); opacity: 0; }
    }

    /* ============ HEADER FIXE (Liquid Glass) ============ */
    .hdr {
      position: fixed; top: 0; left: 0; right: 0; z-index: 50;
      height: calc(var(--hdr-h) + env(safe-area-inset-top));
      padding: env(safe-area-inset-top) 14px 0;
      display: grid; grid-template-columns: 1fr auto 1fr; align-items: center;
      background: rgba(0, 0, 0, .2);                       /* glass noir (bg-black/20) — s'intègre au fond de jais au lieu de la barre givrée blanche */
      -webkit-backdrop-filter: blur(12px) saturate(125%);
              backdrop-filter: blur(12px) saturate(125%);
      border-bottom: 1px solid rgba(255, 255, 255, .05);  /* border-white/5 : liseré discret */
      box-shadow: 0 1px 0 rgba(56, 240, 255, .10), 0 10px 30px -18px rgba(0, 0, 0, .8);
    }
    /* Hamburger (encrage BD, traits épais) */
    .hdr__burger {
      justify-self: start;
      width: 44px; height: 44px; display: grid; place-items: center;
      border: 0; background: none; color: #fff; cursor: pointer; border-radius: 12px;
      transition: color .18s var(--ease), background .18s var(--ease);
    }
    .hdr__burger svg { width: 25px; height: 25px; transition: filter .18s var(--ease); }
    .hdr__burger:hover { color: var(--cyan); background: rgba(56, 240, 255, .08); }
    .hdr__burger:hover svg { filter: drop-shadow(0 0 6px rgba(56, 240, 255, .8)); }
    .hdr__burger:active { transform: scale(.92); }
    /* Logo central qui pulse très discrètement */
    .hdr__logo { justify-self: center; width: 30px; height: 30px; display: block; animation: logoPulse 3.4s ease-in-out infinite; }
    .hdr__logo svg { width: 100%; height: 100%; overflow: visible; filter: drop-shadow(0 0 5px rgba(56, 240, 255, .55)); }
    .hdr__logo .ring { stroke: #8ff6ff; } .hdr__logo .ring--in { stroke: rgba(143, 246, 255, .5); }
    .hdr__logo .ticks line { stroke: #8ff6ff; }
    .hdr__logo .rose-n { fill: #eafdff; } .hdr__logo .rose-s { fill: rgba(56, 240, 255, .4); }
    .hdr__logo .rose-ew { fill: rgba(234, 253, 255, .4); } .hdr__logo .hub { fill: #fff; }
    /* Avatar vide (futur profil) */
    .hdr__avatar {
      justify-self: end; width: 36px; height: 36px; border-radius: 50%; cursor: pointer;
      border: 1px solid rgba(255, 255, 255, .22);
      background: radial-gradient(120% 120% at 30% 25%, rgba(255, 255, 255, .16), rgba(255, 255, 255, .03));
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, .2);
      transition: border-color .18s var(--ease), box-shadow .18s var(--ease);
    }
    .hdr__avatar:hover { border-color: rgba(56, 240, 255, .5); box-shadow: inset 0 1px 0 rgba(255, 255, 255, .2), 0 0 14px rgba(56, 240, 255, .35); }

    /* ============ CONTENU (placeholder) ============ */
    .content {
      min-height: 100dvh;
      padding: calc(var(--hdr-h) + env(safe-area-inset-top) + 24px) 20px 24px;
    }
    .content__hint {
      max-width: 460px; margin: 12vh auto 0; text-align: center; color: rgba(255, 255, 255, .4);
      font-size: 14.5px; line-height: 1.5;
    }
    .content__hint strong { color: rgba(255, 255, 255, .7); font-weight: 700; }

    /* ============ ÉCRANS (scaffold) + MOUVEMENT DE CAMÉRA ============ */
    .screen { max-width: 560px; margin: 8vh auto 0; text-align: center; }
    .screen.cine { animation: cineEnter .55s cubic-bezier(.4, 0, .2, 1) both; }    /* arrivée : fondu lent + léger zoom (cinématique) */
    .screen.hud  { animation: hudPunch .18s cubic-bezier(.2, .9, .1, 1) both; }     /* navigation : spring sèche, AUCUN rebond (pas d'overshoot) */
    @keyframes cineEnter { from { opacity: 0; transform: scale(.985); }                     to { opacity: 1; transform: none; } }
    @keyframes hudPunch  { 0% { opacity: .35; transform: translateX(10px) scale(1.015); }   100% { opacity: 1; transform: none; } }
    .screen__tag {
      display: inline-block; margin-bottom: 16px; padding: 5px 12px; border-radius: 999px;
      font-size: 11.5px; font-weight: 700; letter-spacing: .14em; text-transform: uppercase;
      color: var(--sc, var(--cyan));
      border: 1px solid color-mix(in srgb, var(--sc, var(--cyan)) 40%, transparent);
      background: color-mix(in srgb, var(--sc, var(--cyan)) 12%, transparent);
    }
    .screen__title { margin: 0; font-size: clamp(30px, 8vw, 46px); font-weight: 800; letter-spacing: -.02em; color: #fff;
      text-shadow: 0 0 22px color-mix(in srgb, var(--sc, var(--cyan)) 45%, transparent); }
    .screen__sub  { margin: 12px 0 0; color: rgba(255, 255, 255, .62); font-size: 15.5px; line-height: 1.5; }
    .screen__soon { margin: 22px 0 0; color: rgba(255, 255, 255, .34); font-size: 13px; }

    /* ===== HUD DE BIENVENUE (Accueil) — salutation dynamique, style Spider-Verse ===== */
    .home { max-width: 560px; }
    .hud { text-align: center; margin-top: 2vh; perspective: 800px; }   /* perspective posée : prêt pour un rotateX 3D ultérieur */
    .hud__sys { display: inline-flex; align-items: center; gap: 7px; font-size: 10.5px; font-weight: 700; letter-spacing: .22em; text-transform: uppercase; color: rgba(0, 240, 255, .72); }
    .hud__sys i { width: 6px; height: 6px; border-radius: 50%; background: #00f0ff; box-shadow: 0 0 8px #00f0ff; animation: hudDot 1.6s ease-in-out infinite; }
    @keyframes hudDot { 0%, 100% { opacity: 1; } 50% { opacity: .3; } }
    /* Smart Greeting Engine : conteneur prêt 3D — le typing n'écrit QUE du texte (textContent),
       donc un rotateX/perspective ajouté plus tard sur .hud__hi ne cassera pas la frappe. */
    .hud__hi {
      position: relative; display: inline-block; text-align: left; margin: 10px 0 0; line-height: 1.25;
      font-family: 'Bricolage Grotesque', 'Arial Narrow', 'Roboto Condensed', system-ui, sans-serif;
      font-weight: 800; font-size: clamp(19px, 5vw, 30px); letter-spacing: .05em; text-transform: uppercase;
      color: #fff; text-shadow: 0 0 10px rgba(0, 240, 255, .55), 0 0 26px rgba(0, 240, 255, .3), 0 0 46px rgba(0, 240, 255, .16);   /* bloom pour s'intégrer à la scène */
      transform-style: preserve-3d;   /* prêt pour perspective/rotateX plus tard */
    }
    .hud__ghost { visibility: hidden; }              /* réserve la largeur/hauteur finale -> aucun saut ni re-centrage pendant la frappe */
    .hud__type  { position: absolute; inset: 0; }    /* le texte tapé se superpose au fantôme, aligné à gauche (effet terminal) */
    .hud__caret { display: inline-block; width: .1em; height: 1em; margin-left: .1em; vertical-align: -.12em; background: #00f0ff; box-shadow: 0 0 8px #00f0ff; animation: caretBlink 1.05s steps(1) infinite; }
    @keyframes caretBlink { 0%, 50% { opacity: 1; } 50.01%, 100% { opacity: 0; } }
    /* scanlines très fines par-dessus le texte (n'entravent pas la lecture) */
    .hud__hi::after {
      content: ""; position: absolute; inset: 0; pointer-events: none;
      background: repeating-linear-gradient(0deg, rgba(3, 6, 12, 0) 0 2px, rgba(3, 6, 12, .22) 2px 3px);
    }
    /* ===== Mastodontes VENDRE / DÉPENSER ===== */
    .masto { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin: 32px auto 0; perspective: 1000px; }   /* conteneur 3D (scopé ici pour ne pas casser le header fixe) */
    .masto__btn {
      --c: #38f0ff;
      display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 10px;
      min-height: 132px; padding: 18px; border-radius: 20px; cursor: pointer;
      font: inherit; font-weight: 800; font-size: 16px; letter-spacing: .06em; text-transform: uppercase; color: #fff;
      border: 1px solid transparent;
      /* padding-box = teinte néon ; border-box = BISEAU VITRÉ (blanc/cyan haut-gauche -> néon bas-droite) */
      background:
        linear-gradient(160deg, color-mix(in srgb, var(--c) 15%, rgba(255,255,255,.03)), color-mix(in srgb, var(--c) 5%, rgba(0,0,0,.22))) padding-box,
        linear-gradient(150deg, rgba(255,255,255,.6), rgba(255,255,255,.07) 34%, transparent 56%, color-mix(in srgb, var(--c) 55%, transparent)) border-box;
      transform: rotateX(5deg);                         /* volume au repos ; la bascule "vers le doigt" est pilotée en JS */
      transform-style: preserve-3d;
      /* FLOAT : a) ombre sol sombre diffuse (ancrage)  b) glow coloré ÉMIS  + biseau vitré 1px interne */
      box-shadow:
        0 20px 30px -10px rgba(0,0,0,.6),
        0 0 15px -2px color-mix(in srgb, var(--c) 50%, transparent),
        inset 0 0 0 1px rgba(255,255,255,.14),
        inset 0 1px 0 rgba(255,255,255,.2);
      transition: transform .1s ease-out, box-shadow .2s ease-out, background .2s ease-out;   /* kinetic : nerveux, immédiat */
      will-change: transform;
    }
    .masto__btn svg { width: 40px; height: 40px; color: var(--c); filter: drop-shadow(0 0 7px color-mix(in srgb, var(--c) 70%, transparent)); }
    /* survol/pression : le glow coloré s'intensifie (la bascule vers le curseur est en JS) */
    .masto__btn:hover {
      box-shadow:
        0 26px 40px -10px rgba(0,0,0,.72),
        0 0 26px 0 color-mix(in srgb, var(--c) 65%, transparent),
        inset 0 0 0 1px rgba(255,255,255,.22),
        inset 0 1px 0 rgba(255,255,255,.3);
    }
    .masto__btn:active {
      box-shadow:
        0 10px 18px -8px rgba(0,0,0,.6),
        0 0 18px -2px color-mix(in srgb, var(--c) 55%, transparent),
        inset 0 0 0 1px rgba(255,255,255,.16);
    }
    .masto__btn--sell  { --c: #35e07a; }
    .masto__btn--spend { --c: #e11d48; }
    @media (max-width: 380px) { .masto { grid-template-columns: 1fr; } }

    /* ============ CHIFFRES CLÉS (Accueil) — 3 cadres glassmorphism, chacun sa lumière ============ */
    .vitals { display: flex; justify-content: center; gap: 11px; margin: 24px auto 6px; flex-wrap: wrap; }
    .vital {
      --vc: #38f0ff;
      position: relative; overflow: hidden; flex: 1 1 0; min-width: 98px; max-width: 172px;
      padding: 13px 14px; border-radius: 16px; text-align: left; cursor: pointer;
      background: linear-gradient(160deg, rgba(255, 255, 255, .12), rgba(255, 255, 255, .03));   /* verre */
      -webkit-backdrop-filter: blur(13px) saturate(135%); backdrop-filter: blur(13px) saturate(135%);   /* glassmorphism */
      border: 1px solid color-mix(in srgb, var(--vc) 30%, rgba(255, 255, 255, .18));
      box-shadow:
        0 12px 30px -14px rgba(0, 0, 0, .6),
        0 0 20px -4px color-mix(in srgb, var(--vc) 62%, transparent),    /* halo coloré propre à chaque carte */
        inset 0 1px 0 rgba(255, 255, 255, .22);
      transition: box-shadow .2s ease-out, border-color .2s ease-out, scale .09s ease-out;
      animation: vitalIn .5s calc(var(--i, 0) * .1s) cubic-bezier(.16, 1, .3, 1) both;
    }
    .vital:active { scale: .97; }   /* enfoncement au toucher */
    .vital:focus-visible { outline: 2px solid color-mix(in srgb, var(--vc) 80%, #fff); outline-offset: 2px; }
    @media (hover: hover) and (pointer: fine) {
      .vital:hover { border-color: color-mix(in srgb, var(--vc) 55%, rgba(255, 255, 255, .2)); box-shadow: 0 14px 34px -14px rgba(0, 0, 0, .6), 0 0 28px -2px color-mix(in srgb, var(--vc) 78%, transparent), inset 0 1px 0 rgba(255, 255, 255, .28); }
    }
    /* bloom lumineux interne (haut-gauche) teinté à la couleur de la carte */
    .vital::before {
      content: ""; position: absolute; inset: 0; pointer-events: none; border-radius: inherit;
      background: radial-gradient(120% 82% at 16% 0%, color-mix(in srgb, var(--vc) 26%, transparent), transparent 62%);
    }
    .vital--caisse   { --vc: #38f0ff; }   /* cyan */
    .vital--jour     { --vc: #35e07a; }   /* vert */
    .vital--objectif { --vc: #ffd23f; }   /* ambre */
    .vital__label { position: relative; display: block; font-size: 10px; font-weight: 700; letter-spacing: .12em; text-transform: uppercase; color: color-mix(in srgb, var(--vc) 72%, #d7eef2); }
    .vital__num {
      position: relative; display: block; margin-top: 5px;
      font-size: clamp(18px, 4.8vw, 26px); font-weight: 800; line-height: 1; letter-spacing: -.01em;
      color: #fff; font-variant-numeric: tabular-nums; text-shadow: 0 0 10px color-mix(in srgb, var(--vc) 45%, transparent);
    }
    @keyframes vitalIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: none; } }

    /* ===== PORTAIL « retour au nexus » : ouverture de la page Accueil (expansion circulaire cyan) ===== */
    .home.portal { position: relative; animation: portalOpen .5s cubic-bezier(.34, 1.56, .64, 1) both; }
    @keyframes portalOpen { from { clip-path: circle(0% at 50% 50%); } to { clip-path: circle(150% at 50% 50%); } }
    .home.portal::after {
      content: ""; position: absolute; inset: 0; z-index: 5; pointer-events: none;
      background: radial-gradient(circle at 50% 50%, transparent 42%, rgba(0, 240, 255, .22) 55%, transparent 70%);
      animation: portalRing .5s ease-out both;   /* anneau cyan électrique qui jaillit du centre */
    }
    @keyframes portalRing { 0% { opacity: 0; transform: scale(.15); } 35% { opacity: 1; } 100% { opacity: 0; transform: scale(1.2); } }

    /* ===== TIROIR 3D « Catalogue » : la page se tire vers l'avant + les compartiments sortent en gigogne ===== */
    .screen.drawer3d { animation: drawerPull .45s cubic-bezier(0.19, 1, 0.22, 1) both; }
    @keyframes drawerPull {
      0%   { transform: perspective(1000px) rotateX(-20deg) translateZ(-150px) translateY(-50px); opacity: 0; }
      66%  { opacity: 1; }
      100% { transform: perspective(1000px) rotateX(0deg) translateZ(0) translateY(0); opacity: 1; }
    }
    .catgrid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin: 22px auto 0; max-width: 430px; perspective: 800px; }
    .catcard {
      position: relative; text-align: left; padding: 12px 13px; border-radius: 13px;
      background: rgba(255, 255, 255, .05); border: 1px solid rgba(255, 255, 255, .1); border-left: 2px solid #ffd23f;
      box-shadow: 0 8px 20px -14px rgba(0, 0, 0, .7);
      animation: cardOut .4s calc(150ms + var(--i) * 40ms) cubic-bezier(0.19, 1, 0.22, 1) both;   /* stagger 40 ms / produit */
    }
    @keyframes cardOut { from { transform: translateZ(-50px) translateY(-20px); opacity: 0; } to { transform: translateZ(0) translateY(0); opacity: 1; } }
    .catcard__name { display: block; font-size: 13.5px; font-weight: 700; color: #fff; }
    .catcard__price { display: block; margin-top: 3px; font-size: 15px; font-weight: 800; color: #ffd23f; font-variant-numeric: tabular-nums; }

    /* ===== SPIDER-MANAGER — écran STOCK (inventaire) : liste, boutons massifs néon, alertes rupture ===== */
    .stock-alert {
      max-width: 430px; margin: 16px auto 0; padding: 10px 14px; border-radius: 12px; text-align: left;
      font-size: 13px; font-weight: 700; color: #ff5a6a;
      background: rgba(255, 46, 67, .1); border: 1px solid rgba(255, 46, 67, .35); box-shadow: 0 0 18px -6px rgba(255, 46, 67, .5);
    }
    .stock-alert.is-ok { color: #35e07a; background: rgba(53, 224, 122, .08); border-color: rgba(53, 224, 122, .3); box-shadow: none; }
    .stock-alert b { font-size: 15px; }
    .stocklist { max-width: 430px; margin: 12px auto 0; display: flex; flex-direction: column; gap: 9px; perspective: 800px; }
    .stockrow {
      position: relative; display: flex; align-items: center; gap: 10px; padding: 11px 12px; border-radius: 14px;
      background: rgba(255, 255, 255, .05); border: 1px solid rgba(255, 255, 255, .1); border-left: 3px solid #ffd23f;
      box-shadow: 0 8px 20px -14px rgba(0, 0, 0, .7); touch-action: pan-y; will-change: transform;
      animation: cardOut .4s calc(120ms + var(--i) * 45ms) cubic-bezier(0.19, 1, 0.22, 1) both;
    }
    .stockrow.is-critical { border-left-color: #ff2e43; box-shadow: 0 0 18px -6px rgba(255, 46, 67, .5), 0 8px 20px -14px rgba(0, 0, 0, .7); }
    .stockrow__main { flex: 1 1 auto; min-width: 0; text-align: left; }
    .stockrow__name { display: block; font-size: 14.5px; font-weight: 700; color: #fff; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .stockrow__meta { display: block; margin-top: 2px; font-size: 12px; color: rgba(255, 255, 255, .5); }
    .stockrow__meta b { color: #ffd23f; font-weight: 800; font-variant-numeric: tabular-nums; }
    .stockrow__qtylbl { margin-left: 8px; }
    .stockrow.is-critical .stockrow__qtylbl { color: #ff5a6a; font-weight: 700; }
    .stockrow__ctrl { flex: none; display: flex; align-items: center; gap: 8px; }
    .qtybtn {
      width: 38px; height: 38px; flex: none; border: 0; border-radius: 11px; cursor: pointer;
      font: inherit; font-size: 22px; font-weight: 800; line-height: 1; display: grid; place-items: center;
      transition: transform .08s ease, box-shadow .2s ease;
    }
    .qtybtn--plus  { color: #04121a; background: radial-gradient(120% 120% at 30% 25%, #7fe0ff, #38f0ff); box-shadow: 0 0 16px -3px rgba(56, 240, 255, .6); }    /* néon bleu */
    .qtybtn--minus { color: #1a0406; background: radial-gradient(120% 120% at 30% 25%, #ff8a97, #ff2e43); box-shadow: 0 0 16px -3px rgba(255, 46, 67, .55); }   /* néon rouge */
    .qtybtn:active { transform: scale(.9); }
    .qtybtn__val { min-width: 30px; text-align: center; font-size: 17px; font-weight: 800; color: #fff; font-variant-numeric: tabular-nums; }
    .qtybtn__val.pop { animation: qtyPop .32s cubic-bezier(.2, 1.4, .3, 1); }
    @keyframes qtyPop { 0% { transform: scale(1); } 40% { transform: scale(1.4); color: #38f0ff; } 100% { transform: scale(1); color: #fff; } }

    /* ===== SPIDER-MANAGER — écran DÉPENSES : liste catégorisée + FAB « Ajout rapide » + sheet ===== */
    .exp-total { max-width: 430px; margin: 16px auto 0; text-align: left; font-size: 14px; color: rgba(255, 255, 255, .6); }
    .exp-total b { display: inline-block; margin-left: 8px; font-size: 22px; font-weight: 800; color: #ff5a6a; font-variant-numeric: tabular-nums; }
    .explist { max-width: 430px; margin: 14px auto 0; display: flex; flex-direction: column; gap: 8px; }
    .exprow {
      position: relative; display: flex; align-items: center; gap: 11px; padding: 11px 12px; border-radius: 13px;
      background: rgba(255, 255, 255, .05); border: 1px solid rgba(255, 255, 255, .09); box-shadow: 0 8px 20px -14px rgba(0, 0, 0, .7);
      touch-action: pan-y; will-change: transform; animation: expIn .4s calc(var(--i) * 45ms) cubic-bezier(.16, 1, .3, 1) both;
    }
    @keyframes expIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: none; } }
    .exp-dot { width: 10px; height: 10px; flex: none; border-radius: 50%; background: currentColor; box-shadow: 0 0 8px currentColor; }
    .exprow__main { flex: 1 1 auto; min-width: 0; text-align: left; }
    .exprow__lib { display: block; font-size: 14px; font-weight: 700; color: #fff; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .exprow__meta { display: block; margin-top: 2px; font-size: 11.5px; color: rgba(255, 255, 255, .45); }
    .exprow__amt { flex: none; font-size: 15px; font-weight: 800; color: #ff8a97; font-variant-numeric: tabular-nums; }
    /* FAB flottant */
    .fab {
      position: fixed; right: 18px; bottom: calc(18px + env(safe-area-inset-bottom)); z-index: 45;
      width: 60px; height: 60px; border: 0; border-radius: 20px; cursor: pointer; font-size: 32px; font-weight: 700; line-height: 1; color: #1a0406;
      display: grid; place-items: center; background: radial-gradient(120% 120% at 30% 25%, #ff8a97, #e11d48);
      box-shadow: 0 12px 26px -8px rgba(225, 29, 72, .7), 0 0 24px -4px rgba(225, 29, 72, .6);
      transition: transform .12s var(--ease-back); animation: fabIn .4s .2s var(--ease-back) both;
    }
    .fab:active { transform: scale(.9); }
    .fab__lbl { position: fixed; right: 86px; bottom: calc(33px + env(safe-area-inset-bottom)); z-index: 45; font-size: 12px; font-weight: 700; color: rgba(255, 255, 255, .55); pointer-events: none; }
    @keyframes fabIn { from { transform: scale(0) rotate(-90deg); opacity: 0; } to { transform: none; opacity: 1; } }
    /* Bottom sheet « Ajout rapide » */
    .sheet-scrim { position: fixed; inset: 0; z-index: 46; background: rgba(0, 0, 0, .55); opacity: 0; pointer-events: none; transition: opacity .25s ease; -webkit-backdrop-filter: blur(3px); backdrop-filter: blur(3px); }
    .sheet-scrim.is-open { opacity: 1; pointer-events: auto; }
    .sheet {
      position: fixed; left: 0; right: 0; bottom: 0; z-index: 47; padding: 16px 18px calc(20px + env(safe-area-inset-bottom));
      background: linear-gradient(180deg, rgba(24, 26, 34, .98), rgba(14, 15, 20, 1)); border-top: 1px solid rgba(255, 255, 255, .1); border-radius: 22px 22px 0 0;
      box-shadow: 0 -20px 50px -20px rgba(0, 0, 0, .9), inset 0 1px 0 rgba(255, 255, 255, .08);
      transform: translateY(102%); transition: transform .3s var(--ease-back);
    }
    .sheet.is-open { transform: translateY(0); }
    .sheet__grip { width: 40px; height: 4px; border-radius: 2px; background: rgba(255, 255, 255, .2); margin: 0 auto 14px; }
    .sheet__title { margin: 0 0 12px; font-size: 15px; font-weight: 800; color: #fff; }
    .sheet__amt { width: 100%; padding: 14px; border-radius: 14px; border: 1px solid rgba(255, 255, 255, .14); background: rgba(255, 255, 255, .05); color: #fff; font: inherit; font-size: 26px; font-weight: 800; text-align: center; font-variant-numeric: tabular-nums; }
    .sheet__amt::placeholder { color: rgba(255, 255, 255, .3); }
    .sheet__cats { display: flex; flex-wrap: wrap; gap: 8px; margin: 14px 0; }
    .catchip { padding: 8px 13px; border-radius: 999px; border: 1px solid rgba(255, 255, 255, .14); background: rgba(255, 255, 255, .05); color: rgba(255, 255, 255, .75); font: inherit; font-size: 13px; font-weight: 700; cursor: pointer; transition: color .15s, border-color .15s, background .15s, box-shadow .15s; }
    .catchip.is-sel { color: #fff; border-color: var(--cc); background: color-mix(in srgb, var(--cc) 18%, transparent); box-shadow: 0 0 14px -4px var(--cc); }
    .sheet__add { width: 100%; margin-top: 4px; padding: 15px; border: 0; border-radius: 16px; cursor: pointer; font: inherit; font-size: 16px; font-weight: 800; color: #1a0406; background: radial-gradient(140% 140% at 30% 20%, #ff8a97, #e11d48); box-shadow: 0 0 22px -4px rgba(225, 29, 72, .6); transition: transform .1s ease; }
    .sheet__add:active { transform: scale(.97); }

    /* ============ OVERLAY + DRAWER ============ */
    .scrim {
      position: fixed; inset: 0; z-index: 60;
      background: rgba(0, 0, 0, .55);   /* voile neutre (plus de teinte bleutée) */
      opacity: 0; pointer-events: none;
      transition: opacity .3s var(--ease);
    }
    .app.menu-open .scrim {
      opacity: 1; pointer-events: auto;
      -webkit-backdrop-filter: blur(4px); backdrop-filter: blur(4px);
    }
    .drawer {
      position: fixed; top: 0; left: 0; bottom: 0; z-index: 70;
      width: min(84vw, 320px);                 /* PC : largeur fixe (max-w-xs), le tableau de bord reste visible à droite */
      padding: calc(env(safe-area-inset-top) + 11px) 14px calc(env(safe-area-inset-bottom) + 11px);
      display: flex; flex-direction: column;
      background: linear-gradient(180deg, rgba(18, 20, 28, .82), rgba(10, 11, 16, .9));   /* charbon translucide (plus de navy) — se détache du fond de jais par le flou + le liseré cyan */
      -webkit-backdrop-filter: blur(22px) saturate(120%); backdrop-filter: blur(22px) saturate(120%);
      border-right: 1px solid rgba(255, 255, 255, .07);
      box-shadow: 24px 0 60px -20px rgba(0, 0, 0, .8), inset -1px 0 0 rgba(56, 240, 255, .12);
      transform: translateX(-102%);
      transition: transform .3s var(--ease-back);   /* glissement rapide + rebond */
      will-change: transform;
    }
    .app.menu-open .drawer { transform: translateX(0); }
    .drawer__head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
    .drawer__brand { display: flex; align-items: center; gap: 10px; font-weight: 800; letter-spacing: -.01em; font-size: 17px; }
    .drawer__brand span { width: 26px; height: 26px; }
    .drawer__brand svg { width: 100%; height: 100%; overflow: visible; filter: drop-shadow(0 0 5px rgba(56, 240, 255, .5)); }
    .drawer__x {
      width: 38px; height: 38px; flex: none; display: grid; place-items: center;
      border: 1px solid rgba(255, 255, 255, .14); background: rgba(255, 255, 255, .05);
      border-radius: 11px; color: rgba(255, 255, 255, .8); cursor: pointer;
      transition: color .16s var(--ease), border-color .16s var(--ease), background .16s var(--ease);
    }
    .drawer__x svg { width: 19px; height: 19px; }
    .drawer__x:hover { color: var(--cyan); border-color: rgba(56, 240, 255, .5); background: rgba(56, 240, 255, .08); }
    .drawer { overflow: hidden; }   /* seul .nav2 défile : profil (haut) et pied de menu (bas) restent fixes */

    /* NIVEAU 1 : profil */
    .profil { display: flex; align-items: center; gap: 11px; width: 100%; padding: 2px 4px 8px; border: 0; background: none; cursor: pointer; text-align: left; }
    .profil__badge { width: 38px; height: 38px; flex: none; border-radius: 50%; display: grid; place-items: center; }
    .profil__badge svg { width: 21px; height: 21px; }
    .drawer[data-role="admin"] .profil__badge { color: #04140e; background: radial-gradient(125% 125% at 30% 22%, #86ffd0, #10b981); box-shadow: 0 0 18px rgba(16, 185, 129, .55), inset 0 1px 0 rgba(255, 255, 255, .5); }
    .drawer[data-role="collab"] .profil__badge { color: #1a0733; background: radial-gradient(125% 125% at 30% 22%, #dcbcff, #a855f7); box-shadow: 0 0 18px rgba(168, 85, 247, .55), inset 0 1px 0 rgba(255, 255, 255, .5); }
    .profil__hi { font-size: 14px; font-weight: 800; letter-spacing: -.01em; text-transform: uppercase; color: rgba(255, 255, 255, .68); }
    .profil__name { color: #fff; }

    /* NIVEAU 2 : navigation flash (boutons néon épais) */
    .nav2 { display: flex; flex-direction: column; flex: 1 1 auto; justify-content: flex-start; gap: clamp(5px, .9vh, 8px); min-height: 0; overflow-y: auto; overscroll-behavior: contain; -webkit-overflow-scrolling: touch; scrollbar-width: thin; scrollbar-color: rgba(56, 240, 255, .3) transparent; padding: 3px 7px; }
    .nav2::-webkit-scrollbar { width: 4px; }
    .nav2::-webkit-scrollbar-thumb { background: rgba(56, 240, 255, .3); border-radius: 4px; }
    .navbtn {
      --glow: #38f0ff;
      display: flex; align-items: center; gap: 11px; width: 100%;
      padding: clamp(7px, 1.05vh, 11px) 14px; border-radius: 12px; cursor: pointer;
      border: 1px solid rgba(255, 255, 255, .1); background: rgba(255, 255, 255, .045);
      color: rgba(255, 255, 255, .9); font: inherit; font-size: 14px; font-weight: 800; letter-spacing: -.01em; text-align: left;
      box-shadow: 0 0 0 0 rgba(56, 240, 255, 0), 0 0 0 0 rgba(56, 240, 255, 0);
      transition: border-color .22s var(--ease), box-shadow .26s var(--ease), background .2s var(--ease), color .2s var(--ease), transform .1s var(--ease);
    }
    .navbtn__ic { width: 21px; height: 21px; flex: none; display: grid; place-items: center; color: rgba(255, 255, 255, .58); transition: color .2s var(--ease), filter .2s var(--ease); }
    .navbtn__ic svg { width: 20px; height: 20px; }
    .navbtn:hover, .navbtn.is-active {
      border-color: var(--glow); background: rgba(255, 255, 255, .075); color: #fff;
      box-shadow: 0 0 0 1px var(--glow), 0 0 22px -2px var(--glow);
    }
    .navbtn:hover .navbtn__ic, .navbtn.is-active .navbtn__ic { color: var(--glow); filter: drop-shadow(0 0 5px var(--glow)); }
    .navbtn:hover { transform: translateY(-1.5px); }        /* légère élévation au survol */
    .navbtn:active { transform: scale(.95); }               /* enfoncement net à l'appui */
    .navbtn.is-flash { animation: navFlash .3s ease-out; }
    @keyframes navFlash {
      0%   { box-shadow: 0 0 0 2px var(--glow), 0 0 42px 4px var(--glow); background: color-mix(in srgb, var(--glow) 32%, rgba(255, 255, 255, .06)); }
      100% { box-shadow: 0 0 0 1px var(--glow), 0 0 22px -2px var(--glow); background: rgba(255, 255, 255, .075); }
    }

    /* ===== "MILES CLIC" — feedback Spider-Verse immédiat (glitch RGB + snap scale + flash néon), <= 200 ms ===== */
    .navbtn.miles { animation: milesSnap .2s cubic-bezier(.175, .885, .32, 1.275) both; }
    .navbtn.miles .navbtn__ic { animation: milesIcon .12s 1; }
    @keyframes milesSnap {
      0%   { transform: scale(1);    box-shadow: 0 0 0 2px var(--glow), 0 0 34px 5px var(--glow); text-shadow: 1px 0 #ff0044, -1px 0 #00e5ff; }   /* glitch RGB + flash néon, brutal dès 0 ms */
      25%  { transform: scale(.95);  box-shadow: 0 0 0 2px var(--glow), 0 0 44px 7px var(--glow); text-shadow: -1px 0 #ff0044, 1px 0 #00e5ff; }   /* snap in */
      45%  { transform: scale(1.03); text-shadow: none; }                                                                                          /* glitch coupé net, snap back */
      70%  { transform: scale(.99); }
      100% { transform: scale(1);    box-shadow: 0 0 0 1px var(--glow), 0 0 22px -2px var(--glow); text-shadow: none; }                             /* revient au glow d'actif (aucun saut) */
    }
    @keyframes milesIcon {
      0%   { filter: drop-shadow(1px 0 #ff0044) drop-shadow(-1px 0 #00e5ff); }   /* décalage RGB de l'icône */
      100% { filter: none; }
    }
    .navbtn--cyan { --glow: #38f0ff; }
    .navbtn--yellow { --glow: #ffd23f; }
    .navbtn--green { --glow: #35e07a; }
    .navbtn--violet { --glow: #b98cff; }
    .navbtn--red { --glow: #ff2e43; }          /* accueil : rouge écarlate néon (Miles) */
    .navbtn--crimson { --glow: #e11d48; }      /* mes dépenses : crimson / rouge sombre néon */
    .navbtn--orange { --glow: #ff8a3d; }       /* carnet clients */
    .navbtn--electric { --glow: #3a86ff; }     /* mon équipe : bleu électrique */

    /* Item « Accueil » = NEXUS : glow cyan électrique stable pendant l'attraction magnétique (survol) */
    .navbtn[data-nav="accueil"].nexus-hot {
      border-color: #00F0FF; color: #fff; background: rgba(0, 240, 255, .08);
      box-shadow: 0 0 20px rgba(0, 240, 255, .6), 0 0 0 1px rgba(0, 240, 255, .55);
      z-index: 3;
    }
    .navbtn[data-nav="accueil"].nexus-hot .navbtn__ic { color: #00F0FF; filter: drop-shadow(0 0 6px #00F0FF); }

    /* Item « Catalogue » = COFFRE 3D : au survol le couvercle s'entrouvre, la base avance (tiroir d'armement) */
    .navbtn[data-nav="catalogue"] .navbtn__ic { perspective: 120px; }
    .chest { position: relative; display: block; width: 20px; height: 20px; transform-style: preserve-3d; }
    .chest__base {
      position: absolute; left: 2.5px; right: 2.5px; bottom: 1.5px; height: 11px;
      border: 2px solid currentColor; border-radius: 2px 2px 3px 3px;
      transition: transform .2s cubic-bezier(.25, 1, .5, 1);
    }
    .chest__lid {
      position: absolute; left: 1.5px; right: 1.5px; top: 3.5px; height: 6px;
      border: 2px solid currentColor; border-bottom: 0; border-radius: 3px 3px 0 0;
      transform-origin: bottom center;
      transition: transform .2s cubic-bezier(.25, 1, .5, 1);
    }
    .navbtn[data-nav="catalogue"]:hover .chest__lid  { transform: rotateX(-35deg) translateY(-3px); }   /* le couvercle pivote vers le haut */
    .navbtn[data-nav="catalogue"]:hover .chest__base { transform: translateZ(10px); }                   /* la base avance vers l'utilisateur */

    /* ===== ITEM "STATISTIQUES" — identité RARE « Blanc Holographique » (données pures) =====
       Blanc pur + ABERRATION CHROMATIQUE cyan/magenta (prisme/hologramme), verre lumineux,
       RESPIRATION continue (glow spectral + échelle 1->1.02) et icône qui "scanne" en continu. */
    .navbtn--holo {
      --glow: #ffffff;                          /* l'anneau d'état (hover/actif) devient blanc pur */
      position: relative; isolation: isolate;   /* stacking-context stable pour poser le halo spectral derrière le contenu */
      color: #fff;
      border-color: rgba(255, 255, 255, .24);
      background: rgba(255, 255, 255, .07);      /* verre plus clair = "donnée pure" */
      animation: holoScale 3.4s ease-in-out infinite;   /* échelle via la propriété `scale` : n'entrave PAS transform (hover/active/miles) */
    }
    /* Halo spectral : CYAN dédoublé à gauche + MAGENTA dédoublé à droite = effet prisme/hologramme.
       ::before transparent -> seul le box-shadow rayonne ; totalement découplé du transform du bouton. */
    .navbtn--holo::before {
      content: ""; position: absolute; inset: 0; z-index: -1; border-radius: inherit;
      pointer-events: none; background: transparent;
      box-shadow:
        -2px 0 12px rgba(34, 238, 255, .55),     /* halo CYAN décalé */
         2px 0 12px rgba(255, 42, 232, .55),     /* halo MAGENTA décalé */
         0   0 7px  rgba(255, 255, 255, .40);    /* cœur blanc */
      animation: holoGlow 3.4s ease-in-out infinite;   /* l'INTENSITÉ du glow respire (synchro avec l'échelle) */
    }
    .navbtn--holo .navbtn__ic { color: rgba(255, 255, 255, .95); }
    /* ICÔNE : flottement / scan vertical CONTINU (-3px -> 3px, ease-in-out) = traitement de données temps réel */
    .navbtn--holo .navbtn__ic svg { animation: holoScan 2.6s ease-in-out infinite; }
    /* survol / actif : le prisme s'ouvre, le blanc reste net */
    .navbtn--holo:hover, .navbtn--holo.is-active { background: rgba(255, 255, 255, .12); color: #fff; }
    .navbtn--holo:hover::before, .navbtn--holo.is-active::before {
      box-shadow:
        -3px 0 18px rgba(34, 238, 255, .85),
         3px 0 18px rgba(255, 42, 232, .85),
         0   0 12px rgba(255, 255, 255, .6);
    }
    .navbtn--holo:hover .navbtn__ic svg { filter: drop-shadow(0 0 6px rgba(255, 255, 255, .9)); }
    /* garde le "Miles clic" (snap/glitch) ET la respiration d'échelle EN MÊME TEMPS (transform vs scale = 2 propriétés distinctes) */
    .navbtn--holo.miles { animation: milesSnap .2s cubic-bezier(.175, .885, .32, 1.275) both, holoScale 3.4s ease-in-out infinite; }
    @keyframes holoScale { 0%, 100% { scale: 1; }   50% { scale: 1.02; } }
    @keyframes holoGlow  { 0%, 100% { opacity: .5; } 50% { opacity: 1; } }
    @keyframes holoScan  { 0%, 100% { transform: translateY(-3px); } 50% { transform: translateY(3px); } }

    /* ===== Micro-animations d'icônes (couche ADDITIVE — hover souris uniquement) =====
       Ne cible QUE le <svg> enfant : n'interfère NI avec le bouton (.navbtn :active scale .95,
       :hover translateY), NI avec la couleur/glow de .navbtn__ic, NI avec les sons (JS intact).
       Chaque keyframe part ET revient au neutre (0%/100%) -> au mouseleave l'animation est
       retirée et l'icône revient AU REPOS instantanément (jamais figée). */
    @media (hover: hover) and (pointer: fine) {
      .navbtn[data-nav="accueil"]:hover   .navbtn__ic svg { animation: icoBreathe 1.6s ease-in-out infinite; }   /* Respiration */
      .navbtn[data-nav="catalogue"]:hover .navbtn__ic svg { animation: icoHop     .8s  ease-out    infinite; }   /* Sautillage */
      .navbtn[data-nav="ventes"]:hover    .navbtn__ic svg { animation: icoSwing   .9s  ease-out    infinite; }   /* Rotation 15° */
      .navbtn[data-nav="depenses"]:hover  .navbtn__ic svg { animation: icoSlide   .8s  ease-out    infinite; }   /* Translation */
      .navbtn[data-nav="caisse"]:hover    .navbtn__ic svg { animation: icoGlow    1.5s ease-in-out infinite; }   /* Pulsation / lueur */
      .navbtn[data-nav="bilan"]:hover     .navbtn__ic svg { transform-origin: 50% 100%; animation: icoStretch .8s ease-out infinite; }  /* Étirement */
      .navbtn[data-nav="carnet"]:hover    .navbtn__ic svg { animation: icoShake   .5s  ease-out    infinite; }   /* Vibration */
      .navbtn[data-nav="equipe"]:hover    .navbtn__ic svg { animation: icoConverge 1s  ease-in-out infinite; }   /* Convergence */
    }
    @keyframes icoBreathe  { 0%, 100% { transform: scale(1); }          50% { transform: scale(1.05); } }
    @keyframes icoHop      { 0%, 38%, 100% { transform: translateY(0); } 18% { transform: translateY(-4px); } }
    @keyframes icoSwing    { 0%, 60%, 100% { transform: rotate(0); }     28% { transform: rotate(15deg); } }
    @keyframes icoSlide    { 0%, 55%, 100% { transform: translateX(0); } 26% { transform: translateX(6px); } }
    @keyframes icoGlow     { 0%, 100% { filter: drop-shadow(0 0 2px var(--glow)); } 50% { filter: drop-shadow(0 0 9px var(--glow)); } }
    @keyframes icoStretch  { 0%, 60%, 100% { transform: scaleY(1); }     30% { transform: scaleY(1.1); } }
    @keyframes icoShake    { 0%, 100% { transform: rotate(0); } 20% { transform: rotate(-5deg); } 60% { transform: rotate(5deg); } }
    @keyframes icoConverge { 0%, 100% { transform: scaleX(1); }          50% { transform: scaleX(.84); } }

    /* NIVEAU 4 : bas de page (poussé en bas par nav flex:1) */
    .drawer__foot { padding-top: 8px; display: flex; flex-direction: column; gap: 1px; border-top: 1px solid rgba(255, 255, 255, .08); }
    .footbtn {
      display: flex; align-items: center; gap: 11px; width: 100%;
      padding: clamp(7px, 1vh, 10px) 12px; border-radius: 11px; cursor: pointer; border: 0; background: none;
      color: rgba(255, 255, 255, .55); font: inherit; font-size: 13.5px; font-weight: 650; text-align: left;
      transition: background .16s var(--ease), color .16s var(--ease);
    }
    .footbtn__ic { width: 20px; height: 20px; flex: none; display: grid; place-items: center; color: inherit; }
    .footbtn__ic svg { width: 20px; height: 20px; }
    .footbtn:hover { background: rgba(255, 255, 255, .06); color: rgba(255, 255, 255, .86); }
    .footbtn--logout { color: #a35c54; }                                   /* rouge brique éteint */
    .footbtn--logout:hover { background: rgba(255, 59, 59, .14); color: #ff4436; }   /* rouge vif intense */
    .footbtn--logout:hover .footbtn__ic { filter: drop-shadow(0 0 6px rgba(255, 59, 59, .7)); }

    .proto-tag {
      position: fixed; z-index: 43; left: 50%; bottom: max(14px, env(safe-area-inset-bottom));
      transform: translateX(-50%);
      font-size: 11px; letter-spacing: .04em; color: rgba(255, 255, 255, .55);
      background: rgba(0, 0, 0, .4); -webkit-backdrop-filter: blur(6px); backdrop-filter: blur(6px);
      padding: 6px 12px; border-radius: 999px; border: 1px solid rgba(255, 255, 255, .12);
      pointer-events: none;
    }

    @keyframes logoPulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.045); } }
    @media (prefers-reduced-motion: reduce) {
      .hdr__logo { animation: none; }
      .drawer { transition: transform .2s ease; }
      .navbtn__ic svg { animation: none !important; }   /* micro-anims d'icônes coupées si mouvement réduit (dont le scan Statistiques) */
      .navbtn--holo { animation: none !important; scale: none !important; }          /* Statistiques : pas de respiration d'échelle */
      .navbtn--holo::before { animation: none !important; opacity: 1 !important; }   /* halo spectral figé mais bien visible */
      .vital { animation: none !important; }   /* chiffres clés : pas de fondu */
      .screen.cine, .screen.hud { animation: none !important; }   /* pas de caméra si mouvement réduit */
      .home.portal { animation: none !important; clip-path: none !important; }   /* pas de portail si mouvement réduit */
      .home.portal::after { animation: none !important; opacity: 0 !important; }
      .screen.drawer3d, .catcard, .stockrow, .qtybtn__val.pop, .exprow, .fab { animation: none !important; }   /* pas de tiroir/gigogne/pop/FAB si mouvement réduit */
      .navbtn[data-nav="catalogue"]:hover .chest__lid, .navbtn[data-nav="catalogue"]:hover .chest__base { transform: none !important; }
      .navbtn.miles, .navbtn.miles .navbtn__ic { animation: none !important; }   /* pas de glitch "Miles" si mouvement réduit */
      .hud__hi, .hud__sys i, .hud__caret { animation: none !important; }   /* pas de curseur clignotant / glitch si mouvement réduit */
      .depth__dust span { animation: none !important; opacity: .28 !important; }   /* poussières figées */
      .masto__btn, .masto__btn:hover, .masto__btn:active { transform: none !important; }   /* pas de bascule 3D */
    }
    /* ============================================================================
       VAGUE 1 : CAISSE (POS) · VENTES · STATISTIQUES · BILAN + composants data/IA
       ========================================================================== */
    .screen.wide { max-width: 500px; }

    /* KPI (cartes chiffres) */
    .kpis { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin: 16px auto 0; }
    .kpi { --kc: #38f0ff; position: relative; overflow: hidden; padding: 13px 14px; border-radius: 16px; text-align: left;
      background: linear-gradient(160deg, rgba(255,255,255,.11), rgba(255,255,255,.03));
      -webkit-backdrop-filter: blur(12px) saturate(130%); backdrop-filter: blur(12px) saturate(130%);
      border: 1px solid color-mix(in srgb, var(--kc) 26%, rgba(255,255,255,.16));
      box-shadow: 0 12px 28px -16px rgba(0,0,0,.6), 0 0 18px -6px color-mix(in srgb, var(--kc) 52%, transparent), inset 0 1px 0 rgba(255,255,255,.2);
      animation: vitalIn .5s calc(var(--i,0) * .08s) var(--ease) both; }
    .kpi::before { content:""; position:absolute; inset:0; border-radius:inherit; pointer-events:none;
      background: radial-gradient(120% 80% at 16% 0%, color-mix(in srgb, var(--kc) 22%, transparent), transparent 60%); }
    .kpi__lbl { position:relative; font-size:10px; font-weight:700; letter-spacing:.1em; text-transform:uppercase; color: color-mix(in srgb, var(--kc) 72%, #d7eef2); }
    .kpi__num { position:relative; display:block; margin-top:6px; font-size: clamp(19px,5.4vw,25px); font-weight:800; line-height:1; color:#fff; font-variant-numeric: tabular-nums; text-shadow: 0 0 10px color-mix(in srgb, var(--kc) 38%, transparent); }
    .kpi__sub { position:relative; display:block; margin-top:5px; font-size:11px; color: rgba(255,255,255,.45); }
    .kpi--ca { --kc:#35e07a; } .kpi--dep { --kc:#e11d48; } .kpi--ben { --kc:#38f0ff; } .kpi--marge { --kc:#ffd23f; }

    /* Panneau glass réutilisable */
    .panel { position: relative; max-width: 500px; margin: 14px auto 0; padding: 15px 16px; border-radius: 18px; text-align:left;
      background: linear-gradient(160deg, rgba(255,255,255,.06), rgba(255,255,255,.02));
      -webkit-backdrop-filter: blur(12px); backdrop-filter: blur(12px);
      border: 1px solid rgba(255,255,255,.1); box-shadow: 0 14px 34px -22px rgba(0,0,0,.7), inset 0 1px 0 rgba(255,255,255,.1); }
    .panel__ttl { margin:0 0 13px; font-size:13px; font-weight:800; color:#fff; display:flex; align-items:center; gap:8px; }
    .panel__ttl i { width:7px; height:7px; border-radius:50%; background: var(--sc,#38f0ff); box-shadow:0 0 8px var(--sc,#38f0ff); }

    /* Donut (camembert dépenses) */
    .donut { display:flex; align-items:center; gap:15px; }
    .donut__wrap { position:relative; width:132px; height:132px; flex:none; }
    .donut__svg { width:132px; height:132px; transform: rotate(-90deg); animation: donutIn .8s var(--ease) both; }
    .donut__svg circle { fill:none; stroke-width:13; }
    .donut__track { stroke: rgba(255,255,255,.06); }
    @keyframes donutIn { from { opacity:0; transform: rotate(-150deg) scale(.82); } to { opacity:1; transform: rotate(-90deg) scale(1); } }
    .donut__center { position:absolute; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center; text-align:center; }
    .donut__c-lbl { font-size:9.5px; font-weight:700; letter-spacing:.1em; text-transform:uppercase; color: rgba(255,255,255,.45); }
    .donut__c-val { font-size:15px; font-weight:800; color:#fff; font-variant-numeric: tabular-nums; margin-top:2px; }
    .legend { flex:1 1 auto; min-width:0; display:flex; flex-direction:column; gap:8px; }
    .legend__row { display:flex; align-items:center; gap:8px; font-size:12.5px; }
    .legend__dot { width:10px; height:10px; border-radius:3px; flex:none; box-shadow:0 0 8px currentColor; }
    .legend__name { flex:1 1 auto; color: rgba(255,255,255,.8); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .legend__val { font-weight:800; color:#fff; font-variant-numeric: tabular-nums; }
    .legend__pct { color: rgba(255,255,255,.42); font-size:11px; margin-left:4px; font-weight:600; }

    /* Bar chart (évolution 7 j) */
    .bars { display:flex; align-items:flex-end; gap:8px; height:132px; margin-top:4px; }
    .barcol { flex:1 1 0; display:flex; flex-direction:column; align-items:center; gap:7px; height:100%; justify-content:flex-end; }
    .barcol__pair { display:flex; align-items:flex-end; justify-content:center; gap:3px; width:100%; height:100%; }
    .bar { width:10px; border-radius:4px 4px 2px 2px; transform-origin:bottom; animation: barGrow .7s calc(var(--i,0)*.05s) var(--ease) both; }
    .bar--ca { background: linear-gradient(180deg,#6bf0a0,#35e07a); box-shadow:0 0 10px -2px rgba(53,224,122,.55); }
    .bar--dep { background: linear-gradient(180deg,#ff8a97,#e11d48); box-shadow:0 0 10px -2px rgba(225,29,72,.5); }
    @keyframes barGrow { from { transform: scaleY(0); } to { transform: scaleY(1); } }
    .barcol__lbl { font-size:10px; color: rgba(255,255,255,.4); }
    .chartkey { display:flex; gap:16px; margin-top:12px; font-size:11px; color: rgba(255,255,255,.55); }
    .chartkey b { display:inline-block; width:9px; height:9px; border-radius:3px; margin-right:5px; vertical-align:middle; }

    /* Barres horizontales (bilan) */
    .hbar { margin-top:12px; } .hbar:first-child { margin-top:0; }
    .hbar__top { display:flex; align-items:baseline; justify-content:space-between; margin-bottom:5px; }
    .hbar__name { font-size:12.5px; font-weight:700; color: rgba(255,255,255,.82); }
    .hbar__val { font-size:12px; font-weight:800; color:#fff; font-variant-numeric: tabular-nums; }
    .hbar__val i { color: rgba(255,255,255,.4); font-style:normal; font-weight:600; margin-left:4px; }
    .hbar__track { height:9px; border-radius:999px; background: rgba(255,255,255,.06); overflow:hidden; }
    .hbar__fill { display:block; height:100%; border-radius:999px; transform-origin:left; animation: hbarGrow .8s var(--ease) both; }
    @keyframes hbarGrow { from { transform: scaleX(0); } to { transform: scaleX(1); } }

    /* Bandeau IA (interprétation) */
    .ia { position:relative; overflow:hidden; max-width:500px; margin:16px auto 0; padding:14px 15px 14px 46px; border-radius:16px; text-align:left;
      background: linear-gradient(150deg, rgba(56,240,255,.1), rgba(185,140,255,.05));
      border:1px solid rgba(56,240,255,.28); box-shadow: 0 0 22px -8px rgba(56,240,255,.45), inset 0 1px 0 rgba(255,255,255,.12); }
    .ia--good { background: linear-gradient(150deg, rgba(53,224,122,.12), rgba(56,240,255,.04)); border-color: rgba(53,224,122,.32); box-shadow:0 0 22px -8px rgba(53,224,122,.42); }
    .ia--warn { background: linear-gradient(150deg, rgba(255,90,106,.12), rgba(255,140,61,.05)); border-color: rgba(255,90,106,.34); box-shadow:0 0 22px -8px rgba(255,90,106,.4); }
    .ia__orb { position:absolute; left:14px; top:15px; width:22px; height:22px; border-radius:50%;
      background: radial-gradient(circle at 32% 28%, #eafdff, #38f0ff 58%, #8a5cff); box-shadow:0 0 12px rgba(56,240,255,.8); animation: iaPulse 2.2s ease-in-out infinite; }
    .ia--good .ia__orb { background: radial-gradient(circle at 32% 28%, #eafff2, #35e07a 58%, #38f0ff); box-shadow:0 0 12px rgba(53,224,122,.8); }
    .ia--warn .ia__orb { background: radial-gradient(circle at 32% 28%, #fff0f0, #ff5a6a 58%, #ff8a3d); box-shadow:0 0 12px rgba(255,90,106,.8); }
    @keyframes iaPulse { 0%,100% { transform:scale(1); } 50% { transform:scale(1.16); } }
    .ia__chip { display:block; font-size:9.5px; font-weight:800; letter-spacing:.14em; text-transform:uppercase; color:#8ff6ff; margin-bottom:3px; }
    .ia--good .ia__chip { color:#7bf0a8; } .ia--warn .ia__chip { color:#ffb0a0; }
    .ia__title { margin:0 0 4px; font-size:14.5px; font-weight:800; color:#fff; }
    .ia__txt { margin:0; font-size:12.5px; line-height:1.55; color: rgba(255,255,255,.72); }
    .ia__txt b { color:#fff; font-weight:800; }

    /* Bénéfice héro (bilan) */
    .benhero { position:relative; overflow:hidden; max-width:500px; margin:16px auto 0; padding:22px; border-radius:20px; text-align:center;
      background: linear-gradient(160deg, rgba(255,255,255,.09), rgba(255,255,255,.02)); -webkit-backdrop-filter: blur(14px); backdrop-filter: blur(14px);
      border:1px solid rgba(255,255,255,.14); animation: vitalIn .5s var(--ease) both; }
    .ben--ok { border-color: rgba(53,224,122,.4); box-shadow:0 0 30px -8px rgba(53,224,122,.5), inset 0 1px 0 rgba(255,255,255,.2); }
    .ben--bad { border-color: rgba(255,90,106,.4); box-shadow:0 0 30px -8px rgba(255,90,106,.5), inset 0 1px 0 rgba(255,255,255,.2); }
    .benhero__lbl { display:block; font-size:11px; font-weight:700; letter-spacing:.14em; text-transform:uppercase; color: rgba(255,255,255,.55); }
    .benhero__num { display:block; margin:8px 0 6px; font-size: clamp(34px,10vw,50px); font-weight:800; line-height:1; font-variant-numeric: tabular-nums; }
    .ben--ok .benhero__num { color:#6bf0a0; text-shadow:0 0 22px rgba(53,224,122,.5); }
    .ben--bad .benhero__num { color:#ff8a97; text-shadow:0 0 22px rgba(255,90,106,.5); }
    .benhero__sub { font-size:13px; color: rgba(255,255,255,.6); }

    /* CAISSE (POS) */
    .pos { max-width:500px; margin:0 auto; }
    .pos__grid { display:grid; grid-template-columns: repeat(3,1fr); gap:9px; margin:14px 0 0; }
    @media (max-width:380px){ .pos__grid { grid-template-columns: repeat(2,1fr); } }
    .pos-tile { position:relative; overflow:hidden; aspect-ratio:1/1; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:5px; padding:8px; border-radius:15px; cursor:pointer; font:inherit; color:#fff;
      background: linear-gradient(160deg, rgba(255,255,255,.1), rgba(255,255,255,.03)); border:1px solid rgba(255,255,255,.12);
      box-shadow:0 8px 20px -12px rgba(0,0,0,.6), inset 0 1px 0 rgba(255,255,255,.16);
      transition: transform .1s ease, box-shadow .2s ease, border-color .2s ease; animation: expIn .4s calc(var(--i)*35ms) var(--ease) both; }
    .pos-tile:active { transform: scale(.93); }
    @media (hover:hover){ .pos-tile:hover { border-color: rgba(53,224,122,.5); box-shadow:0 10px 24px -12px rgba(0,0,0,.7), 0 0 18px -4px rgba(53,224,122,.5); } }
    .pos-tile__disc { width:34px; height:34px; border-radius:50%; display:grid; place-items:center; font-size:15px; font-weight:800; box-shadow: inset 0 1px 0 rgba(255,255,255,.4); }
    .pos-tile__name { font-size:11.5px; font-weight:700; text-align:center; line-height:1.15; max-width:100%; }
    .pos-tile__price { font-size:12px; font-weight:800; color:#6bf0a0; font-variant-numeric: tabular-nums; }
    .pos-tile__rupt { font-size:9.5px; font-weight:800; letter-spacing:.08em; text-transform:uppercase; color:#ff5a6a; }
    .pos-tile__badge { position:absolute; top:6px; right:6px; min-width:20px; height:20px; padding:0 5px; border-radius:999px; display:grid; place-items:center; font-size:11px; font-weight:800; color:#04140e; background: radial-gradient(120% 120% at 30% 25%, #86ffd0, #35e07a); box-shadow:0 0 10px rgba(53,224,122,.6); transform: scale(0); transition: transform .22s var(--ease-back); }
    .pos-tile.has .pos-tile__badge { transform: scale(1); }
    .pos-tile.has { border-color: rgba(53,224,122,.55); box-shadow:0 8px 20px -12px rgba(0,0,0,.6), 0 0 16px -4px rgba(53,224,122,.5), inset 0 1px 0 rgba(255,255,255,.16); }
    .pos-tile.rupt { opacity:.38; pointer-events:none; }
    .pos__pad { height:220px; }
    .ticket { position:fixed; left:0; right:0; bottom:0; z-index:44; padding:13px 16px calc(14px + env(safe-area-inset-bottom));
      background: linear-gradient(180deg, rgba(20,22,30,.97), rgba(11,12,18,1)); border-top:1px solid rgba(53,224,122,.28); border-radius:20px 20px 0 0;
      box-shadow:0 -18px 44px -20px rgba(0,0,0,.92), inset 0 1px 0 rgba(255,255,255,.07); transform: translateY(125%); transition: transform .32s var(--ease-back); }
    .ticket.is-on { transform: translateY(0); }
    .ticket__top { display:flex; align-items:baseline; justify-content:space-between; margin-bottom:11px; }
    .ticket__cnt { font-size:12.5px; font-weight:700; color: rgba(255,255,255,.55); }
    .ticket__total { font-size:27px; font-weight:800; color:#6bf0a0; font-variant-numeric: tabular-nums; text-shadow:0 0 14px rgba(53,224,122,.5); }
    .ticket__modes { display:flex; gap:7px; margin-bottom:11px; }
    .paymode { --pc:#38f0ff; flex:1; padding:9px 6px; border-radius:12px; border:1px solid rgba(255,255,255,.14); background: rgba(255,255,255,.05); color: rgba(255,255,255,.72); font:inherit; font-size:11.5px; font-weight:700; cursor:pointer; display:flex; flex-direction:column; align-items:center; gap:4px; transition: color .18s, border-color .18s, background .18s, box-shadow .18s; }
    .paymode svg { width:18px; height:18px; }
    .paymode.is-on { color:#fff; border-color: var(--pc); background: color-mix(in srgb, var(--pc) 16%, transparent); box-shadow:0 0 14px -4px var(--pc); }
    .paymode--esp { --pc:#35e07a; } .paymode--momo { --pc:#38f0ff; } .paymode--credit { --pc:#ff8a3d; }
    .ticket__go { width:100%; padding:15px; border:0; border-radius:15px; cursor:pointer; font:inherit; font-size:16px; font-weight:800; color:#04140e; background: radial-gradient(140% 140% at 30% 20%, #86ffd0, #35e07a); box-shadow:0 0 24px -4px rgba(53,224,122,.6); transition: transform .1s ease; display:flex; align-items:center; justify-content:center; gap:8px; }
    .ticket__go:active { transform: scale(.97); }
    .ticket__go span { font-variant-numeric: tabular-nums; opacity:.85; }
    .pos__empty { text-align:center; color: rgba(255,255,255,.42); font-size:14px; line-height:1.5; margin:8vh auto 0; max-width:300px; }
    .pos__empty b { color:#8ff6ff; }
    .cashburst { position:fixed; inset:0; z-index:48; display:grid; place-items:center; pointer-events:none; }
    .cashburst b { font-size: clamp(40px,13vw,68px); font-weight:800; color:#6bf0a0; font-variant-numeric: tabular-nums; text-shadow:0 0 30px rgba(53,224,122,.7); animation: cashPop .9s cubic-bezier(.2,1.3,.3,1) both; }
    @keyframes cashPop { 0% { opacity:0; transform: scale(.4) translateY(20px); } 30% { opacity:1; transform: scale(1.05) translateY(0); } 70% { opacity:1; transform: scale(1) translateY(0); } 100% { opacity:0; transform: scale(1) translateY(-40px); } }

    /* VENTES (historique) */
    .saleslist { max-width:480px; margin:14px auto 0; display:flex; flex-direction:column; gap:9px; }
    .salerow { position:relative; padding:12px 13px; border-radius:14px; text-align:left; background: rgba(255,255,255,.05); border:1px solid rgba(255,255,255,.09); border-left:3px solid #35e07a; box-shadow:0 8px 20px -14px rgba(0,0,0,.7); animation: expIn .4s calc(var(--i)*40ms) var(--ease) both; }
    .salerow__top { display:flex; align-items:center; justify-content:space-between; gap:10px; }
    .salerow__cnt { font-size:12.5px; font-weight:700; color: rgba(255,255,255,.6); }
    .salerow__amt { font-size:16px; font-weight:800; color:#6bf0a0; font-variant-numeric: tabular-nums; }
    .salerow__items { margin-top:4px; font-size:12px; color: rgba(255,255,255,.5); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .salerow__meta { display:flex; align-items:center; gap:8px; margin-top:7px; font-size:11px; color: rgba(255,255,255,.4); }
    .paybadge { padding:2px 8px; border-radius:999px; font-size:10px; font-weight:800; }
    .paybadge--esp { color:#7bf0a8; background: rgba(53,224,122,.14); }
    .paybadge--momo { color:#8ff6ff; background: rgba(56,240,255,.14); }
    .paybadge--credit { color:#ffb27a; background: rgba(255,138,61,.16); }
    .sales-total { max-width:480px; margin:14px auto 0; text-align:center; font-size:14px; color: rgba(255,255,255,.6); }
    .sales-total b { display:block; margin-top:4px; font-size:26px; font-weight:800; color:#6bf0a0; font-variant-numeric: tabular-nums; text-shadow:0 0 14px rgba(53,224,122,.4); }

    @media (prefers-reduced-motion: reduce) {
      .kpi, .benhero, .donut__svg, .bar, .hbar__fill, .pos-tile, .salerow, .cashburst b { animation: none !important; }
      .donut__svg { transform: rotate(-90deg) !important; }
      .bar, .hbar__fill { transform: none !important; }
    }
    /* ============================================================================
       VAGUE 2 : OBJECTIFS (revenus + achats) · CARNET CLIENTS (dettes + relances)
       ========================================================================== */
    /* Segmented control (Jour / Semaine / Mois) */
    .seg { display:flex; gap:4px; max-width:500px; margin:16px auto 0; padding:4px; border-radius:999px; background: rgba(255,255,255,.05); border:1px solid rgba(255,255,255,.1); }
    .seg-btn { flex:1; border:0; background:none; color: rgba(255,255,255,.55); font:inherit; font-size:12.5px; font-weight:700; padding:9px 8px; border-radius:999px; cursor:pointer; transition: color .2s, background .2s, box-shadow .2s; }
    .seg-btn.is-on { color:#1a1406; background: radial-gradient(120% 120% at 30% 25%, #ffe38a, #ffd23f); box-shadow:0 0 14px -3px rgba(255,210,63,.6); }

    /* Anneau de progression (revenu) */
    .objgoal { display:flex; align-items:center; gap:18px; }
    .ring { position:relative; width:120px; height:120px; flex:none; }
    .ring__svg { width:120px; height:120px; transform: rotate(-90deg); }
    .ring__svg circle { fill:none; stroke-width:11; }
    .ring__track { stroke: rgba(255,255,255,.07); }
    .ring__val { stroke-linecap:round; transition: stroke-dashoffset 1s var(--ease); }
    .ring__center { position:absolute; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center; }
    .ring__pct { font-size:26px; font-weight:800; line-height:1; font-variant-numeric: tabular-nums; }
    .ring__sub { margin-top:3px; font-size:10px; font-weight:700; letter-spacing:.08em; text-transform:uppercase; color: rgba(255,255,255,.45); }
    .objgoal__info { flex:1 1 auto; min-width:0; }
    .objgoal__cur { display:block; font-size:24px; font-weight:800; color:#fff; font-variant-numeric: tabular-nums; }
    .objgoal__tgt { display:block; margin-top:2px; font-size:13px; color: rgba(255,255,255,.5); }
    .objgoal__edit { margin-top:10px; padding:8px 12px; border-radius:10px; border:1px solid rgba(255,210,63,.4); background: rgba(255,210,63,.1); color:#ffe38a; font:inherit; font-size:12px; font-weight:700; cursor:pointer; transition: background .18s, box-shadow .18s; }
    .objgoal__edit:hover { background: rgba(255,210,63,.18); box-shadow:0 0 14px -4px rgba(255,210,63,.6); }
    .objsec { max-width:500px; margin:22px auto 0; font-size:13px; font-weight:800; letter-spacing:.02em; color: rgba(255,255,255,.85); text-align:left; }
    .cibles { max-width:500px; margin:12px auto 0; display:flex; flex-direction:column; gap:10px; }
    .cible { text-align:left; padding:14px; border-radius:16px; background: rgba(255,255,255,.05); border:1px solid rgba(255,255,255,.1); box-shadow:0 8px 20px -14px rgba(0,0,0,.7); animation: expIn .4s calc(var(--i)*45ms) var(--ease) both; }
    .cible__top { display:flex; align-items:baseline; justify-content:space-between; margin-bottom:9px; }
    .cible__name { font-size:14.5px; font-weight:800; color:#fff; }
    .cible__amt { font-size:14px; font-weight:800; color:#ffd23f; font-variant-numeric: tabular-nums; }
    .cible__foot { display:flex; justify-content:space-between; gap:10px; margin-top:8px; font-size:11.5px; color: rgba(255,255,255,.5); }
    .cible__add { margin-top:11px; width:100%; padding:9px; border-radius:11px; border:1px dashed rgba(255,210,63,.4); background:none; color:#ffe38a; font:inherit; font-size:12.5px; font-weight:700; cursor:pointer; transition: background .18s; }
    .cible__add:active { background: rgba(255,210,63,.12); }

    /* Carnet clients */
    .clients { max-width:500px; margin:14px auto 0; display:flex; flex-direction:column; gap:10px; }
    .client { text-align:left; padding:13px 14px; border-radius:16px; background: rgba(255,255,255,.05); border:1px solid rgba(255,255,255,.1); box-shadow:0 8px 20px -14px rgba(0,0,0,.7); animation: expIn .4s calc(var(--i)*45ms) var(--ease) both; }
    .client__head { display:flex; align-items:center; gap:11px; }
    .client__av { width:40px; height:40px; flex:none; border-radius:50%; display:grid; place-items:center; font-size:16px; font-weight:800; color:#1a0f04; background: radial-gradient(120% 120% at 30% 25%, #ffcf99, #ff8a3d); box-shadow:0 0 14px -3px rgba(255,138,61,.6), inset 0 1px 0 rgba(255,255,255,.4); }
    .client__id { flex:1 1 auto; min-width:0; }
    .client__name { display:block; font-size:14.5px; font-weight:700; color:#fff; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .client__meta { display:block; margin-top:2px; font-size:11px; color: rgba(255,255,255,.45); }
    .client__debt { flex:none; font-size:11.5px; font-weight:800; padding:4px 9px; border-radius:999px; }
    .client__debt.is-due { color:#ffb27a; background: rgba(255,138,61,.15); }
    .client__debt.is-ok { color:#7bf0a8; background: rgba(53,224,122,.14); }
    .client__act { display:flex; gap:7px; margin-top:12px; flex-wrap:wrap; }
    .cbtn { display:inline-flex; align-items:center; gap:6px; padding:8px 12px; border-radius:11px; border:1px solid rgba(255,255,255,.14); background: rgba(255,255,255,.05); color: rgba(255,255,255,.8); font:inherit; font-size:12px; font-weight:700; cursor:pointer; transition: color .18s, border-color .18s, background .18s, box-shadow .18s; }
    .cbtn svg { width:15px; height:15px; }
    .cbtn:active { transform: scale(.95); }
    .cbtn--relance { color:#7bf0a8; border-color: rgba(53,224,122,.35); }

    // Historique de ventes de démo (7 jours) si vide -> les graphes ont de la matière

      SM.ventes = [

    if (!SM.depenses) {   // seed dépenses dès le chargement -> Stats/Bilan ont de la matière sans passer par l'écran Dépenses
      SM.depenses = [

        { id: 'd3', lib: 'Loyer boutique', cat: 'Loyer', montant: 30000, when: 'Hier', ts: Date.now() - 1 * DAY },
        { id: 'd4', lib: 'Emballages', cat: 'Fournitures', montant: 3500, when: 'Hier', ts: Date.now() - 1 * DAY - 3600000 },
        { id: 'd5', lib: 'Recharge crédit', cat: 'Divers', montant: 1000, when: 'Lun.', ts: Date.now() - 3 * DAY },

    }
    (SM.depenses || []).forEach((d, i) => { if (!d.ts) d.ts = Date.now() - (i % 4) * DAY - i * 3600000; });   // ts rétroactif (anciennes données)

    const salesTotal = () => (SM.ventes || []).reduce((s, v) => s + (+v.total || 0), 0);
    const salesToday = () => { const t0 = new Date(); t0.setHours(0, 0, 0, 0); return (SM.ventes || []).filter((v) => v.ts >= t0.getTime()).reduce((s, v) => s + v.total, 0); };
    function depByCat() { const m = {}; (SM.depenses || []).forEach((d) => { m[d.cat] = (m[d.cat] || 0) + (+d.montant || 0); }); return Object.keys(m).map((k) => ({ name: k, val: m[k], color: CATS[k] || '#88aab0' })).sort((a, b) => b.val - a.val); }
    function salesByMode() { const m = {}; (SM.ventes || []).forEach((v) => { m[v.mode] = (m[v.mode] || 0) + (+v.total || 0); }); return m; }
    function evo7() {
      const days = []; const now = new Date(); now.setHours(0, 0, 0, 0);
      const J = ['Dim', 'Lun', 'Mar', 'Mer', 'Jeu', 'Ven', 'Sam'];
      for (let k = 6; k >= 0; k--) { const d = new Date(now.getTime() - k * DAY); days.push({ t0: d.getTime(), t1: d.getTime() + DAY, lbl: J[d.getDay()], ca: 0, dep: 0 }); }
      (SM.ventes || []).forEach((v) => { const b = days.find((x) => v.ts >= x.t0 && v.ts < x.t1); if (b) b.ca += (+v.total || 0); });
      (SM.depenses || []).forEach((dp) => { const ts = dp.ts || Date.now(); const b = days.find((x) => ts >= x.t0 && ts < x.t1); if (b) b.dep += (+dp.montant || 0); });
      return days;
    }
    const relTime = (ts) => {
      const h = (Date.now() - ts) / 3600000;
      if (h < 1) return "À l'instant"; if (h < 24) return 'Il y a ' + Math.round(h) + ' h';
      const d = new Date(ts), n = new Date(); n.setHours(0, 0, 0, 0);
      const days = Math.round((n.getTime() - new Date(ts).setHours(0, 0, 0, 0)) / DAY);
      if (days === 1) return 'Hier'; if (days < 7) return ['Dim', 'Lun', 'Mar', 'Mer', 'Jeu', 'Ven', 'Sam'][d.getDay()];
      return d.getDate() + '/' + (d.getMonth() + 1);
    };

    // ---- Graphes SVG ----
    function donutSVG(data, centerLbl) {
      const R = 54, C = 2 * Math.PI * R, total = data.reduce((s, d) => s + d.val, 0) || 1; let off = 0;
      const segs = data.map((d) => { const len = C * (d.val / total); const seg = '<circle r="' + R + '" cx="66" cy="66" stroke="' + d.color + '" stroke-dasharray="' + len.toFixed(1) + ' ' + (C - len).toFixed(1) + '" stroke-dashoffset="' + (-off).toFixed(1) + '" style="filter:drop-shadow(0 0 3px ' + d.color + ')"/>'; off += len; return seg; }).join('');
      const leg = data.map((d) => '<div class="legend__row"><span class="legend__dot" style="color:' + d.color + ';background:' + d.color + '"></span><span class="legend__name">' + d.name + '</span><span class="legend__val">' + fF(d.val) + '<span class="legend__pct">' + Math.round(d.val / total * 100) + '%</span></span></div>').join('');
      return '<div class="donut"><div class="donut__wrap"><svg class="donut__svg" viewBox="0 0 132 132"><circle class="donut__track" r="' + R + '" cx="66" cy="66"/>' + segs + '</svg><div class="donut__center"><span class="donut__c-lbl">' + (centerLbl || 'Total') + '</span><b class="donut__c-val">' + fF(total) + '</b></div></div><div class="legend">' + leg + '</div></div>';
    }
    function barsSVG(days) {
      const max = Math.max(1, ...days.map((d) => Math.max(d.ca, d.dep)));
      const cols = days.map((d, i) => '<div class="barcol"><div class="barcol__pair" style="--i:' + i + '"><span class="bar bar--ca" style="height:' + Math.max(3, d.ca / max * 100).toFixed(1) + '%"></span><span class="bar bar--dep" style="height:' + Math.max(3, d.dep / max * 100).toFixed(1) + '%"></span></div><span class="barcol__lbl">' + d.lbl + '</span></div>').join('');
      return '<div class="bars">' + cols + '</div><div class="chartkey"><span><b style="background:#35e07a"></b>Ventes</span><span><b style="background:#e11d48"></b>Dépenses</span></div>';
    }
    const hbar = (name, val, total, color) => { const pct = total > 0 ? Math.round(val / total * 100) : 0; return '<div class="hbar"><div class="hbar__top"><span class="hbar__name">' + name + '</span><span class="hbar__val">' + fF(val) + '<i>' + pct + '%</i></span></div><div class="hbar__track"><span class="hbar__fill" style="width:' + pct + '%;background:' + color + ';box-shadow:0 0 10px -2px ' + color + '"></span></div></div>'; };

    // ---- Moteur IA local (interprétation + conseil, sans réseau) ----
    function iaVerdict() {
      const ca = salesTotal(), dep = expTotal(), ben = ca - dep, marge = ca > 0 ? Math.round(ben / ca * 100) : 0;
      const cats = depByCat(), top = cats[0]; const lines = []; let tone = '', title = '';

      else if (ben === 0) { title = "Tu es à l'équilibre"; lines.push('Tu rentres tout juste dans tes frais : <b>' + fF(ca) + '</b> encaissé pour <b>' + fF(dep) + '</b> dépensé. Une vente de plus et tu gagnes.'); }
      else { tone = 'warn'; title = "Attention, tu perds de l'argent"; lines.push('Tu as dépensé <b>' + fF(dep) + '</b> pour seulement <b>' + fF(ca) + '</b> encaissé. Il manque <b>' + fF(Math.abs(ben)) + '</b> pour être à l\'équilibre.'); }
      if (top && dep > 0) { const share = Math.round(top.val / dep * 100); lines.push('Ta plus grosse sortie, c\'est <b>' + top.name + '</b> (' + share + '% de tes dépenses). ' + (share > 45 ? 'Ça pèse lourd : regarde si tu peux la baisser.' : 'Ça reste sous contrôle.')); }
      const stoday = salesToday(); if (stoday > 0) { const pc = Math.round(stoday / objJour() * 100); lines.push(pc >= 100 ? 'Objectif du jour atteint (<b>' + fF(stoday) + '</b>) : continue sur ta lancée !' : 'Aujourd\'hui tu es à <b>' + pc + '%</b> de ton objectif (' + fF(stoday) + ' sur ' + fF(objJour()) + ').'); }
      return { tone, title, lines };

    function iaBanner() { const v = iaVerdict(); return '<div class="ia' + (v.tone ? ' ia--' + v.tone : '') + '"><span class="ia__orb"></span><span class="ia__chip">&#10022; L\'IA Boussole</span><h3 class="ia__title">' + v.title + '</h3><p class="ia__txt">' + v.lines.join(' ') + '</p></div>'; }
    const kpi = (mod, lbl, num, sub, i) => '<div class="kpi kpi--' + mod + '" style="--i:' + i + '"><span class="kpi__lbl">' + lbl + '</span><span class="kpi__num">' + num + '</span><span class="kpi__sub">' + sub + '</span></div>';

    /* ===== CAISSE (POS) : touche les produits, choisis le paiement, encaisse ===== */

    function bindCaisse() {
      _ticket = []; _payMode = 'espèces';
      const scr = view.querySelector('.screen'); if (!scr) return;

      grid.addEventListener('click', (e) => {

    function ringSVG(pct, color, sub) {

    // Bascule "kinetic" : les mastodontes s'inclinent VERS le curseur/doigt (-5..5°), comme une plaque métallique
    function bindMastoTilt() {
      const rm = matchMedia('(prefers-reduced-motion: reduce)').matches;
      view.querySelectorAll('.masto__btn').forEach((btn) => {
        let raf = 0, down = false;
        const apply = (e) => {
          const r = btn.getBoundingClientRect();
          const rx = (0.5 - (e.clientY - r.top) / r.height) * 10;   // -5..5°
          const ry = ((e.clientX - r.left) / r.width - 0.5) * 10;   // -5..5°
          if (raf) cancelAnimationFrame(raf);
          raf = requestAnimationFrame(() => { btn.style.transform = 'rotateX(' + rx.toFixed(1) + 'deg) rotateY(' + ry.toFixed(1) + 'deg) translateY(-4px)' + (down ? ' scale(.97)' : ''); });
        };
        const reset = () => { if (raf) cancelAnimationFrame(raf); raf = 0; down = false; btn.style.transform = ''; };
        // ---- Audio-haptique (actif même en mouvement réduit) ----
        btn.addEventListener('pointerenter', startCharge);                                 // "sous tension" dès l'effleurement
        btn.addEventListener('pointerdown', (e) => {
          (btn.classList.contains('masto__btn--sell') ? playSell : playSpend)();           // System Snap à T0 (VENDRE=chime / DÉPENSER=impact)
          if (!rm) { down = true; apply(e); }                                              // pression mobile : incline + enfonce
        });
        btn.addEventListener('pointerleave', () => { if (!rm) reset(); stopCharge(); });    // coupe le "bzz" instantanément
        btn.addEventListener('pointercancel', () => { if (!rm) reset(); stopCharge(); });

        if (!rm) { btn.addEventListener('pointermove', apply); btn.addEventListener('pointerup', reset); }

        const DUR = 1100, start = performance.now() + i * 120;   // léger décalage entre les cartes
        el.textContent = vitalFmt(0) + suf;

        const tick = (now) => {

          const e = 1 - Math.pow(1 - p, 3);   // ease-out : rapide puis ralentit à l'approche

    function bindNexusMagnet() {

        const rx = (0.5 - (e.clientY - r.top) / r.height) * 12;    // rotateX : penche vers le curseur (haut/bas)
        if (raf) cancelAnimationFrame(raf);
        raf = requestAnimationFrame(() => {
          item.style.transition = 'none';
          item.style.transform = 'perspective(500px) rotateX(' + rx.toFixed(1) + 'deg) rotateY(' + ry.toFixed(1) + 'deg) scale(1.05)';
        });
      };
      item.addEventListener('pointerenter', () => item.classList.add('nexus-hot'));   // glow cyan stable
      item.addEventListener('pointerleave', () => {
        item.classList.remove('nexus-hot');
        if (raf) cancelAnimationFrame(raf); raf = 0;
        item.style.transition = 'transform 300ms cubic-bezier(0.25, 1, 0.5, 1)';   // retour fluide à l'état initial
        item.style.transform = '';
      });
      if (!rmot) item.addEventListener('pointermove', move);
    }
    bindNexusMagnet();

    // ===== Profil dynamique (Supabase si session, sinon démo) =====
    const CROWN = '<svg viewBox="0 0 24 24" fill="currentColor"><path d="M3.5 8.5l3.8 3L12 5l4.7 6.5 3.8-3L18.5 19h-13z"/></svg>';
    const USER = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="8.5" r="3.4"/><path d="M5.5 20a6.5 6.5 0 0 1 13 0"/></svg>';
    const badgeEl = drawer.querySelector('.profil__badge');
    const nameEl = drawer.querySelector('.profil__name');
    function setProfile(prenom, role) {
      drawer.dataset.role = role;
      nameEl.textContent = prenom || 'Patron';
      badgeEl.innerHTML = role === 'admin' ? CROWN : USER;
    }
    let _sb = null;
    function supa() { if (!_sb && window.supabase) _sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY, { auth: { persistSession: true, autoRefreshToken: true } }); return _sb; }
    (async () => {
      let prenom = '', email = '';
      try {
        const c = supa();
        if (c) {
          const { data } = await c.auth.getSession();
          const u = data && data.session && data.session.user;
          if (u) { const m = u.user_metadata || {}; prenom = m.prenom || (m.full_name || m.name || '').trim().split(' ')[0] || ''; email = (u.email || '').toLowerCase(); }
        }
      } catch (e) {}
      const role = email ? (ADMIN_EMAILS.map((x) => x.toLowerCase()).includes(email) ? 'admin' : 'collab') : 'admin';
      setProfile(prenom || 'Mongazi', role);
      if (prenom && prenom !== userName) { userName = prenom; refreshGreeting(); }   // le HUD "reconnaît" l'utilisateur connecté
    })();
    // aperçu : clic sur le profil bascule le rôle (voir les 2 couleurs de badge)
    drawer.querySelector('.profil').addEventListener('click', () => { playClick(); setProfile(nameEl.textContent, drawer.dataset.role === 'admin' ? 'collab' : 'admin'); });

    // ===== Navigation active + clic de validation =====
    function setActiveNav(nav) { drawer.querySelectorAll('.navbtn').forEach((n) => n.classList.toggle('is-active', n.dataset.nav === nav)); }
    async function doLogout() { try { const c = supa(); if (c) await c.auth.signOut(); } catch (e) {} location.href = 'connexion.html'; }
    drawer.addEventListener('click', (e) => {
      const b = e.target.closest('[data-sfx-hover]'); if (!b) return;
      if (b.dataset.mute !== undefined) { toggleMute(); return; }   // toggle son : ne ferme pas le menu
      if (!b.classList.contains('navbtn')) playClick();            // footer ; les navbtn ont leur glitch/snap au pointerdown
      // le flash "Miles" (glitch + snap + néon) est déclenché au pointerdown, voir plus bas
      if (b.dataset.logout !== undefined) { setTimeout(doLogout, 220); return; }
      if (b.dataset.nav) { setActiveNav(b.dataset.nav); showSection(b.dataset.nav, false); }   // HUD : l'écran change instantanément (caméra sèche)
      setTimeout(closeMenu, 220);                       // laisse le temps de VOIR le clic "Miles" (~200 ms) avant de fermer
    });
  </script>
</body>
</html>
