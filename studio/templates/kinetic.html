<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>NEBULA Studio</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;600;700;800&family=Exo+2:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  /* RENDU DÉTERMINISTE : aucune animation/transition CSS. __seek(t) pose tout en
     inline → capture image par image (4K @ 60 i/s), vitesse exacte. */
  :root{ --accent:#7b5cff; --bg:#060509; --ink:#F2F1FA; --muted:#aeaecb;
         --e:cubic-bezier(.32,.72,0,1); }
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{width:1080px;height:1920px;overflow:hidden;background:var(--bg);color:var(--ink);
    font-family:'Exo 2',system-ui,sans-serif;-webkit-font-smoothing:antialiased}
  #stage{position:relative;width:1080px;height:1920px;overflow:hidden;background:var(--bg)}

  .bgwrap{position:absolute;inset:-6%;z-index:0;will-change:transform}
  .bg{position:absolute;inset:0;
    background:
      radial-gradient(46% 32% at 14% 10%, color-mix(in srgb,var(--accent) 62%,transparent), transparent 60%),
      radial-gradient(42% 30% at 88% 16%, rgba(34,211,238,.42), transparent 62%),
      radial-gradient(60% 44% at 72% 104%, color-mix(in srgb,var(--accent) 44%,transparent), transparent 66%),
      radial-gradient(50% 40% at 8% 96%, rgba(34,211,238,.18), transparent 64%)}
  .grid{position:absolute;inset:0;z-index:1;pointer-events:none;opacity:.06;
    background-image:linear-gradient(rgba(255,255,255,.6) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.6) 1px,transparent 1px);
    background-size:72px 72px;mask-image:radial-gradient(72% 60% at 50% 40%,#000,transparent 80%)}
  .vign{position:absolute;inset:0;z-index:2;pointer-events:none;
    background:radial-gradient(125% 78% at 50% 32%, transparent 42%, rgba(0,0,0,.64) 100%)}

  .top{position:absolute;z-index:6;left:84px;right:84px;top:92px;display:flex;align-items:center;justify-content:space-between}
  .logo-top{height:124px;width:auto;filter:drop-shadow(0 6px 26px rgba(123,92,255,.45))}
  .tag{font-family:'Orbitron';font-weight:600;font-size:24px;letter-spacing:.06em;color:#06060b;
    background:var(--accent);padding:13px 24px;border-radius:999px;box-shadow:0 10px 34px -10px var(--accent)}
  .pbar{position:absolute;z-index:6;left:84px;right:84px;top:236px;height:6px;border-radius:6px;
    background:rgba(255,255,255,.10);overflow:hidden}
  .pbar i{display:block;height:100%;width:0;border-radius:6px;background:linear-gradient(90deg,var(--accent),#22d3ee)}

  .scene{position:absolute;z-index:4;left:84px;right:84px;top:0;bottom:0;
    display:flex;flex-direction:column;justify-content:center;gap:38px;opacity:0;will-change:opacity}
  .kicker{font-family:'Orbitron';font-weight:600;font-size:33px;letter-spacing:.16em;
    text-transform:uppercase;color:var(--accent)}
  .accentline{height:9px;width:128px;border-radius:9px;background:var(--accent);
    box-shadow:0 0 26px var(--accent);transform-origin:left;transform:scaleX(0)}
  .line{font-family:'Exo 2';font-weight:800;font-size:120px;line-height:1.02;letter-spacing:-.02em;
    overflow-wrap:break-word;word-break:break-word}
  .line .w{display:inline-block;will-change:transform,opacity}
  .sub{font-family:'Exo 2';font-size:45px;line-height:1.32;color:var(--muted);max-width:870px;font-weight:500}

  .v-manifesto .line{text-transform:uppercase;font-weight:800}
  .v-stat .line{letter-spacing:-.01em;color:#fff;
    text-shadow:0 0 50px color-mix(in srgb,var(--accent) 55%,transparent)}
  .v-stat .line .w{color:#fff}
  .qmark{font-family:'Exo 2';font-weight:800;font-size:150px;line-height:.4;color:var(--accent)}

  .outro{position:absolute;z-index:6;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;
    gap:30px;opacity:0;text-align:center;padding:0 90px;will-change:opacity}
  .logo-big{width:760px;max-width:84%;height:auto;
    filter:drop-shadow(0 14px 60px rgba(123,92,255,.5))}
  .outro .cta{font-family:'Exo 2';font-size:50px;font-weight:600;margin-top:6px}
  .pill{font-family:'Orbitron';font-weight:600;font-size:30px;letter-spacing:.04em;color:#06060b;
    background:var(--accent);padding:18px 40px;border-radius:999px;box-shadow:0 14px 44px -10px var(--accent)}
  .handle{font-family:'Exo 2';font-size:34px;color:var(--muted);letter-spacing:.05em}
</style>
</head>
<body>
<div id="stage">
  <div class="bgwrap" id="bgwrap"><div class="bg"></div></div>
  <div class="grid"></div>
  <div class="vign"></div>
  <div class="top">
    <img class="logo-top" id="logoTop" alt="NEBULA Agency">
    <span class="tag" id="formatTag">Le saviez-vous</span>
  </div>
  <div class="pbar"><i id="pbarFill"></i></div>
  <div id="sceneHost"></div>
  <div class="outro" id="outro">
    <img class="logo-big" id="logoBig" alt="NEBULA Agency">
    <div class="cta" id="outroCta"></div>
    <span class="pill" id="outroPill"></span>
    <div class="handle" id="outroHandle"></div>
  </div>
</div>
<script>
const FALLBACK = { brand:"NEBULA Agency", accent:"#7b5cff", cta:"NEBULA Agency — le digital expliqué simplement", platform:"TikTok", format:"Le saviez-vous",
  visual:{ style:"kinetic", scenes:[
    {kicker:"Le saviez-vous", line:"3 secondes pour convaincre", sub:"C'est le temps qu'un client passe avant de juger ton site."},
    {kicker:"Pourquoi", line:"La première image fait foi", sub:"Photo nette, message clair, et il reste."},
    {kicker:"À retenir", line:"Soigne ta vitrine", sub:"En ligne, l'apparence, c'est la confiance."}]}};

const C = Object.assign({}, FALLBACK, window.CONCEPT || {});
const LOGO = window.__LOGO || null;
const style = (C.visual && C.visual.style) || "kinetic";
const scenes = (C.visual && C.visual.scenes && C.visual.scenes.length) ? C.visual.scenes : FALLBACK.visual.scenes;
const HANDLES = {"NEBULA Agency":"nebula-agency.online"};

document.documentElement.style.setProperty('--accent', C.accent || "#7b5cff");
document.body.classList.add('v-' + style);
if (LOGO) { document.getElementById('logoTop').src = LOGO; document.getElementById('logoBig').src = LOGO; }
else { document.getElementById('logoTop').style.display='none'; document.getElementById('logoBig').style.display='none'; }
document.getElementById('formatTag').textContent = C.format || "Le saviez-vous";
document.getElementById('outroCta').textContent = C.cta || "";
document.getElementById('outroPill').textContent = C.platform ? ("Pour " + C.platform) : "NEBULA Agency";
document.getElementById('outroHandle').textContent = HANDLES[C.brand] || "nebula-agency.online";

const words = (s) => String(s || "").split(/\s+/).filter(Boolean);
const clamp = (x) => x < 0 ? 0 : x > 1 ? 1 : x;
const ease  = (x) => 1 - Math.pow(1 - clamp(x), 3);
function fitFont(line){
  const n = String(line || "").length;
  let fs = n <= 9 ? 170 : n <= 16 ? 134 : n <= 24 ? 108 : n <= 34 ? 88 : 74;
  if (style === 'manifesto') fs = Math.round(fs * 0.92);
  return fs;
}

const host = document.getElementById('sceneHost');
const INTRO = 460, OUTRO = 2500, OUT_FADE = 300;
const refs = []; let cursor = INTRO; let heroIdx = 0, heroLen = -1;
scenes.forEach((s, i) => {
  const node = document.createElement('div'); node.className = 'scene';
  const wl = words(s.line);
  const wsHtml = wl.map(w => `<span class="w">${w}&nbsp;</span>`).join('');
  node.innerHTML =
    (s.kicker ? `<div class="kicker">${s.kicker}</div>` : '<div class="kicker"></div>') +
    (style === 'quote' ? '<div class="qmark">“</div>' : '') +
    `<div class="accentline"></div><div class="line">${wsHtml}</div>` +
    (s.sub ? `<div class="sub">${s.sub}</div>` : '');
  host.appendChild(node);
  node.querySelector('.line').style.fontSize = fitFont(s.line) + 'px';
  const dur = Math.max(1750, 1100 + wl.length * 150 + (s.sub ? 320 : 0));
  refs.push({ node, start: cursor, dur,
    kicker: node.querySelector('.kicker'), accent: node.querySelector('.accentline'),
    ws: [...node.querySelectorAll('.w')], sub: node.querySelector('.sub') });
  if (wl.length > heroLen) { heroLen = wl.length; heroIdx = i; }
  cursor += dur;
});
const scenesEnd = cursor;
window.__DURATION = scenesEnd + OUTRO;
window.__POSTER_T = refs[heroIdx].start + Math.min(950, refs[heroIdx].dur * 0.5);

const bgwrap = document.getElementById('bgwrap');
const fill = document.getElementById('pbarFill');
const outro = document.getElementById('outro');

window.__seek = function (t) {
  fill.style.width = (clamp(t / window.__DURATION) * 100) + '%';
  bgwrap.style.transform = `translate(${Math.sin(t / 3000) * 1.4}%, ${Math.cos(t / 3600) * 1.1}%) scale(1.04)`;
  for (const r of refs) {
    const lt = t - r.start;
    if (t < r.start || t > r.start + r.dur) { r.node.style.opacity = 0; continue; }
    let op = 1;
    if (lt > r.dur - OUT_FADE) op = 1 - (lt - (r.dur - OUT_FADE)) / OUT_FADE;
    r.node.style.opacity = op;
    const kp = ease(lt / 380); r.kicker.style.opacity = kp; r.kicker.style.transform = `translateY(${(1 - kp) * 16}px)`;
    r.accent.style.transform = `scaleX(${ease((lt - 110) / 420)})`;
    r.ws.forEach((w, j) => { const p = ease((lt - (140 + j * 58)) / 330); w.style.opacity = p; w.style.transform = `translateY(${(1 - p) * 44}px)`; });
    if (r.sub) { const sp = ease((lt - 240) / 440); r.sub.style.opacity = sp; r.sub.style.transform = `translateY(${(1 - sp) * 16}px)`; }
  }
  outro.style.opacity = (t >= scenesEnd) ? ease((t - scenesEnd) / 480) : 0;
};

window.__seek(0);
document.fonts && document.fonts.ready.then(() => { window.__FONTS_READY = true; window.__seek(0); });
</script>
</body>
</html>
