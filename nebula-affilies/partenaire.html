<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="robots" content="noindex,nofollow">
<title>Mon QG — NEBULA Affiliés</title>
<link rel="stylesheet" href="/static/app.css">
</head>
<body>
<div class="bg-orbs"></div>
<div class="bg-grain"></div>

<div class="app">
  <aside class="dock">
    <div class="logo">N</div>
    <nav id="nav" class="flex" style="flex-direction:column;gap:8px"></nav>
    <div class="nav-sp"></div>
    <button class="nav-i" id="logout" title="Quitter"></button>
  </aside>

  <main class="work">
    <header class="topbar">
      <div class="who">
        <div class="rank" style="gap:12px">
          <div class="emblem" id="top-emblem" style="width:52px;height:52px;font-size:1.5rem;border-radius:16px"></div>
          <div><div style="font-weight:700;font-family:'Space Grotesk'" id="p-name">…</div><div class="r-sub" id="p-rank">…</div></div>
        </div>
      </div>
      <div class="flex gap8">
        <button class="icon-btn" id="snd" title="Sons"></button>
        <button class="icon-btn" id="amb" title="Ambiance sonore"></button>
        <button class="icon-btn" id="bell" title="Notifications"></button>
      </div>
    </header>

    <!-- MON QG -->
    <section class="view" id="v-home"></section>
    <!-- MES CLIENTS -->
    <section class="view" id="v-clients"></section>
    <!-- MON LIEN -->
    <section class="view" id="v-link"></section>
    <!-- PERSONNALISER -->
    <section class="view" id="v-perso"></section>
  </main>
</div>

<!-- Notifications -->
<div class="scrim" id="notif-scrim"><div class="card modal"><div class="in">
  <div class="flex between mb16"><h3>Notifications</h3><button class="icon-btn" id="notif-close" style="width:34px;height:34px"></button></div>
  <div id="notif-list"></div>
</div></div></div>

<script src="/static/app.js"></script>
<script>
const { icon, api, toast, sound, countUp, reveal, qr, celebrate, nova, esc, fmt, ago, el } = NA;
const ROOT = document.documentElement;
let ME = null, LEADS = [], CFG = null;

const NAV = [
  { id: 'home', icon: 'chart', label: 'Mon QG' },
  { id: 'clients', icon: 'folder', label: 'Mes clients' },
  { id: 'link', icon: 'link', label: 'Mon lien' },
  { id: 'perso', icon: 'palette', label: 'Personnaliser' },
];
const SWATCHES = ['#7b5cff','#22d3ee','#36f5a0','#e6c34c','#ff5c7a','#4c8cff','#ff8a3c','#d957ff'];

function statusPill(st) { const s = CFG.statuses[st] || { label: st, color: '#888' }; return `<span class="pill" style="--c:${s.color}"><span class="d"></span>${esc(s.label)}</span>`; }
function payDot(p) { return `<span class="pay ${p ? 'ok' : ''}"><span class="dot"></span>${p ? 'Payé' : 'En attente'}</span>`; }
function initials(n) { return (n || '?').split(' ').filter(Boolean).slice(0, 2).map(x => x[0]).join('').toUpperCase(); }

function buildDock() {
  const nav = document.getElementById('nav');
  NAV.forEach(n => {
    const b = el(`<button class="nav-i" data-v="${n.id}" title="${n.label}">${icon(n.icon)}</button>`);
    b.onclick = () => switchView(n.id);
    nav.appendChild(b);
  });
  document.getElementById('logout').innerHTML = icon('logout');
  document.getElementById('logout').onclick = async () => { await api('/api/logout', { body: {} }); location.href = '/'; };
}
function switchView(id) {
  sound.sfx.tab();
  document.querySelectorAll('.view').forEach(v => v.classList.remove('on'));
  document.getElementById('v-' + id).classList.add('on');
  document.querySelectorAll('.nav-i[data-v]').forEach(b => b.classList.toggle('on', b.dataset.v === id));
  ({ home: renderHome, clients: renderClients, link: renderLink, perso: renderPerso }[id])();
  reveal();
}

function renderHome() {
  const s = ME.stats, r = s.rank;
  const next = r.next_label ? `Encore <b style="color:var(--ink)">${r.to_next}</b> client${r.to_next > 1 ? 's' : ''} pour ${r.next_emoji} ${r.next_label}` : 'Rang maximum atteint 👑';
  document.getElementById('v-home').innerHTML = `
    <div class="bento">
      <div class="col-7 rv"><div class="card glow"><div class="in">
        <span class="eyebrow"><span class="dot"></span>Ton rang</span>
        <div class="rank mt16">
          <div class="emblem">${r.emoji}</div>
          <div><div class="r-name">${esc(r.label)}</div><div class="r-sub">Niveau ${r.level} / ${r.max_level} · ${s.score} pts</div></div>
        </div>
        <div class="xp"><div class="track"><div class="fill" id="xpfill"></div></div>
          <div class="meta"><span>${next}</span><span class="mono">${r.xp_pct}%</span></div></div>
      </div></div></div>
      <div class="col-5 rv"><div class="card"><div class="in">
        <span class="eyebrow"><span class="dot"></span>Tes commissions</span>
        <div class="stat mt16"><div class="lbl">RCM · gagné (payé)</div><div class="num accent mono" id="n-rcm">0</div><div class="sub">+ <span class="mono" id="n-pot">0</span> F en attente de paiement</div></div>
      </div></div></div>

      <div class="col-3 rv"><div class="card"><div class="in stat"><div class="lbl">Clients</div><div class="num mono" id="n-cli">0</div><div class="sub">ramenés à NEBULA</div></div></div></div>
      <div class="col-3 rv"><div class="card"><div class="in stat"><div class="lbl">En attente</div><div class="num mono" style="color:var(--warn)" id="n-att">0</div><div class="sub">à valider</div></div></div></div>
      <div class="col-3 rv"><div class="card"><div class="in stat"><div class="lbl">En cours</div><div class="num mono" style="color:var(--info)" id="n-enc">0</div><div class="sub">NEBULA travaille</div></div></div></div>
      <div class="col-3 rv"><div class="card"><div class="in stat"><div class="lbl">Terminés</div><div class="num mono" style="color:var(--ok)" id="n-ter">0</div><div class="sub">livrés</div></div></div></div>

      <div class="col-12 rv"><div class="card"><div class="in">
        <div class="flex between mb16"><h3>Coup d'œil</h3><button class="btn sm ghost" onclick="switchView('clients')">Voir mes clients<span class="ico">${icon('arrow')}</span></button></div>
        <div id="recent"></div>
      </div></div></div>
    </div>`;
  requestAnimationFrame(() => document.getElementById('xpfill').style.width = r.xp_pct + '%');
  countUp(document.getElementById('n-rcm'), s.rcm, { money: true });
  countUp(document.getElementById('n-pot'), s.potentiel, { money: true });
  countUp(document.getElementById('n-cli'), s.nb_real);
  countUp(document.getElementById('n-att'), s.by_status.attente);
  countUp(document.getElementById('n-enc'), s.by_status.en_cours);
  countUp(document.getElementById('n-ter'), s.by_status.termine);
  const rec = document.getElementById('recent');
  if (!LEADS.length) rec.innerHTML = `<p class="muted center" style="padding:20px">Aucun client encore. Partage ton lien pour démarrer 🚀</p>`;
  else rec.innerHTML = LEADS.slice(0, 4).map(l => clientRow(l, true)).join('');
}

function clientRow(l, compact) {
  const name = `${l.prenom || ''} ${l.nom || ''}`.trim();
  return `<div class="row" style="grid-template-columns:42px 1fr auto">
    <div class="avatar">${initials(name)}</div>
    <div><div class="ttl">${esc(name)}</div><div class="meta">${esc(l.service_label)} · ${ago(l.created)}</div>
      <div class="flex gap8 mt8 wrap">${statusPill(l.status)} ${payDot(l.paye)}</div></div>
    <div class="center"><div class="mono" style="color:var(--accent);font-weight:700">${fmt(l.commission)} F</div><div class="meta">commission</div></div>
  </div>`;
}

function renderClients() {
  const html = !LEADS.length
    ? `<div class="card"><div class="in center" style="padding:40px"><p class="muted">Aucun client pour l'instant.<br>Va dans <b style="color:var(--ink)">Mon lien</b> et partage-le sur WhatsApp 🚀</p></div></div>`
    : LEADS.map(l => `<div class="rv">${clientRow(l)}</div>`).join('');
  document.getElementById('v-clients').innerHTML = `
    <div class="rv mb16"><span class="eyebrow"><span class="dot"></span>Mes clients</span><h2 class="mt8" style="font-size:1.8rem">Tes clients, en direct</h2>
    <p class="muted mt8">NEBULA met à jour les statuts — tu suis l'évolution ici.</p></div>${html}`;
}

function renderLink() {
  const link = location.origin + '/r/' + ME.code;
  const s = ME.stats;
  document.getElementById('v-link').innerHTML = `
    <div class="bento">
      <div class="col-7 rv"><div class="card glow"><div class="in">
        <span class="eyebrow"><span class="dot"></span>Ton lien magique</span>
        <h2 class="mt8" style="font-size:1.6rem">Partage. Ils remplissent. Tu encaisses.</h2>
        <p class="muted mt8 mb16">Envoie ce lien à un commerçant. Dès qu'il remplit le formulaire, il apparaît chez toi et NEBULA est prévenue.</p>
        <div class="field"><div class="wrap"><input id="lk" readonly value="${esc(link)}" style="font-family:JetBrains Mono;font-size:.85rem"></div></div>
        <div class="flex gap8 wrap">
          <button class="btn primary" id="copy">Copier le lien<span class="ico">${icon('copy')}</span></button>
          <a class="btn ghost" id="wa" target="_blank" rel="noopener">Partager sur WhatsApp<span class="ico">${icon('phone')}</span></a>
        </div>
        <div class="divider"></div>
        <div class="flex gap8 wrap">
          <span class="chip">Total reçus · <b>${s.nb_total}</b></span>
          <span class="chip" style="color:var(--ok)">Terminés · <b>${s.by_status.termine}</b></span>
          <span class="chip" style="color:var(--accent)">Code · <b>${ME.code}</b></span>
        </div>
      </div></div></div>
      <div class="col-5 rv"><div class="card"><div class="in center">
        <span class="eyebrow"><span class="dot"></span>QR Code</span>
        <div style="background:#0b0b12;border-radius:18px;padding:14px;margin:16px auto;width:max-content;border:1px solid var(--hair)"><img src="${qr(link, 220)}" alt="QR" width="220" height="220" style="display:block;border-radius:8px"></div>
        <p class="muted" style="font-size:.85rem">Imprime-le ou montre-le. On le scanne, le formulaire s'ouvre.</p>
      </div></div></div>
    </div>`;
  document.getElementById('wa').href = 'https://wa.me/?text=' + encodeURIComponent('Bonjour 👋 Je travaille avec NEBULA Agency (vitrines digitales, Google Maps, avatars IA). Dites-moi votre projet ici : ' + link);
  document.getElementById('copy').onclick = () => { navigator.clipboard?.writeText(link); sound.sfx.cash(); toast('Lien copié ✓', 'ok'); };
}

function renderPerso() {
  document.getElementById('v-perso').innerHTML = `
    <div class="bento">
      <div class="col-7 rv"><div class="card glow"><div class="in">
        <span class="eyebrow"><span class="dot"></span>Couleur de ton QG</span>
        <h2 class="mt8" style="font-size:1.6rem">Fais-en ton espace.</h2>
        <p class="muted mt8 mb16">Choisis ta couleur — tout ton bureau s'adapte instantanément.</p>
        <div class="swatches" id="sw"></div>
      </div></div></div>
      <div class="col-5 rv"><div class="card"><div class="in">
        <span class="eyebrow"><span class="dot"></span>Ambiance</span>
        <div class="flex between mt16"><div><b>Effets sonores</b><div class="muted" style="font-size:.82rem">Clics, succès, paiements</div></div><button class="btn sm ${sound.enabled ? 'primary' : 'ghost'}" id="t-snd">${sound.enabled ? 'Activés' : 'Coupés'}</button></div>
        <div class="divider"></div>
        <div class="flex between"><div><b>Musique d'ambiance</b><div class="muted" style="font-size:.82rem">Nappe sonore immersive</div></div><button class="btn sm ${sound.ambient ? 'primary' : 'ghost'}" id="t-amb">${sound.ambient ? 'En cours' : 'Coupée'}</button></div>
      </div></div></div>
    </div>`;
  const sw = document.getElementById('sw');
  SWATCHES.forEach(c => {
    const d = el(`<div class="sw ${c === ME.accent ? 'on' : ''}" style="background:${c}"></div>`);
    d.onclick = async () => { ROOT.style.setProperty('--accent', c); ME.accent = c; sw.querySelectorAll('.sw').forEach(x => x.classList.remove('on')); d.classList.add('on'); sound.sfx.click(); try { await api('/api/partenaire/theme', { body: { accent: c } }); toast('Couleur enregistrée ✓', 'ok'); } catch (e) {} };
    sw.appendChild(d);
  });
  document.getElementById('t-snd').onclick = () => { sound.toggle(); renderPerso(); };
  document.getElementById('t-amb').onclick = () => { sound.toggleAmbient(); renderPerso(); };
}

/* ---- notifications ---- */
async function refreshNotifs() {
  try {
    const d = await api('/api/partenaire/notifs');
    const bell = document.getElementById('bell');
    bell.querySelector('.badge')?.remove();
    if (d.unread) bell.appendChild(el(`<span class="badge">${d.unread}</span>`));
    document.getElementById('notif-list').innerHTML = d.notifs.length
      ? d.notifs.map(n => `<div class="row" style="grid-template-columns:1fr auto;${n.lu ? '' : 'border-color:var(--hair-2)'}"><div>${esc(n.text)}</div><div class="meta">${ago(n.created)}</div></div>`).join('')
      : `<p class="muted center" style="padding:20px">Aucune notification.</p>`;
  } catch (e) {}
}
document.getElementById('bell').onclick = async () => { sound.sfx.click(); document.getElementById('notif-scrim').classList.add('on'); await api('/api/partenaire/notifs/read', { body: {} }); setTimeout(refreshNotifs, 400); };
document.getElementById('notif-close').onclick = () => document.getElementById('notif-scrim').classList.remove('on');
document.getElementById('notif-scrim').onclick = e => { if (e.target.id === 'notif-scrim') e.target.classList.remove('on'); };
document.getElementById('notif-close').innerHTML = icon('close');

/* ---- son ---- */
function syncSnd() { document.getElementById('snd').innerHTML = icon(sound.enabled ? 'sound' : 'mute'); document.getElementById('amb').innerHTML = icon('music'); document.getElementById('amb').style.color = sound.ambient ? 'var(--accent)' : ''; }
document.getElementById('snd').onclick = () => { sound.toggle(); syncSnd(); };
document.getElementById('amb').onclick = () => { sound.toggleAmbient(); syncSnd(); };

/* ---- boot ---- */
(async function boot() {
  try { CFG = await api('/api/config'); } catch (e) {}
  try { ME = await api('/api/partenaire/me'); } catch (e) { location.href = '/'; return; }
  if (ME.accent) ROOT.style.setProperty('--accent', ME.accent);
  document.getElementById('p-name').textContent = ME.name;
  document.getElementById('p-rank').textContent = ME.stats.rank.emoji + ' ' + ME.stats.rank.label;
  document.getElementById('top-emblem').textContent = ME.stats.rank.emoji;
  try { LEADS = (await api('/api/partenaire/leads')).leads; } catch (e) {}
  buildDock(); syncSnd(); nova('ton coach perso'); switchView('home'); refreshNotifs();
  const lvl = ME.stats.rank.level, prev = +(localStorage.getItem('na_rank_' + ME.code) || lvl);
  if (lvl > prev) setTimeout(celebrate, 700);
  localStorage.setItem('na_rank_' + ME.code, lvl);
})();
</script>
</body>
</html>
