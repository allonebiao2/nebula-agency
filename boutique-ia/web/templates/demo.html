<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Démo — vendeur IA {% if merchant %}{{ merchant.business_name }}{% endif %}</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Segoe UI',system-ui,sans-serif;background:#0b141a;height:100vh;display:flex;flex-direction:column}
  .chat{max-width:560px;width:100%;margin:0 auto;display:flex;flex-direction:column;height:100vh;background:#0b141a}
  header{background:#202c33;color:#e9edef;padding:14px 16px;display:flex;align-items:center;gap:12px}
  .ava{width:42px;height:42px;border-radius:50%;background:linear-gradient(135deg,#25d366,#128c7e);
       display:flex;align-items:center;justify-content:center;font-size:1.2rem}
  header .t{font-weight:600;font-size:1rem}
  header .s{font-size:.78rem;color:#8696a0}
  #log{flex:1;overflow-y:auto;padding:18px 14px;display:flex;flex-direction:column;gap:8px;
       background-image:linear-gradient(rgba(11,20,26,.96),rgba(11,20,26,.96))}
  .b{max-width:78%;padding:8px 12px;border-radius:10px;font-size:.95rem;line-height:1.4;white-space:pre-wrap;word-wrap:break-word}
  .me{align-self:flex-end;background:#005c4b;color:#e9edef;border-bottom-right-radius:2px}
  .ia{align-self:flex-start;background:#202c33;color:#e9edef;border-bottom-left-radius:2px}
  .sys{align-self:center;background:#182229;color:#8696a0;font-size:.8rem;border-radius:8px;text-align:center}
  .typing{align-self:flex-start;color:#8696a0;font-size:.85rem;font-style:italic;padding:4px 12px}
  form{display:flex;gap:8px;padding:10px 12px;background:#202c33}
  input{flex:1;background:#2a3942;border:none;border-radius:22px;color:#e9edef;padding:11px 16px;font-size:.98rem}
  input:focus{outline:none}
  button{background:#00a884;border:none;border-radius:50%;width:46px;height:46px;color:#fff;font-size:1.2rem;cursor:pointer}
  button:disabled{opacity:.5}
</style>
</head>
<body>
<div class="chat">
  <header>
    <div class="ava">🛍️</div>
    <div>
      <div class="t">{% if merchant %}{{ merchant.business_name }}{% else %}Boutique{% endif %}</div>
      <div class="s">Vendeur IA · en ligne</div>
    </div>
  </header>
  <div id="log">
    {% if merchant %}
    <div class="b sys">Vous discutez avec le vendeur IA de « {{ merchant.business_name }} ».<br>Écrivez comme un vrai client 👇</div>
    {% else %}
    <div class="b sys">⚠️ Boutique introuvable. Vérifiez le lien.</div>
    {% endif %}
  </div>
  <form id="f">
    <input id="m" placeholder="Écrivez un message…" autocomplete="off" {% if not merchant %}disabled{% endif %}>
    <button type="submit" {% if not merchant %}disabled{% endif %}>➤</button>
  </form>
</div>

<script>
  const merchantId = "{{ merchant_id }}";
  const log = document.getElementById('log');
  // Identifiant client unique par navigateur (simule un numéro WhatsApp)
  let customerId = localStorage.getItem('bia_demo_cust');
  if(!customerId){ customerId = 'demo-' + Math.random().toString(36).slice(2,10); localStorage.setItem('bia_demo_cust', customerId); }

  function bubble(text, cls){
    const d = document.createElement('div');
    d.className = 'b ' + cls; d.textContent = text;
    log.appendChild(d); log.scrollTop = log.scrollHeight; return d;
  }

  document.getElementById('f').addEventListener('submit', async (e) => {
    e.preventDefault();
    const input = document.getElementById('m');
    const text = input.value.trim();
    if(!text) return;
    bubble(text, 'me'); input.value = ''; input.focus();
    const typing = document.createElement('div');
    typing.className = 'typing'; typing.textContent = 'le vendeur écrit…';
    log.appendChild(typing); log.scrollTop = log.scrollHeight;
    try{
      const r = await fetch('/api/chat', {
        method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({ merchant_id: merchantId, customer_id: customerId, message: text })
      });
      const data = await r.json();
      typing.remove();
      if(data.ok){ bubble(data.reply, 'ia'); }
      else { bubble('⚠️ ' + (data.error || 'Erreur'), 'sys'); }
    }catch(ex){ typing.remove(); bubble('⚠️ ' + ex.message, 'sys'); }
  });
</script>
</body>
</html>
